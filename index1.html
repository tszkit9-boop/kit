<script>
    // ======================= 預設初始權重 (V10.3 19派別) =======================
    const DEFAULT_WEIGHTS = {
        qimen: 0.23, data: 0.12, oddsTrack: 0.05, pedigree: 0.03, pace: 0.07,
        ground: 0.04, distance: 0.04, trainerJock: 0.04, jockeyPosture: 0.05,
        behavior: 0.04, multiModal: 0.04, knowledgeGraph: 0.04, logistic: 0.07,
        riderTrainerSynergy: 0.04, ensemble: 0.05, weight: 0.04, paddock: 0.04,
        drawBias: 0.04, paceSystem: 0.03
    };
    let currentWeights = { ...DEFAULT_WEIGHTS };
    
    // 派別中文顯示
    const nameMap = {
        qimen:"奇門", data:"數據", oddsTrack:"賠率晨操", pedigree:"血統", pace:"步速",
        ground:"場地", distance:"路程", trainerJock:"騎練", jockeyPosture:"鞍上人", behavior:"行為",
        multiModal:"多模態", knowledgeGraph:"知識圖譜", logistic:"邏輯迴歸", riderTrainerSynergy:"騎練合拍",

    };
    
    // 載入儲存權重 (若無則用預設)
    function loadWeights() {
        const stored = localStorage.getItem('SHTSN_weights');
        if (stored) {
            try {
                const w = JSON.parse(stored);
                for (let k in currentWeights) {
                    if (w[k] !== undefined) currentWeights[k] = w[k];
                }
                normalizeWeights();
            } catch(e) {}
        }
        renderWeights();
    }
    
    function saveWeights() {
        localStorage.setItem('SHTSN_weights', JSON.stringify(currentWeights));
        document.getElementById('statusMsg').innerHTML = '✅ 權重已儲存至 localStorage (鍵名: SHTSN_weights)';
    }
    
    function normalizeWeights() {
        let sum = 0;
        for (let k in currentWeights) sum += currentWeights[k];
        if (Math.abs(sum - 1) > 0.001) {
            for (let k in currentWeights) currentWeights[k] /= sum;
        }
    }
    
    function resetWeights() {
        currentWeights = { ...DEFAULT_WEIGHTS };
        normalizeWeights();
        renderWeights();
        document.getElementById('statusMsg').innerHTML = '🔄 權重已重設為 V10.3 預設值。';
    }
    
    function renderWeights() {
        const container = document.getElementById('currentWeights');
        container.innerHTML = '';
        for (let [key, val] of Object.entries(currentWeights)) {
            const div = document.createElement('div');
            div.className = 'param-item';
            div.innerHTML = `<span class="param-label">${nameMap[key]}</span>
                             <span class="param-value">${val.toFixed(3)}</span>`;
            container.appendChild(div);
        }
    }
    
    // ======================= 讀取賽果記錄 (localStorage SHTSN_payouts) =======================

        const stored = localStorage.getItem('SHTSN_payouts');
        if (!stored) {
            alert('找不到賽果記錄，請先使用「派彩記錄器」儲存賽果。將使用內建 2026-04-29 範例數據。');
            return getExampleResults();

        const all = JSON.parse(stored);

            alert('沒有完整的前四名記錄，請先輸入名次。將使用內建範例。');
            return getExampleResults();
        }
        return valid;
    }

    // ======================= 為每場比賽生成各派別的模擬評分 =======================
    // 根據馬匹的檔位、賠率、騎師、負磅、路程等模擬評分 (與 V10.3 預測引擎一致)
    function getJockeyScore(j) { const m={ "潘頓":98,"莫雷拉":96,"布文":92,"麥道朗":94,"田泰安":88,"梁家俊":75,"巴度":78,"何澤堯":82,"潘明輝":76,"班德禮":72,"周俊樂":68,"黃寶妮":65,"蔡明紹":70,"楊明倫":62,"金誠剛":70,"韋紀力":70,"艾道拿":72,"鍾易禮":65,"奧爾民":70,"霍宏聲":68,"布浩榮":68,"巫顯東":65,"艾道章":70,"黃智弘":65 }; return m[j]||70; }
    function getTrainerScore(t) { const m={ "蔡約翰":92,"大衛希斯":88,"沈集成":85,"方嘉柏":90,"告東尼":86,"呂健威":76,"黎昭昇":80,"羅富全":78,"姚本輝":82,"丁冠豪":76,"賀賢":80,"伍鵬志":80,"文家良":78,"徐雨石":70,"廖康銘":74,"葉楚航":76,"游達榮":82,"章達":78,"蘇偉賢":78,"韋達":75,"巫偉傑":70,"鄭俊偉":72,"桂福特":78,"章廷":78,"文良":70 }; return m[t]||70; }
    function outerBonus(draw, jockey, odds) { const stars=["潘頓","莫雷拉","布文","麥道朗"]; if(!stars.includes(jockey)) return 0; if(odds>8) return 0; if(draw>=6 && draw<=7 && odds<=5) return 14; if(draw>=8 && draw<=9 && odds<=5) return 18; if(draw>=10 && odds<=5) return 22; if(draw>=6 && draw<=9 && odds<=8) return 8; return 0; }
    function happyValleyBonus(draw, dist) { let innerBonus = (draw <= 3) ? 5 : 0; let cornerBonus = 0; if (dist >= 1200 && dist <= 1400) cornerBonus = (draw <= 4) ? 3 : 0; else if (dist >= 1650) cornerBonus = (draw <= 4) ? 2 : -1; return innerBonus + cornerBonus; }
    function getWeightScore(lb, jockeyWt, dist) { let lbDiff = 135 - lb; let jockeyDiff = 55 - jockeyWt; let factor = dist <= 1200 ? 1.2 : (dist >= 1650 ? 0.8 : 1.0); return Math.min(100, Math.max(0, lbDiff * 0.5 * factor + jockeyDiff * 1.0 * factor + 20)); }
    function getPaddockScore(horse) { let base = 50; if (horse.odds <= 5) base += 15; else if (horse.odds <= 10) base += 8; if (horse.draw <= 3) base += 5; if (horse.jockey === "潘頓" || horse.jockey === "莫雷拉" || horse.jockey === "布文") base += 10; if (horse.lb <= 120) base += 5; return Math.min(100, Math.max(0, base)); }
    function getDrawBiasScore(draw, dist) { let score = 50; if (draw <= 3) score += (dist <= 1200 ? 12 : 8); else if (draw >= 10) score -= (dist <= 1200 ? 10 : 6); else if (draw >= 8) score -= 3; else score += 2; return Math.min(100, Math.max(0, score)); }
    function getPaceSystemScore(horse, dist) { let front = 50 + (horse.draw<=3?15:0) + (dist<=1200?10:0) + (horse.jockey==="潘頓"?8:0); let back = 50 + (dist>=1650?15:0) + (horse.lb<=120?8:0) + (horse.draw>=8?5:0); let eff = 50 + (horse.draw<=4?15:0); return Math.min(100, front*0.4 + back*0.4 + eff*0.2); }
    
    // 根據一場比賽的馬匹列表，計算各派別對每匹馬的評分
    function computeScoresForRace(raceHorses, dist) {
        const fields = Object.keys(nameMap);
        let scores = []; // 每個馬匹一個物件
        for (let h of raceHorses) {
            let raw = {
                qimen: 70 + (h.draw<=3?10:0) + (h.draw>=6? -5:0) + (h.odds<4?8:0) + outerBonus(h.draw, h.jockey, h.odds) + happyValleyBonus(h.draw, dist),
                data: 70 + (h.draw<=3?8:0) + (h.lb<=120?5:0),
                oddsTrack: 100 - Math.min(95, h.odds*5),
                pedigree: 65,
                pace: 65 + (h.draw<=3?8:0) - (h.draw>=10?5:0),
                ground: 70,
                distance: 70,
                trainerJock: (getTrainerScore(h.trainer)*0.4 + getJockeyScore(h.jockey)*0.6),
                jockeyPosture: 75 + (h.draw<=4?5:0),
                behavior: 70 + (h.odds<5?10:0),
                multiModal: 70,
                knowledgeGraph: 70,
                logistic: 70 + (h.odds<3?20:(h.odds<6?10:0)) + (["潘頓","莫雷拉","布文"].includes(h.jockey)?8:0),
                riderTrainerSynergy: (getTrainerScore(h.trainer)+getJockeyScore(h.jockey))/2,
                ensemble: 75,
                weight: getWeightScore(h.lb, h.jockeyWt||55, dist),
                paddock: getPaddockScore(h),
                drawBias: getDrawBiasScore(h.draw, dist),
                paceSystem: getPaceSystemScore(h, dist)
            };
            scores.push(raw);
        }
        return scores;
    }
    
    // 將實際名次轉換為排名數值 (1,2,3,4,...)
    function getRanking(actualOrder, horseName) {
        const idx = actualOrder.indexOf(horseName);
        return idx !== -1 ? idx + 1 : 99; // 沒找到給最大名次
    }
    
    // 計算單個派別與實際名次的 Spearman 相關性 (基於一場比賽)
    function spearmanCorrelation(predScores, actualRanks) {
        // predScores: 每匹馬的該派別分數, actualRanks: 對應的實際名次
        const n = predScores.length;
        if (n < 2) return 0;
        const rankScores = predScores.map((_,i) => i+1); // 按原始順序列出排名? 不對，需要對 predScores 排序得到預測排名
        // 建立陣列 [{predScore, actualRank}]
        let pairs = [];
        for (let i=0; i<n; i++) {
            pairs.push({ predScore: predScores[i], actualRank: actualRanks[i] });
        }
        // 按預測分數排序得到預測排名
        pairs.sort((a,b) => b.predScore - a.predScore);
        let predRanks = new Array(n);
        for (let i=0; i<n; i++) {
            predRanks[pairs[i].actualRank - 1] = i+1; // 依照實際名次填入預測排名
        }
        // 計算 spearman
        let sumD2 = 0;
        for (let i=0; i<n; i++) {
            let d = predRanks[i] - (i+1);
            sumD2 += d * d;
        }
        if (sumD2 === 0) return 1;
        return 1 - (6 * sumD2) / (n * (n*n - 1));
    }

                {n:"東來欣賞",draw:5,odds:10,jockey:"周俊樂",trainer:"告東尼",lb:121,jockeyWt:54},
                {n:"泰泰精神",draw:9,odds:16,jockey:"田泰安",trainer:"蔡約翰",lb:116,jockeyWt:55},
                {n:"喵喵怪",draw:4,odds:5.3,jockey:"巴度",trainer:"巫偉傑",lb:115,jockeyWt:56}
            ], dist:1200 },
            { horses: [
                {n:"穿甲金鷹",draw:4,odds:2.8,jockey:"潘頓",trainer:"廖康銘",lb:123,jockeyWt:55},
                {n:"魅力知耀",draw:3,odds:5.6,jockey:"田泰安",trainer:"大衛希斯",lb:118,jockeyWt:55},
                {n:"凡凡有餘",draw:6,odds:12,jockey:"布浩榮",trainer:"沈集成",lb:124,jockeyWt:56},
                {n:"加州活力",draw:11,odds:12,jockey:"巴度",trainer:"告東尼",lb:122,jockeyWt:56}
            ], dist:1650 }
        ];
        
        // 計算每個派別的平均相關性 (跨所有場次)
        const fields = Object.keys(nameMap);
        let totalCorr = {};
        for (let f of fields) totalCorr[f] = 0;
        let count = 0;
        
        for (let i=0; i<filtered.length; i++) {
            const result = filtered[i];
            const raceIdx = result.raceNum - 1;
            if (raceIdx >= raceCards.length) continue;
            const card = raceCards[raceIdx];
            const actualOrder = [result.winner, result.second, result.third, result.fourth];
            // 取得派別評分
            const scoresPerHorse = computeScoresForRace(card.horses, card.dist);
            // 取得實際名次數組 (順序與 card.horses 一致)
            const actualRanks = card.horses.map(h => getRanking(actualOrder, h.n));
            for (let f of fields) {
                const predScores = scoresPerHorse.map(s => s[f]);
                const corr = spearmanCorrelation(predScores, actualRanks);
                if (!isNaN(corr)) totalCorr[f] += corr;
            }
            count++;
        }
        
        if (count === 0) {
            alert('無有效場次可計算相關性');
            return;
        }
        
        // 計算平均相關性，並調整權重
        let adjustments = {};
        let html = '<table style="width:100%;"><tr><th>派別</th><th>平均相關性</th><th>建議調整</th><th>新權重</th></tr>';
        let newWeights = { ...currentWeights };
        for (let f of fields) {
            const avgCorr = totalCorr[f] / count;
            let delta = 0;
            if (avgCorr > 0.2) delta = 0.002;
            else if (avgCorr < -0.1) delta = -0.001;
            else if (avgCorr > 0.05) delta = 0.001;
            adjustments[f] = delta;
            newWeights[f] = Math.max(0.01, currentWeights[f] + delta);
            const corrClass = avgCorr > 0 ? 'corr-positive' : (avgCorr < 0 ? 'corr-negative' : '');
            html += `<tr><td>${nameMap[f]}</td><td class="${corrClass}">${avgCorr.toFixed(3)}</td><td>${delta>0?'+'+delta:delta}</td><td>${newWeights[f].toFixed(3)}</td></tr>`;
        }
        html += '</table>';
        document.getElementById('correlationResult').innerHTML = html;
        
        // 歸一化新權重
        let sum = 0;
        for (let f of fields) sum += newWeights[f];
        for (let f of fields) newWeights[f] /= sum;
        
        // 更新 currentWeights
        currentWeights = newWeights;
        renderWeights();
        document.getElementById('statusMsg').innerHTML = `✅ 優化完成！基於 ${count} 場賽事計算相關性，權重已調整。請點擊「儲存」保存。`;
    }
    
    // 初始化事件
    document.getElementById('optimizeBtn').addEventListener('click', optimizeWeights);
    document.getElementById('saveBtn').addEventListener('click', () => {
        saveWeights();
        renderWeights();
    });
    document.getElementById('resetBtn').addEventListener('click', () => {
        resetWeights();
        renderWeights();
    });
    
    loadWeights();
</script>
</body>
</html>
