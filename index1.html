    function normalizeWeights() { let s = 0; for(let k in WEIGHTS) s += WEIGHTS[k]; for(let k in WEIGHTS) WEIGHTS[k] /= s; }

    // 真實賽果（從圖片提取）
    const actualResults = [

        { winner:"可靠大師", second:"友得盈", third:"至合拍", fourth:"驍將" },
        { winner:"佰勝金龍", second:"雙贏", third:"富喜來", fourth:"蜜蜜送" },

        { winner:"天天同樂", second:"好評如潮", third:"顏色之皇", fourth:"燭光晚餐" },
        { winner:"踏雪尋梅", second:"東來欣賞", third:"泰泰精神", fourth:"喵喵怪" },
        { winner:"穿甲金鷹", second:"魅力知耀", third:"凡凡有餘", fourth:"加州活力" }
    ];
    
    // 輔助評分函數（與 V10.3 相同，此處簡化但確保排序合理）
    function getJockeyScore(j) { const m={ "潘頓":98,"莫雷拉":96,"布文":92,"麥道朗":94,"田泰安":88,"梁家俊":75,"巴度":78,"何澤堯":82,"潘明輝":76,"班德禮":72,"周俊樂":68,"黃寶妮":65,"蔡明紹":70,"楊明倫":62,"金誠剛":70,"韋紀力":70,"艾道拿":72,"鍾易禮":65,"奧爾民":70,"霍宏聲":68,"布浩榮":68,"巫顯東":65,"艾道章":70,"黃智弘":65 }; return m[j]||70; }
    function getTrainerScore(t) { const m={ "蔡約翰":92,"大衛希斯":88,"沈集成":85,"方嘉柏":90,"告東尼":86,"呂健威":76,"黎昭昇":80,"羅富全":78,"姚本輝":82,"丁冠豪":76,"賀賢":80,"伍鵬志":80,"文家良":78,"徐雨石":70,"廖康銘":74,"葉楚航":76,"游達榮":82,"章達":78,"蘇偉賢":78,"韋達":75,"巫偉傑":70,"鄭俊偉":72,"桂福特":78,"章廷":78,"文良":70 }; return m[t]||70; }
    function outerBonus(draw, jockey, odds) { const stars=["潘頓","莫雷拉","布文","麥道朗"]; if(!stars.includes(jockey)) return 0; if(odds>8) return 0; if(draw>=6 && draw<=7 && odds<=5) return 14; if(draw>=8 && draw<=9 && odds<=5) return 18; if(draw>=10 && odds<=5) return 22; if(draw>=6 && draw<=9 && odds<=8) return 8; return 0; }
    function happyValleyBonus(draw, dist) { let innerBonus = (draw <= 3) ? 5 : 0; let cornerBonus = 0; if (dist >= 1200 && dist <= 1400) cornerBonus = (draw <= 4) ? 3 : 0; else if (dist >= 1650) cornerBonus = (draw <= 4) ? 2 : -1; return innerBonus + cornerBonus; }
    function getWeightScore(lb, jockeyWt, dist) { let lbDiff = 135 - lb; let jockeyDiff = 55 - jockeyWt; let factor = dist <= 1200 ? 1.2 : (dist >= 1650 ? 0.8 : 1.0); return Math.min(100, Math.max(0, lbDiff * 0.5 * factor + jockeyDiff * 1.0 * factor + 20)); }
    function getPaddockScore(horse) { let base = 50; if (horse.odds <= 5) base += 15; else if (horse.odds <= 10) base += 8; if (horse.draw <= 3) base += 5; if (horse.jockey === "潘頓" || horse.jockey === "莫雷拉" || horse.jockey === "布文") base += 10; if (horse.lb <= 120) base += 5; return Math.min(100, Math.max(0, base)); }
    function getDrawBiasScore(draw, dist) { let score = 50; if (draw <= 3) score += (dist <= 1200 ? 12 : 8); else if (draw >= 10) score -= (dist <= 1200 ? 10 : 6); else if (draw >= 8) score -= 3; else score += 2; return Math.min(100, Math.max(0, score)); }
    function getPaceSystemScore(horse, dist) { let front = 50 + (horse.draw<=3?15:0) + (dist<=1200?10:0) + (horse.jockey==="潘頓"?8:0); let back = 50 + (dist>=1650?15:0) + (horse.lb<=120?8:0) + (horse.draw>=8?5:0); let eff = 50 + (horse.draw<=4?15:0); return Math.min(100, front*0.4 + back*0.4 + eff*0.2); }
    
    function computeTotalScores(race) {
        const totals = race.horses.map(h => {
            let raw = {
                qimen: 70 + (h.draw<=3?10:0) + (h.draw>=6?-5:0) + (h.odds<4?8:0) + outerBonus(h.draw, h.jockey, h.odds) + happyValleyBonus(h.draw, race.dist),
                data: 70 + (h.draw<=3?8:0) + (h.lb<=120?5:0),
                oddsTrack: 100 - Math.min(95, h.odds*5),
                pedigree: 65,
                pace: 65 + (h.draw<=3?8:0) - (h.draw>=10?5:0),
                ground: 70,
                distance: 70,
                trainerJock: (getTrainerScore(h.trainer)*0.4 + getJockeyScore(h.jockey)*0.6),
                jockeyPosture: 75 + (h.draw<=4?5:0),
                behavior: 70 + (h.odds<5?10:0),
                multiModal: 70,
                knowledgeGraph: 70,
                logistic: 70 + (h.odds<3?20:(h.odds<6?10:0)) + (["潘頓","莫雷拉","布文"].includes(h.jockey)?8:0),
                riderTrainerSynergy: (getTrainerScore(h.trainer)+getJockeyScore(h.jockey))/2,
                ensemble: 75,
                weight: getWeightScore(h.lb, h.jockeyWt, race.dist),
                paddock: getPaddockScore(h),
                drawBias: getDrawBiasScore(h.draw, race.dist),
                paceSystem: getPaceSystemScore(h, race.dist)
            };
            let total = 0;
            for (let k in WEIGHTS) total += raw[k] * WEIGHTS[k];
            return total;
        });
        return totals;
    }
    
    function getPredictedOrders() {
        const triple = [], quartet = [];
        for (let i=0; i<racesData.length; i++) {
            const scores = computeTotalScores(racesData[i]);
            const indexed = racesData[i].horses.map((h,idx) => ({ name: h.n, score: scores[idx] }));
            indexed.sort((a,b) => b.score - a.score);
            triple.push(indexed.slice(0,3).map(v => v.name));
            quartet.push(indexed.slice(0,4).map(v => v.name));
        }
        return { triple, quartet };
    }

                    <strong>💰 投注建議 (移除三重彩膽拖)</strong><br>

                    • 三重彩：單式 ${top1} > ${top2} > ${top3} (1注)<br>

    // 賽後驗證
    function buildResultInputs() {

    function computeHitRate() {
        const { triple: predTriple, quartet: predQuartet } = getPredictedOrders();
        let tripleHit = 0, quartetHit = 0, valid = 0;
        for (let i=0; i<actualResults.length; i++) {
            const first = document.getElementById(`res_${i}_1`)?.value.trim();
            const second = document.getElementById(`res_${i}_2`)?.value.trim();
            const third = document.getElementById(`res_${i}_3`)?.value.trim();
            const fourth = document.getElementById(`res_${i}_4`)?.value.trim();
            if (!first || !second || !third) continue;
            valid++;
            if (first === predTriple[i][0] && second === predTriple[i][1] && third === predTriple[i][2]) tripleHit++;
            if (fourth && first === predQuartet[i][0] && second === predQuartet[i][1] && third === predQuartet[i][2] && fourth === predQuartet[i][3]) quartetHit++;
        }
        const tripleRate = valid ? (tripleHit / valid * 100).toFixed(1) : 0;
        const quartetRate = valid ? (quartetHit / valid * 100).toFixed(1) : 0;
        const today = { date: "2026-04-29", tripleHit, tripleTotal: valid, quartetHit, quartetTotal: valid, tripleRate, quartetRate };
        let history = localStorage.getItem('SHTSN_hitrate') ? JSON.parse(localStorage.getItem('SHTSN_hitrate')) : [];
        history.push(today);
        localStorage.setItem('SHTSN_hitrate', JSON.stringify(history));
        displayStats(history);
    }
    
    function displayStats(history) {
        const last = history[history.length-1];
        let totalTriple=0, totalTripleCnt=0, totalQuartet=0, totalQuartetCnt=0;
        history.forEach(d => {
            totalTriple += d.tripleHit;
            totalTripleCnt += d.tripleTotal;
            totalQuartet += d.quartetHit;
            totalQuartetCnt += d.quartetTotal;
        });
        const overallTriple = totalTripleCnt ? (totalTriple/totalTripleCnt*100).toFixed(1) : 0;
        const overallQuartet = totalQuartetCnt ? (totalQuartet/totalQuartetCnt*100).toFixed(1) : 0;
        document.getElementById('stats').innerHTML = `
            <div>📅 本日 (2026-04-29)：三重彩 ${last?.tripleHit||0}/${last?.tripleTotal||0} (${last?.tripleRate||0}%) &nbsp; 四重彩 ${last?.quartetHit||0}/${last?.quartetTotal||0} (${last?.quartetRate||0}%)</div>
            <div>📈 累積 (${history.length}天)：三重彩 <span class="hit-rate">${overallTriple}%</span> &nbsp; 四重彩 <span class="hit-rate">${overallQuartet}%</span></div>
        `;
    }
    
    function resetHistory() {
        if (confirm('清除所有歷史紀錄？')) {
            localStorage.removeItem('SHTSN_hitrate');
            displayStats([]);
        }
    }
    
    function loadHistory() {
        const stored = localStorage.getItem('SHTSN_hitrate');
        if (stored) displayStats(JSON.parse(stored));
        else document.getElementById('stats').innerHTML = '<div>尚未有紀錄，點擊「計算命中率」儲存。</div>';
    }
    
    renderRaces();
    buildResultInputs();
    loadHistory();
    document.getElementById('calcBtn').addEventListener('click', computeHitRate);
    document.getElementById('resetBtn').addEventListener('click', resetHistory);
</script>
</body>
</html>
