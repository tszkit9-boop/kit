<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>賽果記錄系統｜自動儲存·即時提存｜跑馬地/沙田賽事</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f1a0f;
            font-family: system-ui, 'Segoe UI', sans-serif;
            color: #e6f0e6;
            padding: 1.5rem;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.8rem;
            color: #ffb347;
            border-bottom: 2px solid #ffb347;
            display: inline-block;
            margin-bottom: 1rem;
        }
        .sub {
            color: #aaa;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }
        .card {
            background: rgba(26,42,31,0.85);
            border-radius: 28px;
            padding: 1.2rem;
            margin-bottom: 2rem;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .form-field {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .form-field label {
            font-size: 0.75rem;
            color: #ffb347;
            font-weight: bold;
        }
        input, select {
            background: #2a3a2f;
            border: 1px solid #ffb347;
            border-radius: 20px;
            padding: 0.4rem 0.8rem;
            color: #fff;
            font-size: 0.85rem;
        }
        button {
            background: #ffb347;
            color: #1a2a1f;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            padding: 0.5rem 1.2rem;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            margin-right: 0.5rem;
            margin-top: 0.5rem;
        }
        button:hover {
            background: #e6a132;
            transform: scale(0.98);
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .search-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
            margin-bottom: 1.5rem;
        }
        .search-item {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            overflow-x: auto;
            display: block;
        }
        th, td {
            padding: 0.5rem 0.3rem;
            text-align: center;
            border-bottom: 1px solid #2f4035;
        }
        th {
            background: #2a3a2f;
            color: #ffb347;
        }
        .hit {
            color: #6fcf97;
        }
        .delete-btn {
            background: #6e2c2c;
            padding: 0.2rem 0.6rem;
            font-size: 0.7rem;
        }
        .stats {
            background: #162218;
            border-radius: 18px;
            padding: 0.6rem;
            margin-bottom: 1rem;
            font-size: 0.8rem;
        }
        .disclaimer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 1.5rem;
            color: #aaa;
        }
        @media (max-width: 700px) {
            body { padding: 1rem; }
            .form-grid { grid-template-columns: 1fr; }
            .search-bar { flex-direction: column; }
            th, td { font-size: 0.7rem; padding: 0.3rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🏇 賽果記錄系統</h1>
    <div class="sub">自動儲存 · 即時提取 · 支援跑馬地/沙田賽事</div>

    <!-- 記錄表單 -->
    <div class="card">
        <div style="font-weight: bold; margin-bottom: 1rem;">📝 新增賽果記錄</div>
        <div class="form-grid">
            <div class="form-field"><label>日期</label><input type="date" id="raceDate" value="2026-04-29"></div>
            <div class="form-field"><label>場地名稱</label><select id="venue"><option value="跑馬地">跑馬地</option><option value="沙田">沙田</option></select></div>
            <div class="form-field"><label>場次 (R)</label><input type="number" id="raceNum" value="1" min="1" max="12"></div>
            <div class="form-field"><label>班次/路程</label><input type="text" id="classDist" placeholder="例: 四班1200米"></div>
            <div class="form-field"><label>頭馬</label><input type="text" id="winner" placeholder="馬名"></div>
            <div class="form-field"><label>第二名</label><input type="text" id="second" placeholder="馬名"></div>
            <div class="form-field"><label>第三名</label><input type="text" id="third" placeholder="馬名"></div>
            <div class="form-field"><label>第四名</label><input type="text" id="fourth" placeholder="馬名"></div>
            <div class="form-field"><label>四重彩派彩 ($)</label><input type="number" id="quartetDividend" placeholder="選填"></div>
            <div class="form-field"><label>備註</label><input type="text" id="remark" placeholder="選填"></div>
        </div>
        <div class="btn-group">
            <button id="saveBtn">💾 儲存賽果</button>
            <button id="clearFormBtn">🗑️ 清空表單</button>
        </div>
    </div>

    <!-- 查詢與顯示區 -->
    <div class="card">
        <div style="font-weight: bold; margin-bottom: 1rem;">🔍 即時提取·歷史賽果</div>
        <div class="search-bar">
            <div class="search-item"><label>篩選日期</label><input type="date" id="filterDate"></div>
            <div class="search-item"><label>篩選場地</label><select id="filterVenue"><option value="">全部</option><option value="跑馬地">跑馬地</option><option value="沙田">沙田</option></select></div>
            <div class="search-item"><button id="searchBtn">🔍 查詢</button><button id="resetFilterBtn">重置篩選</button></div>
            <div class="search-item"><button id="exportBtn">📄 匯出 JSON</button></div>
        </div>
        <div id="statsArea" class="stats"></div>
        <div style="overflow-x: auto;">
            <table id="resultTable">
                <thead>
                    <tr><th>日期</th><th>場地</th><th>場次</th><th>班次/路程</th><th>頭馬</th><th>第二名</th><th>第三名</th><th>第四名</th><th>四重彩派彩</th><th>備註</th><th>操作</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="disclaimer">
        💡 所有資料儲存於瀏覽器 localStorage，清除網站資料會遺失記錄。<br>
        賽後記錄後可立即顯示於下方表格，支援篩選、匯出。無需後端，完全離線可用。
    </div>
</div>

<script>
    // ---------- 儲存鍵名 ----------
    const STORAGE_KEY = 'SHTSN_race_results';

    // 載入所有記錄
    function loadAllResults() {
        const stored = localStorage.getItem(STORAGE_KEY);
        return stored ? JSON.parse(stored) : [];
    }

    // 儲存所有記錄
    function saveAllResults(results) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(results));
    }

    // 新增記錄
    function addResult(record) {
        const results = loadAllResults();
        // 自動生成唯一 ID (時間戳)
        record.id = Date.now();
        results.unshift(record); // 最新在上
        saveAllResults(results);
        return results;
    }

    // 刪除記錄
    function deleteResult(id) {
        let results = loadAllResults();
        results = results.filter(r => r.id != id);
        saveAllResults(results);
        return results;
    }

    // 渲染表格
    function renderTable(results) {
        const tbody = document.getElementById('tableBody');
        if (!results.length) {
            tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;">暫無賽果記錄</td></tr>';
            document.getElementById('statsArea').innerHTML = '📊 共 0 場賽事';
            return;
        }
        let html = '';
        results.forEach(r => {
            html += `<tr>
                <td>${r.date}</td>
                <td>${r.venue || ''}</td>
                <td>${r.raceNum}</td>
                <td>${r.classDist || ''}</td>
                <td style="font-weight:bold;color:#ffb347;">${r.winner}</td>
                <td>${r.second || ''}</td>
                <td>${r.third || ''}</td>
                <td>${r.fourth || ''}</td>
                <td>${r.quartetDividend ? `$${r.quartetDividend.toLocaleString()}` : '-'}</td>
                <td>${r.remark || ''}</td>
                <td><button class="delete-btn" data-id="${r.id}">刪除</button></td>
            </tr>`;
        });
        tbody.innerHTML = html;
        // 統計
        const totalRaces = results.length;
        const totalQuartet = results.filter(r => r.quartetDividend && r.quartetDividend > 0).length;
        const sumDividend = results.reduce((sum, r) => sum + (r.quartetDividend || 0), 0);
        document.getElementById('statsArea').innerHTML = `📊 共 ${totalRaces} 場賽事 | 已記錄四重彩派彩場次: ${totalQuartet} | 總派彩累計: $${sumDividend.toLocaleString()}`;
        
        // 綁定刪除事件
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                if (confirm('確定刪除此筆賽果？')) {
                    deleteResult(id);
                    applyFilterAndRender();
                }
            });
        });
    }

    // 篩選邏輯
    function applyFilterAndRender() {
        const filterDate = document.getElementById('filterDate').value;
        const filterVenue = document.getElementById('filterVenue').value;
        let results = loadAllResults();
        if (filterDate) {
            results = results.filter(r => r.date === filterDate);
        }
        if (filterVenue) {
            results = results.filter(r => r.venue === filterVenue);
        }
        // 按日期倒序
        results.sort((a,b) => new Date(b.date) - new Date(a.date));
        renderTable(results);
    }

    // 從表單取得記錄物件
    function getFormRecord() {
        const date = document.getElementById('raceDate').value;
        const venue = document.getElementById('venue').value;
        const raceNum = parseInt(document.getElementById('raceNum').value);
        const classDist = document.getElementById('classDist').value.trim();
        const winner = document.getElementById('winner').value.trim();
        const second = document.getElementById('second').value.trim();
        const third = document.getElementById('third').value.trim();
        const fourth = document.getElementById('fourth').value.trim();
        const quartetDividend = parseFloat(document.getElementById('quartetDividend').value) || 0;
        const remark = document.getElementById('remark').value.trim();
        if (!date || !winner) {
            alert('請填寫日期及頭馬名稱');
            return null;
        }
        return { date, venue, raceNum, classDist, winner, second, third, fourth, quartetDividend, remark };
    }

    // 清空表單
    function clearForm() {
        document.getElementById('raceDate').value = new Date().toISOString().slice(0,10);
        document.getElementById('venue').value = '跑馬地';
        document.getElementById('raceNum').value = '1';
        document.getElementById('classDist').value = '';
        document.getElementById('winner').value = '';
        document.getElementById('second').value = '';
        document.getElementById('third').value = '';
        document.getElementById('fourth').value = '';
        document.getElementById('quartetDividend').value = '';
        document.getElementById('remark').value = '';
    }

    // 儲存按鈕
    document.getElementById('saveBtn').addEventListener('click', () => {
        const record = getFormRecord();
        if (record) {
            addResult(record);
            applyFilterAndRender();
            clearForm();
            alert('賽果已儲存！');
        }
    });

    document.getElementById('clearFormBtn').addEventListener('click', clearForm);
    document.getElementById('searchBtn').addEventListener('click', applyFilterAndRender);
    document.getElementById('resetFilterBtn').addEventListener('click', () => {
        document.getElementById('filterDate').value = '';
        document.getElementById('filterVenue').value = '';
        applyFilterAndRender();
    });

    // 匯出 JSON
    document.getElementById('exportBtn').addEventListener('click', () => {
        const results = loadAllResults();
        const dataStr = JSON.stringify(results, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `SHTSN_race_results_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    });

    // 初始載入
    applyFilterAndRender();
</script>
</body>
</html>
