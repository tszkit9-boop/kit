<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🕸️ SHTSN 系統 | 跑馬地夜賽 27/05/2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a2a1f;  /* 深森林綠 */
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            color: #eef4e6;
            padding: 24px 20px 60px;
        }

        /* 容器 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 頁首 */
        .header {
            margin-bottom: 32px;
            border-bottom: 2px solid #ffb347;
            padding-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 12px;
        }
        .title-section h1 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #ffd966, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .title-section p {
            color: #b0c4a2;
            font-size: 0.85rem;
            margin-top: 6px;
        }
        .badge {
            background: #2b4b3a;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            border: 1px solid #ffb347;
            color: #ffd966;
        }

        /* 網格 */
        .races-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
        }

        /* 賽事卡片 */
        .race-card {
            background: #232f1f;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #3a4a2e;
        }
        .race-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 30px rgba(0,0,0,0.4);
            border-color: #ffb34780;
        }

        /* 卡片頭部 */
        .card-header {
            background: #1e2c1a;
            padding: 16px 20px;
            border-bottom: 2px solid #ffb347;
        }
        .race-name {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
        }
        .race-number {
            background: #ffb34720;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #ffb347;
        }
        .race-info {
            font-size: 0.75rem;
            color: #b0c4a2;
            margin-top: 8px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        /* 內容區 */
        .card-body {
            padding: 18px 20px 22px;
        }

        /* 預測名次區 */
        .predict-rank {
            background: #2c3a24;
            border-radius: 24px;
            padding: 12px 16px;
            margin-bottom: 20px;
        }
        .rank-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffd966;
            margin-bottom: 12px;
        }
        .rank-horses {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: space-between;
        }
        .horse-rank-item {
            flex: 1;
            min-width: 70px;
            text-align: center;
            background: #1a2a1f;
            border-radius: 48px;
            padding: 8px 4px;
        }
        .rank-number {
            width: 36px;
            height: 36px;
            background: #2b4b3a;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .rank-number.top1 { background: #d4af37; color: #1a2a1f; }
        .rank-number.top2 { background: #b0b7bc; color: #1a2a1f; }
        .rank-number.top3 { background: #cd7f4b; color: #1a2a1f; }
        .rank-number.top4 { background: #5f7f5a; color: #eef4e6; }
        .horse-name {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .qimen-tag {
            font-size: 0.7rem;
            color: #ffb347;
            margin-top: 4px;
        }

        /* 投注組合 */
        .bet-section {
            margin-top: 16px;
        }
        .bet-item {
            background: #1e2c1a;
            border-radius: 20px;
            padding: 10px 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .bet-label {
            font-weight: 600;
            color: #ffd966;
            background: #2b4b3a;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
        }
        .bet-content {
            font-family: monospace;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }
        .risk-amount {
            font-size: 0.8rem;
            color: #ffb347;
            font-weight: bold;
        }

        /* 派彩/信心進度條 (裝飾) */
        .confidence {
            margin: 12px 0 0;
            height: 4px;
            background: #3f5a35;
            border-radius: 20px;
            overflow: hidden;
        }
        .confidence-fill {
            background: #ffb347;
            width: 78%;
            height: 100%;
            border-radius: 20px;
        }

        /* 注釋小字 */
        .footer-note {
            text-align: center;
            margin-top: 48px;
            padding-top: 20px;
            border-top: 1px solid #2b4b3a;
            font-size: 0.7rem;
            color: #8aa07e;
        }

        @media (max-width: 820px) {
            .races-grid {
                grid-template-columns: 1fr;
            }
            .rank-horses {
                gap: 6px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title-section">

        </div>
        <div class="badge">版本 V7.24 | 跑道派已拆分 | 奇門·數據·賠率融合</div>
    </div>

    <div class="races-grid" id="racesContainer"></div>
    <div class="footer-note">
        📊 預測依據：奇門派(0.26) + 賠率派(0.21) + 數據派(0.16) + 跑道派(0.16) + 路程/騎練/晨操。<br>
        🧠 決策老大綜合加權 + 團體老大資金審批 | 賽後將批量驗證，動態調整專家權重。
    </div>
</div>

<script>

        },

            number: 3, time: "19:40", class: "第四班", distance: "1650米", raceName: "莱茵河镶賽",

                { rank: 1, horse: "1. 魅力知耀", qimen: "吉" },
                { rank: 2, horse: "8. 浪漫老趣", qimen: "大吉·開門" },

                { rank: 4, horse: "4. 鄉村威能", qimen: "小吉·外檔" }
            ],
            exacta: "5–2 (重注)",
            quinella: "5,2,1,4 互串",
            triple: "5 > 2 > 1 ($10)",
            risk: "總風險 $90 (連贏 $50, 位置Q $40)"
        },
        {   // 第5場
            number: 5, time: "20:40", class: "第三班", distance: "1650米", raceName: "蘇特恩盃",
            predictions: [
                { rank: 1, horse: "2. 穿甲金鷹", qimen: "大吉" },
                { rank: 2, horse: "8. 凡凡有餘", qimen: "吉" },
                { rank: 3, horse: "5. 納百川", qimen: "中" },
                { rank: 4, horse: "9. 榮利雙收", qimen: "平" }

            quinella: "2,8,5,9 互串",

        },
        {   // 第6場
            number: 6, time: "21:10", class: "第四班", distance: "1200米", raceName: "錫能河護養",
            predictions: [
                { rank: 1, horse: "8. 花好月盈", qimen: "吉" },
                { rank: 2, horse: "6. 彩虹七色", qimen: "大吉" },

            exacta: "8–6",
            quinella: "8,6,9,2 互串",

        {   // 第7場
            number: 7, time: "21:45", class: "第四班", distance: "1200米", raceName: "锡能河赛",

                { rank: 3, horse: "1. 泰泰精神", qimen: "平·外檔" },

        },
        {   // 第8場 (1000米內欄壟斷)
            number: 8, time: "22:15", class: "第三班", distance: "1000米", raceName: "加能河護養",
            predictions: [
                { rank: 1, horse: "2. 燭光晚餐", qimen: "大吉·1檔" },

                { rank: 4, horse: "9. 長勝金剛", qimen: "小吉" }
            ],
            exacta: "2–10 (小注)",
            quinella: "2拖10,12,9 (位置Q)",
            triple: "2 > 10 > 12 ($10)",
            risk: "總風險 $60 (位置Q膽拖)"
        },
        {   // 第9場
            number: 9, time: "22:50", class: "第三班", distance: "1200米", raceName: "塞納河賽",
            predictions: [
                { rank: 1, horse: "9. 可靠大師", qimen: "大吉·潘頓" },
                { rank: 2, horse: "11. 官金驥", qimen: "吉·1檔" },
                { rank: 3, horse: "7. 富心星", qimen: "中吉" },
                { rank: 4, horse: "8. 香港仔", qimen: "小吉" }
            ],
            exacta: "9–11",
            quinella: "9,11,7,8 互串",
            triple: "9 > 11 > 7 ($10)",
            risk: "總風險 $100 (連贏 $50, 位置Q $50)"
        }
    ];

    function renderRaces() {
        const container = document.getElementById('racesContainer');
        if (!container) return;
        container.innerHTML = '';
        racesData.forEach(race => {
            const card = document.createElement('div');
            card.className = 'race-card';
            // Header
            card.innerHTML = `
                <div class="card-header">
                    <div class="race-name">
                        <span>🏇 第${race.number}場 · ${race.raceName}</span>
                        <span class="race-number">${race.class} ${race.distance}</span>
                    </div>
                    <div class="race-info">
                        <span>⏱️ ${race.time}</span>
                        <span>🏟️ 跑馬地 B 賽道 · 好地</span>
                        <span>🎯 跑道派 : 內檔優勢顯著</span>
                    </div>
                </div>
                <div class="card-body">
                    <div class="predict-rank">
                        <div class="rank-title">🕸️ 蛛網名次預測 (決策老大)</div>
                        <div class="rank-horses">
                            ${race.predictions.map(p => `
                                <div class="horse-rank-item">
                                    <div class="rank-number ${p.rank === 1 ? 'top1' : (p.rank === 2 ? 'top2' : (p.rank === 3 ? 'top3' : 'top4'))}">${p.rank}</div>
                                    <div class="horse-name">${p.horse}</div>
                                    <div class="qimen-tag">${p.qimen}</div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="confidence"><div class="confidence-fill" style="width: 82%"></div></div>
                    </div>
                    <div class="bet-section">
                        <div class="bet-item">
                            <span class="bet-label">🔗 連贏推介</span>
                            <span class="bet-content">${race.exacta}</span>
                        </div>
                        <div class="bet-item">
                            <span class="bet-label">📍 位置Q組合</span>
                            <span class="bet-content">${race.quinella}</span>
                        </div>
                        ${race.triple ? `<div class="bet-item">
                            <span class="bet-label">🎯 三重彩/單T</span>
                            <span class="bet-content">${race.triple}</span>
                        </div>` : ''}
                        <div class="bet-item">
                            <span class="bet-label">💰 團體老大審批</span>
                            <span class="risk-amount">${race.risk}</span>
                        </div>
                    </div>
                    <div style="font-size: 0.7rem; text-align: right; margin-top: 12px; color:#b0c4a2;">⚡ 奇門+跑道加權決策 | 賽後校準</div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    renderRaces();
</script>
</body>
</html>
