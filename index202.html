<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🕸️ SHTSN System 賽前預測 | 24/05/2026 沙田日賽</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a2a1f;  /* 深森林綠 */
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans TC', system-ui, -apple-system, sans-serif;
            padding: 24px 20px;
            color: #eef4e6;
        }

        /* 主容器 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 標題區 */
        .header {
            text-align: center;
            margin-bottom: 32px;
            border-bottom: 2px solid #ffb347;
            padding-bottom: 20px;
        }
        .header h1 {
            font-size: 2.2rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffd966, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .header .sub {
            font-size: 0.9rem;
            color: #b0c4a2;
            margin-top: 8px;
        }
        .version-badge {
            background: #2c3a24;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            margin-top: 12px;
            border: 1px solid #ffb347;
            color: #ffd966;
        }

        /* 場次網格 */
        .races-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        /* 卡片 */
        .race-card {
            background: #232f1f;
            border-radius: 32px;
            padding: 18px 20px 22px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #3f5a35;
        }
        .race-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            border-color: #ffb347;
        }

        /* 場次標題 */
        .race-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-left: 5px solid #ffb347;
            padding-left: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .race-name {
            font-weight: bold;
            font-size: 1.3rem;
            letter-spacing: 1px;
        }
        .race-time {
            background: #2b4b3a;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.75rem;
            color: #ffd966;
        }
        .race-detail {
            font-size: 0.75rem;
            color: #b0c4a2;
            margin-top: 6px;
            margin-bottom: 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* 預測重點區塊 */
        .top-picks {
            background: #2c3a24;
            border-radius: 24px;
            padding: 12px 15px;
            margin-bottom: 18px;
        }
        .pick-item {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .pick-label {
            font-weight: bold;
            min-width: 68px;
            font-size: 0.85rem;
            color: #ffb347;
        }
        .pick-horse {
            font-size: 1.05rem;
            font-weight: 600;
            background: #1e2a1a;
            padding: 2px 12px;
            border-radius: 30px;
            display: inline-block;
        }
        .rank-number {
            display: inline-block;
            width: 28px;
            height: 28px;
            line-height: 28px;
            text-align: center;
            background: #2b4b3a;
            border-radius: 60px;
            font-weight: bold;
            margin-right: 6px;
        }
        .top1-badge {
            background: #d4af37;
            color: #1a2a1f;
        }
        .combo-box {
            background: #1e2e1a;
            padding: 10px 12px;
            border-radius: 20px;
            margin-top: 12px;
        }
        .combo-line {
            font-size: 0.85rem;
            margin: 6px 0;
            font-family: monospace;
            letter-spacing: 0.5px;
        }
        .qimen-tag {
            font-size: 0.7rem;
            background: #3a2c1f;
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
            color: #ffd966;
        }
        .confidence {
            margin-top: 12px;
            text-align: right;
            font-size: 0.7rem;
            color: #b0c4a2;
            border-top: 1px dashed #3f5a35;
            padding-top: 8px;
        }
        .star {
            color: #ffb347;
        }
        hr {
            border-color: #3f5a35;
            margin: 8px 0;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.7rem;
            border-top: 1px solid #3f5a35;
            padding-top: 24px;
            color: #b0c4a2;
        }
        .warning {
            color: #ffb347;
            font-weight: bold;
        }
        @media (max-width: 760px) {
            body {
                padding: 16px 12px;
            }
            .race-card {
                padding: 14px;
            }
            .pick-horse {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🕸️ SHTSN System 賽前預測</h1>
        <div class="sub">團隊分工 · 決策融合 · 集體智慧 · 持續進化</div>
        <div class="version-badge">版本 V7.27I (奇門10% / 賠率待入 / 數據融合)</div>
        <div class="sub">📅 2026年5月24日 (星期日) | 沙田草地 A 賽道 | 好地</div>
    </div>

    <div class="races-grid">
        <!-- 場次 1 至 11 動態生成，數據基於 SHTSN 分析 -->
        <!-- 利用 JS 動態渲染保證整潔，同時保留完整預測內容 -->
    </div>
    <div class="footer">
        <p>🔮 預測綜合數據派、騎練檔位及奇門參考，未注入即時賠率；臨場請以賠率走勢為最終校準。</p>
        <p class="warning">⚠️ 未滿十八歲人士不得投注或進入可投注的地方。切勿沉迷賭博，量力而行。</p>
        <p>🕸️ SHTSN System — 快、狠、準，蛛網制勝。</p>
    </div>
</div>

<script>
    // 全場11場資料 (根據最後匯總表及奇門分析)
    const racesData = [
        {   // R1
            no: 1, time: "12:30", classDist: "第五班 1600米", title: "渣打數碼資產業務讓賽",
            topPick: { num: "7", name: "志醒大將", qimen: "小吉(坎宮)" },
            secondPick: { num: "13", name: "極速之子", qimen: "中平" },
            mainQuinella: ["7+13", "7+1"],
            positionQ: ["7", "13", "1"],
            extraNote: "數據分最高:7志醒大將33,13極速之子33。潘頓馬威力非凡作配。"
        },
        {   // R2
            no: 2, time: "13:00", classDist: "第四班 1400米", title: "渣打可持續金融業務讓賽",
            topPick: { num: "4", name: "加州星馳", qimen: "大吉(乾宮開門)" },
            secondPick: { num: "10", name: "隋我同來", qimen: "中平" },
            mainQuinella: ["4+10", "4+8"],
            positionQ: ["4", "10", "8"],
            extraNote: "數據第一10隋我同來42分，但奇門大吉+告東尼馬4號加州星馳優先。"
        },
        {   // R3
            no: 3, time: "13:30", classDist: "第四班 1200米", title: "渣打大灣區業務讓賽",
            topPick: { num: "4", name: "老鼠斑", qimen: "中平(巽宮)" },
            secondPick: { num: "5", name: "文明戰士", qimen: "小吉(坎宮)" },
            mainQuinella: ["4+5", "4+7"],
            positionQ: ["4", "5", "7"],
            extraNote: "老鼠斑初出第二，數據41分最高，5號文明戰士1檔布文。"
        },
        {   // R4
            no: 4, time: "14:00", classDist: "第四班 1200米", title: "渣打企業及投資銀行讓賽",
            topPick: { num: "4", name: "團結戰靈", qimen: "大吉(乾宮開門)" },
            secondPick: { num: "3", name: "包裝天王", qimen: "中平" },
            mainQuinella: ["4+3", "4+7"],
            positionQ: ["4", "3", "7"],
            extraNote: "團結戰靈數據36+奇門大吉，田泰安操刀。"
        },
        {   // R5
            no: 5, time: "14:30", classDist: "第四班 1600米", title: "渣打優先私人理財讓賽",
            topPick: { num: "2", name: "大回報", qimen: "大吉(乾宮開門)" },
            secondPick: { num: "13", name: "幸運威龍", qimen: "中平" },
            mainQuinella: ["2+13", "2+9"],
            positionQ: ["2", "13", "9"],
            extraNote: "大回報近績1/1/4，奇門大吉；幸運威龍數據33分內檔。"
        },
        {   // R6
            no: 6, time: "15:00", classDist: "第四班 1400米", title: "渣打優先理財讓賽",
            topPick: { num: "12", name: "長峰小子", qimen: "小吉(坎宮休門)" },
            secondPick: { num: "4", name: "馬馳登", qimen: "凶(兌宮)" },
            mainQuinella: ["12+4", "12+5"],
            positionQ: ["12", "4", "5"],
            extraNote: "長峰小子數據36分全場最高，1檔。5號仁仁有餘奇門小吉。"
        },
        {   // R7
            no: 7, time: "15:30", classDist: "第三班 1800米", title: "渣打財富方案讓賽",
            topPick: { num: "11", name: "黃金騎士", qimen: "大吉(乾宮開門)" },
            secondPick: { num: "7", name: "安帝", qimen: "小吉" },
            mainQuinella: ["11+7", "11+13"],
            positionQ: ["11", "7", "13"],
            extraNote: "黃金騎士數據第一36分，近兩場1/1，奇門大吉。"
        },
        {   // R8 一級賽
            no: 8, time: "16:05", classDist: "一級賽 2400米", title: "渣打冠軍暨遮打盃",
            topPick: { num: "1", name: "浪漫勇士", qimen: "中平(巽宮)" },
            secondPick: { num: "9", name: "浪漫戰神", qimen: "小吉" },
            mainQuinella: ["1+9", "1+5"],
            positionQ: ["1", "9", "5"],
            extraNote: "浪漫勇士世界級王者，五連勝。配浪漫戰神及數字天文。"
        },
        {   // R9
            no: 9, time: "16:45", classDist: "第二班 1400米", title: "渣打環球私人銀行讓賽",
            topPick: { num: "5", name: "韋金主", qimen: "大吉(乾宮開門)" },
            secondPick: { num: "4", name: "美麗星晨", qimen: "中平" },
            mainQuinella: ["5+4", "5+7"],
            positionQ: ["5", "4", "7"],
            extraNote: "韋金主近績2/3/2，奇門大吉；美麗星晨潘頓+告東尼。"
        },
        {   // R10
            no: 10, time: "17:20", classDist: "第三班 1200米", title: "渣打人民幣業務讓賽",
            topPick: { num: "9", name: "精英高球", qimen: "大吉(乾宮開門)" },
            secondPick: { num: "7", name: "久久為昇", qimen: "中平" },
            mainQuinella: ["9+7", "9+5"],
            positionQ: ["9", "7", "5"],
            extraNote: "精英高球近三場1/2/1，奇門大吉；煌上不敗馬作配。"
        },
        {   // R11
            no: 11, time: "17:55", classDist: "第三班 1400米", title: "渣打中小企業銀行讓賽",
            topPick: { num: "4", name: "凌登", qimen: "凶(坤宮)" },
            secondPick: { num: "6", name: "超勁赤兔", qimen: "中平" },
            mainQuinella: ["4+6", "4+7"],
            positionQ: ["4", "6", "7"],
            extraNote: "凌登數據44分並列第一，近績1/4/2，麥道朗；櫻花酒杯1檔近績佳。"
        }
    ];

    const gridContainer = document.querySelector('.races-grid');
    if (gridContainer) {
        racesData.forEach(race => {
            const card = document.createElement('div');
            card.className = 'race-card';

            // 標題區
            const headerDiv = document.createElement('div');
            headerDiv.className = 'race-header';
            headerDiv.innerHTML = `
                <span class="race-name">第 ${race.no} 場</span>
                <span class="race-time">${race.time}</span>
            `;
            const detailDiv = document.createElement('div');
            detailDiv.className = 'race-detail';
            detailDiv.innerHTML = `<span>🏆 ${race.classDist}</span><span>📌 ${race.title}</span>`;

            // 首選膽區塊
            const topPicksDiv = document.createElement('div');
            topPicksDiv.className = 'top-picks';
            topPicksDiv.innerHTML = `
                <div class="pick-item">
                    <span class="pick-label">🕸️ 首選膽</span>
                    <span class="pick-horse"><span class="rank-number top1-badge">${race.topPick.num}</span> ${race.topPick.name}</span>
                    <span class="qimen-tag">${race.topPick.qimen}</span>
                </div>
                <div class="pick-item">
                    <span class="pick-label">🎯 次選膽</span>
                    <span class="pick-horse"><span class="rank-number">${race.secondPick.num}</span> ${race.secondPick.name}</span>
                    <span class="qimen-tag">${race.secondPick.qimen}</span>
                </div>
            `;

            // 組合區塊
            const comboDiv = document.createElement('div');
            comboDiv.className = 'combo-box';
            let quinellaHtml = race.mainQuinella.map(q => `<span class="combo-line">🔗 連贏  ${q}</span>`).join('');
            let positionQHtml = `<span class="combo-line">📍 位置Q  ${race.positionQ.join(' , ')}</span>`;
            comboDiv.innerHTML = `
                ${quinellaHtml}
                ${positionQHtml}
                <hr>
                <div class="combo-line">🎲 三重彩複式: ${race.topPick.num} → ${race.secondPick.num} , ${race.positionQ[2]} → 其他配腳</div>
            `;

            // 備註/信心
            const noteDiv = document.createElement('div');
            noteDiv.className = 'confidence';
            noteDiv.innerHTML = `<span class="star">⭐</span> 策略摘要: ${race.extraNote}<br>
            📊 綜合評級: ${race.no === 8 ? '★★★★★ (頂級膽)' : (race.topPick.qimen.includes('大吉') ? '★★★★☆ 信心高' : '★★★☆☆ 均注')}`;

            card.appendChild(headerDiv);
            card.appendChild(detailDiv);
            card.appendChild(topPicksDiv);
            card.appendChild(comboDiv);
            card.appendChild(noteDiv);
            gridContainer.appendChild(card);
        });
    }

    // 附加動態奇門八宮簡表 全域可選 (因篇幅只做補充說明)
    const globalNote = document.createElement('div');
    globalNote.style.cssText = 'background: #1e2e1a; border-radius: 28px; padding: 16px 20px; margin-top: 20px; font-size: 0.8rem; border-left: 4px solid #ffb347;';
    globalNote.innerHTML = `
        <div style="display: flex; gap: 16px; flex-wrap: wrap; justify-content: space-between;">
            <div><strong>🧙 奇門派要點（本日時辰）</strong><br>R2/R4/R5/R7/R9/R10 均有馬匹落入「開門」大吉，其中 R4 團結戰靈、R5 大回報、R7 黃金騎士、R9 韋金主、R10 精英高球 均為開門大吉馬且數據優秀，優先重視。<br>
            ⚠️ 奇門權重現階段僅10%，臨場賠率急降馬應優於純奇門信號。</div>
            <div><strong>📌 賠率提醒</strong><br>臨場注意「賠率下降20%或50%」的馬匹，尤其內檔熱門。R1 志醒大將、R8 浪漫勇士 實力超群，可作過關核心。</div>
        </div>
    `;
    document.querySelector('.container').appendChild(globalNote);
</script>
</body>
</html>
