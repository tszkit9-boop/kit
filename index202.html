            gap: 24px;

            border-radius: 28px;

        }
        .race-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffd966;
        }
        .race-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
            font-size: 0.8rem;
            color: #c0dcb0;
        }
        .race-meta span {
            background: #2b3b24;
            padding: 2px 10px;
            border-radius: 20px;
        }
        .race-content {
            padding: 20px;
        }

            margin-bottom: 20px;
        }

            font-size: 0.9rem;
            color: #ffb347;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .rank-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .rank-item {
            display: flex;
            align-items: baseline;
            gap: 12px;
            font-size: 1rem;
            border-left: 3px solid #ffb347;
            padding-left: 12px;
        }
        .rank-number {
            font-weight: 800;
            font-size: 1.2rem;
            min-width: 32px;
            color: #ffd966;
        }
        .horse-name {
            font-weight: 600;
        }
        .draw-record {
            font-size: 0.7rem;
            color: #b0c4a2;
            margin-left: 8px;
        }
        .bet-section {
            margin: 16px 0;
            padding: 12px 0;
            border-top: 1px dashed #3f5a35;
        }
        .bet-item {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }
        .bet-label {
            font-weight: 600;
            color: #ffb347;
            min-width: 105px;
        }
        .bet-detail {
            color: #eef4e6;
            word-break: break-word;
            text-align: right;
            flex: 1;
        }
        .total-stake {
            background: #2b4b3a;
            border-radius: 20px;
            padding: 10px 16px;
            margin-top: 14px;
            text-align: center;
            font-weight: bold;
            font-size: 1.05rem;
            border: 1px solid #ffb347;
        }
        .total-stake span {
            color: #ffd966;
            font-size: 1.2rem;
        }

            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid #2b4b3a;
            font-size: 0.8rem;
            color: #9ab87a;
        }
