<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SHTSN System｜沙田日賽預測 2026-06-21 (A賽道・即場賠率版)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #1a2a1f;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Noto Sans', sans-serif;
            padding: 24px 16px;
            color: #eef4e6;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
            border-bottom: 2px solid #ffb347;
            padding-bottom: 16px;
        }
        .header h1 {
            font-size: 1.9rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffd966, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .badge {
            display: inline-block;
            background: #2b4b3a;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #ffd966;
            margin-top: 8px;
        }
        .sub {
            color: #b0c4a2;
            margin-top: 6px;
            font-size: 0.9rem;
        }
        .race-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(520px, 1fr));
            gap: 24px;
        }
        .race-card {
            background: #232f1f;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #3a4a2e;
        }
        .race-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.5);
            border-color: #ffb347;
        }
        .race-header {
            background: linear-gradient(135deg, #1f2e1a, #172312);
            padding: 18px 20px;
            border-bottom: 1px solid #ffb34740;
        }
        .race-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffd966;
        }
        .race-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
            font-size: 0.8rem;
            color: #c0dcb0;
        }
        .race-meta span {
            background: #2b3b24;
            padding: 2px 10px;
            border-radius: 20px;
        }
        .race-content {
            padding: 20px;
        }
        .rank-section {
            background: #1e2c1a;
            border-radius: 20px;
            padding: 14px 16px;
            margin-bottom: 20px;
        }
        .rank-title {
            font-size: 0.9rem;
            color: #ffb347;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .rank-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .rank-item {
            display: flex;
            align-items: baseline;
            gap: 12px;
            font-size: 1rem;
            border-left: 3px solid #ffb347;
            padding-left: 12px;
        }
        .rank-number {
            font-weight: 800;
            font-size: 1.2rem;
            min-width: 32px;
            color: #ffd966;
        }
        .horse-name {
            font-weight: 600;
        }
        .draw-record {
            font-size: 0.7rem;
            color: #b0c4a2;
            margin-left: 8px;
        }
        .bet-section {
            margin: 16px 0;
            padding: 12px 0;
            border-top: 1px dashed #3f5a35;
        }
        .bet-item {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }
        .bet-label {
            font-weight: 600;
            color: #ffb347;
            min-width: 105px;
        }
        .bet-detail {
            color: #eef4e6;
            word-break: break-word;
            text-align: right;
            flex: 1;
        }
        .total-stake {
            background: #2b4b3a;
            border-radius: 20px;
            padding: 10px 16px;
            margin-top: 14px;
            text-align: center;
            font-weight: bold;
            font-size: 1.05rem;
            border: 1px solid #ffb347;
        }
        .total-stake span {
            color: #ffd966;
            font-size: 1.2rem;
        }
        .footer-note {
            text-align: center;
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid #2b4b3a;
            font-size: 0.8rem;
            color: #9ab87a;
        }
        @media (max-width: 550px) {
            .race-grid { grid-template-columns: 1fr; }
            .bet-label { min-width: 80px; }
        }
    </style>
</head>
