<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SHTSN 回測系統 | 沙田9場 | 第1場使用真實賠率</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f1a0f; font-family: system-ui, 'Segoe UI', sans-serif; color: #e6f0e6; padding: 1rem; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 1.5rem; border-bottom: 2px solid #ffb347; padding-bottom: 0.5rem; }
        .header h1 { font-size: 1.8rem; color: #ffb347; }
        .sub { font-size: 0.75rem; opacity: 0.8; }
        .race-card { background: rgba(26,42,31,0.9); border-radius: 24px; margin-bottom: 1.5rem; padding: 1rem; }
        .race-title { font-size: 1.2rem; font-weight: bold; border-left: 4px solid #ffb347; padding-left: 0.6rem; margin-bottom: 0.8rem; }
        .flex-row { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem; }
        .predict-table, .actual-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; margin-bottom: 0.5rem; }
        .predict-table th, .predict-table td, .actual-table th, .actual-table td { text-align: center; padding: 0.4rem; border-bottom: 1px solid #2f4035; }
        .predict-table th { background: #2a3a2f; color: #ffb347; }
        .actual-table th { background: #1e3a2a; color: #88ff88; }
        .hit { background: #2a6a2a; color: #ccffcc; font-weight: bold; }
        .miss { background: #6a2a2a; color: #ffcccc; }
        .stats-box { background: #0a130e; border-radius: 18px; padding: 0.8rem; margin-top: 0.5rem; font-size: 0.75rem; }
        .calc-btn { background: #ffb347; color: #1a2a1f; border: none; border-radius: 30px; padding: 5px 14px; cursor: pointer; margin-right: 8px; }
        .disclaimer { font-size: 0.65rem; text-align: center; margin-top: 1.5rem; background: #0a130e; border-radius: 16px; padding: 0.5rem; }
        input { background: #2a3a2f; border: 1px solid #ffb347; padding: 4px 8px; border-radius: 12px; color: white; width: 100px; }
        .actual-input { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 8px; }
        .actual-input input { width: 90px; }
        .status { font-size: 0.7rem; margin-top: 4px; }
        @media (max-width: 700px) { .predict-table th, .predict-table td { font-size: 0.65rem; } input { width: 70px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔁 SHTSN 回測系統 | 19派別 | 第1場已更新真實賠率</h1>
        <div class="sub">沙田全天候 9 場賽事 (2026-05-06) | 輸入實際名次即時比對命中率</div>
    </div>
    <div id="racesContainer"></div>
    <div class="verify-panel" style="background:#132015; border-radius:24px; padding:1rem; margin-top:1rem;">
        <div class="race-title">📊 綜合回測統計</div>
        <button class="calc-btn" id="calcAllBtn">✅ 重新計算所有場次命中率</button>
        <button class="calc-btn" id="resetBtn">🗑️ 清空所有實際名次</button>
        <button class="calc-btn" id="saveBtn">💾 儲存回測記錄</button>
        <div id="stats" class="stats-box"></div>
    </div>
    <div class="disclaimer">🧾 預測基於19派別權重整合。第1場賠率=真實值，其餘場次為估算。實際名次請依馬會公佈為準。</div>
</div>

<script>
    // ---------- 參數與評分函數 (同前) ----------
    let PARAMS = { innerBonusShort:8, outerBonusDraw12:20, longDistanceBackBonus:6, extremeLongshotBonus:5 };
    function getJockeyScore(j) { const m={"潘頓":96,"莫雷拉":95,"布文":92,"田泰安":86,"艾兆禮":82,"巴度":80,"班德禮":78,"蔡明紹":76,"希威森":78,"霍宏聲":75,"梁家俊":74,"周俊樂":72,"潘明輝":72,"袁幸堯":68,"黃寶妮":65,"鍾易禮":65,"巫顯東":65,"楊明倫":65,"金誠剛":68,"奧爾民":68,"黃智弘":65,"布浩榮":68,"艾道拿":72,"何澤堯":80}; return m[j]||70; }
    function getTrainerScore(t) { const m={"蔡約翰":92,"羅富全":90,"方嘉柏":88,"沈集成":88,"姚本輝":86,"大衛希斯":84,"告東尼":84,"伍鵬志":82,"廖康銘":82,"賀賢":80,"葉楚航":78,"文家良":78,"徐雨石":76,"鄭俊偉":74,"丁冠豪":74,"游達榮":80,"蘇偉賢":78,"韋達":76,"黎昭昇":78,"呂健威":76,"巫偉傑":74,"桂福特":72}; return m[t]||70; }
    function getDrawScore(draw,dist) { return dist<=1200 ? (draw<=3?10: draw<=6?7: draw<=9?4:2) : (draw<=3?9: draw<=6?7: draw<=9?5:3); }
    function getWeightScore(lb) { return lb<=115?10: lb<=122?8: lb<=129?5: lb<=133?3:2; }
    function oddsToScore(odds) { return Math.max(0, Math.min(100, 100 - (odds-2)*6)); }
    function estimateOddsFromScore(js,ts,draw) { let base=12; if(js>=90) base-=5; else if(js>=80) base-=2; if(ts>=85) base-=3; if(draw<=3) base-=2; if(draw>=10) base+=3; return Math.max(2.5,Math.min(40,base)); }

</script>
</body>
</html>
