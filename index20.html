<script>
    // ---------- 沙田全天候專用評分參數 ----------
    let PARAMS = {
        innerBonusShort: 8, outerBonusDraw12: 20, longDistanceBackBonus: 6, extremeLongshotBonus: 5
    };

    // 騎師及練馬師分數表
    function getJockeyScore(j) {
        const map = { "潘頓":96,"莫雷拉":95,"布文":92,"田泰安":86,"艾兆禮":82,"巴度":80,"班德禮":78,"蔡明紹":76,
            "希威森":78,"霍宏聲":75,"梁家俊":74,"周俊樂":72,"潘明輝":72,"袁幸堯":68,"黃寶妮":65,
            "鍾易禮":65,"巫顯東":65,"楊明倫":65,"金誠剛":68,"奧爾民":68,"黃智弘":65,"布浩榮":68,
            "艾道拿":72,"何澤堯":80 };
        return map[j] || 70;
    }
    function getTrainerScore(t) {
        const map = { "蔡約翰":92,"羅富全":90,"方嘉柏":88,"沈集成":88,"姚本輝":86,"大衛希斯":84,"告東尼":84,"伍鵬志":82,
            "廖康銘":82,"賀賢":80,"葉楚航":78,"文家良":78,"徐雨石":76,"鄭俊偉":74,"丁冠豪":74,"游達榮":80,
            "蘇偉賢":78,"韋達":76,"黎昭昇":78,"呂健威":76,"巫偉傑":74,"桂福特":72 };
        return map[t] || 70;
    }

    // 基礎輔助函數
    function getDrawScore(draw, dist) {
        if (dist <= 1200) return draw<=3?10: draw<=6?7: draw<=9?4:2;
        else return draw<=3?9: draw<=6?7: draw<=9?5:3;
    }
    function getWeightScore(lb) {
        if(lb<=115) return 10; if(lb<=122) return 8; if(lb<=129) return 5; if(lb<=133) return 3; return 2;
    }
    function oddsToScore(odds) { return Math.max(0, Math.min(100, 100 - (odds - 2) * 6)); }
    function estimateOddsFromScore(jockeyScore, trainerScore, draw) {
        let base = 12;
        if(jockeyScore>=90) base-=5; else if(jockeyScore>=80) base-=2;
        if(trainerScore>=85) base-=3;
        if(draw<=3) base-=2; if(draw>=10) base+=3;
        return Math.max(2.5, Math.min(40, base));
    }

    // ---------- 19 個派別各自的評分 ----------
    function score_qimen(horse, dist) {
        let base = (horse.draw<=3?85: horse.draw<=6?72: horse.draw<=9?58:42);
        let star = (["潘頓","莫雷拉","布文"].includes(horse.jockey) ? 8 : (horse.jockey==="田泰安"?4:0));
        return Math.min(100, base + star + (horse.draw<=3?5:0));
    }
    function score_data(horse, dist) {
        let ds = getDrawScore(horse.draw, dist);
        let ws = getWeightScore(horse.lb);
        let js = getJockeyScore(horse.jockey)/10;
        return (ds*0.35 + ws*0.35 + js*0.3)*10;
    }
    function score_odds(horse, dist) {
        let jk = getJockeyScore(horse.jockey), tr = getTrainerScore(horse.trainer);
        let odds = horse.odds || estimateOddsFromScore(jk, tr, horse.draw);
        return oddsToScore(odds);
    }
    function score_trackwork(horse, dist) {
        let base = (horse.draw<=3?82: horse.draw<=6?74:56);
        let extra = (["潘頓","莫雷拉","布文"].includes(horse.jockey)?6:0) + (horse.lb<=120?4:0);
        return Math.min(100, base+extra);
    }
    function score_pedigree(horse, dist) {
        let base = 65;
        if(dist>=1600 && horse.jockey==="莫雷拉") base+=10;
        if(dist<=1200 && horse.jockey==="潘頓") base+=8;
        return Math.min(100, base);
    }
    function score_distance(horse, dist) {
        let base = 70;
        if(dist<=1200 && horse.draw<=4) base+=8;
        if(dist>=1650 && horse.lb<=125) base+=7;
        return Math.min(100, base);
    }
    function score_trainerJock(horse) {
        return (getTrainerScore(horse.trainer) + getJockeyScore(horse.jockey)) / 2;
    }
    function score_pace(horse, dist) {
        let front = (horse.draw<=3?90:50);
        let back = (dist>=1650 && horse.draw>=7?85:50);
        return Math.min(100, front*0.5 + back*0.5);
    }
    function score_ground(horse) {
        let mudTrainer = ["羅富全","方嘉柏","沈集成","姚本輝"];
        let mudJockey = ["潘頓","莫雷拉","布文","田泰安"];
        let add = (mudTrainer.includes(horse.trainer)?12:0) + (mudJockey.includes(horse.jockey)?10:0);
        return Math.min(100, 60 + add);
    }
    function score_jockeyPosture(horse) {
        let aggressive = ["潘頓","莫雷拉","布文","田泰安"];
        if(aggressive.includes(horse.jockey) && horse.draw<=4) return 85;
        if(aggressive.includes(horse.jockey) && horse.draw>=10) return 65;
        return 75;
    }
    function score_behavior(horse) {
        return Math.min(100, 70 + (horse.lb<=120?10:0) - (horse.lb>=133?8:0));
    }
    function score_multiModal() { return 75; }
    function score_knowledgeGraph(horse) {
        return (getTrainerScore(horse.trainer) + getJockeyScore(horse.jockey)) / 2 * 0.8;
    }
    function score_logistic(horse, dist) {
        let odds = horse.odds || estimateOddsFromScore(getJockeyScore(horse.jockey), getTrainerScore(horse.trainer), horse.draw);
        return Math.max(0, 100 - odds*1.2);
    }
    function score_riderTrainerSynergy(horse) {
        let j = getJockeyScore(horse.jockey), t = getTrainerScore(horse.trainer);
        if(j>=90 && t>=85) return 95;
        if(j>=80 && t>=75) return 80;
        return 70;
    }
    function score_weight(horse) { return getWeightScore(horse.lb)*10; }
    function score_drawBias(horse, dist) {
        if(dist<=1200) return horse.draw<=3?80: horse.draw<=6?70:60;
        else return horse.draw<=3?75:70;
    }
    function score_paceSystem(horse, dist) {
        if(dist>=1650 && horse.draw>=7) return 85;
        if(dist<=1200 && horse.draw<=4) return 80;
        return 70;
    }
    function score_ensemble(scoresArray) { return scoresArray.reduce((a,b)=>a+b,0)/scoresArray.length; }

    // 權重定義 (總和為1)
    let WEIGHTS = {
        qimen: 0.08, data: 0.08, oddsTrack: 0.06, trackwork: 0.05,
        pedigree: 0.04, distance: 0.05, trainerJock: 0.06, pace: 0.05,
        ground: 0.05, jockeyPosture: 0.04, behavior: 0.04, multiModal: 0.03,
        knowledgeGraph: 0.05, logistic: 0.06, riderTrainerSynergy: 0.05,
        ensemble: 0.04, weight: 0.04, drawBias: 0.05, paceSystem: 0.04
    };
    function normalizeWeights() {
        let sum = 0; for(let k in WEIGHTS) sum += WEIGHTS[k];
        for(let k in WEIGHTS) WEIGHTS[k] /= sum;
    }
    normalizeWeights();

    // 綜合評分 (19派別)
    function computeTotalScoreWithAllExperts(horse, dist) {
        let s_qimen = score_qimen(horse, dist);
        let s_data = score_data(horse, dist);
        let s_odds = score_odds(horse, dist);
        let s_track = score_trackwork(horse, dist);
        let s_pedi = score_pedigree(horse, dist);
        let s_dist = score_distance(horse, dist);
        let s_tj = score_trainerJock(horse);
        let s_pace = score_pace(horse, dist);
        let s_ground = score_ground(horse);
        let s_jp = score_jockeyPosture(horse);
        let s_beh = score_behavior(horse);
        let s_mm = score_multiModal();
        let s_kg = score_knowledgeGraph(horse);
        let s_log = score_logistic(horse, dist);
        let s_rts = score_riderTrainerSynergy(horse);
        let s_weight = score_weight(horse);
        let s_db = score_drawBias(horse, dist);
        let s_ps = score_paceSystem(horse, dist);
        let allExceptEnsemble = [s_qimen, s_data, s_odds, s_track, s_pedi, s_dist, s_tj, s_pace, s_ground, s_jp, s_beh, s_mm, s_kg, s_log, s_rts, s_weight, s_db, s_ps];
        let s_ens = allExceptEnsemble.reduce((a,b)=>a+b,0) / allExceptEnsemble.length;
        
        let total = 0;
        total += s_qimen * WEIGHTS.qimen;
        total += s_data * WEIGHTS.data;
        total += s_odds * WEIGHTS.oddsTrack;
        total += s_track * WEIGHTS.trackwork;
        total += s_pedi * WEIGHTS.pedigree;
        total += s_dist * WEIGHTS.distance;
        total += s_tj * WEIGHTS.trainerJock;
        total += s_pace * WEIGHTS.pace;
        total += s_ground * WEIGHTS.ground;
        total += s_jp * WEIGHTS.jockeyPosture;
        total += s_beh * WEIGHTS.behavior;
        total += s_mm * WEIGHTS.multiModal;
        total += s_kg * WEIGHTS.knowledgeGraph;
        total += s_log * WEIGHTS.logistic;
        total += s_rts * WEIGHTS.riderTrainerSynergy;
        total += s_ens * WEIGHTS.ensemble;
        total += s_weight * WEIGHTS.weight;
        total += s_db * WEIGHTS.drawBias;
        total += s_ps * WEIGHTS.paceSystem;
        
        let oddsVal = horse.odds || estimateOddsFromScore(getJockeyScore(horse.jockey), getTrainerScore(horse.trainer), horse.draw);
        let outerBonus = (["潘頓","莫雷拉","布文"].includes(horse.jockey) && oddsVal<=5 && horse.draw>=12) ? PARAMS.outerBonusDraw12 : 0;
        let longBack = (dist>=1800 && horse.draw>=7) ? PARAMS.longDistanceBackBonus : 0;
        let extreme = (oddsVal>=25 && horse.draw>=4 && horse.draw<=9 && getJockeyScore(horse.jockey)>=70) ? PARAMS.extremeLongshotBonus : 0;
        total += outerBonus + longBack + extreme;
        
        return { final: total, odds: oddsVal, details: { qimen:s_qimen, data:s_data, odds:s_odds, track:s_track } };
    }

    function computeAllPredictions() {
        let predictions = [];
        for (let r of races) {
            let withScores = r.horses.map(h => {
                let res = computeTotalScoreWithAllExperts(h, r.dist);
                return { name: h.n, total: res.final, odds: res.odds, qimen: res.details.qimen, data: res.details.data };
            });
            withScores.sort((a,b) => b.total - a.total);
            let top4 = withScores.slice(0,4).map(x=>x.name);
            predictions.push({ raceName: r.name, dist: r.dist, top4, top3: top4.slice(0,3), sorted: withScores });
        }
        return predictions;
    }

    function renderRaces() {
        const container = document.getElementById('racesContainer');
        container.innerHTML = '';
        const preds = computeAllPredictions();
        for (let i=0; i<races.length; i++) {
            const r = races[i];
            const pred = preds[i];
            const sorted = pred.sorted;
            const top1 = sorted[0].name, top2 = sorted[1].name, top3 = sorted[2].name, top4 = sorted[3].name;
            const leadMargin = sorted[0].total - sorted[1].total;
            const warn = leadMargin < 4 ? '<div class="warning">⚠️ 頭馬優勢不足4分，建議膽拖投注。</div>' : '';
            const card = document.createElement('div');
            card.className = 'race-card';
            card.innerHTML = `
                <div class="race-title">🏇 ${r.name} (${r.dist}m) [19派別全激活]</div>
                <table class="predict-table">
                    <thead><tr><th>名次</th><th>馬匹</th><th>綜合分</th><th>賠率(估)</th><th>奇門</th><th>數據</th></tr></thead>
                    <tbody>
                        ${sorted.map((h,idx) => `<tr ${idx<3?'class=top3':''}><td>${idx+1}</td><td>${h.name}</td><td>${h.total.toFixed(1)}</td><td>${h.odds.toFixed(1)}</td><td>${h.qimen.toFixed(0)}</td><td>${h.data.toFixed(0)}</td></tr>`).join('')}
                    </tbody>
                </table>
                ${warn}
                <div class="bet-slip">
                    <strong>💰 投注建議 (19派別集成)</strong><br>
                    獨贏：${top1}<br>
                    連贏：${top1} + ${top2}<br>
                    位置Q：${top1}, ${top2}, ${top3}<br>
                    三重彩單式：${top1} > ${top2} > ${top3}<br>
                    四連環：${top1}, ${top2}, ${top3}, ${top4}<br>
                </div>
            `;
            container.appendChild(card);
        }
    }

    // 賽後驗證UI
    function buildResultInputs() {
        const div = document.getElementById('resultInputs');
        div.innerHTML = '';
        for (let i=0; i<races.length; i++) {
            const row = document.createElement('div');
            row.style.display = 'flex'; row.style.flexWrap = 'wrap'; row.style.gap = '5px'; row.style.marginBottom = '8px';
            row.innerHTML = `<span style="width:100px;">${races[i].name}</span>
                <input id="res_${i}_1" placeholder="頭馬" size="8">
                <input id="res_${i}_2" placeholder="二馬" size="8">
                <input id="res_${i}_3" placeholder="三馬" size="8">
                <input id="res_${i}_4" placeholder="四馬" size="8">`;
            div.appendChild(row);
        }
    }

    function computeHitRate() {
        const preds = computeAllPredictions();
        let tripleHit=0, quartetHit=0, valid=0;
        for (let i=0; i<races.length; i++) {
            const w = document.getElementById(`res_${i}_1`)?.value.trim();
            const s = document.getElementById(`res_${i}_2`)?.value.trim();
            const t = document.getElementById(`res_${i}_3`)?.value.trim();
            const f = document.getElementById(`res_${i}_4`)?.value.trim();
            if(!w || !s || !t) continue;
            valid++;
            if(w===preds[i].top3[0] && s===preds[i].top3[1] && t===preds[i].top3[2]) tripleHit++;
            if(f && w===preds[i].top4[0] && s===preds[i].top4[1] && t===preds[i].top4[2] && f===preds[i].top4[3]) quartetHit++;
        }
        const tripleRate = valid ? (tripleHit/valid*100).toFixed(1) : 0;
        const quartetRate = valid ? (quartetHit/valid*100).toFixed(1) : 0;
        let history = JSON.parse(localStorage.getItem('SHTSN_Shatin_9Races_hitrate') || '[]');
        history.push({ date:"2026-05-06", tripleHit, tripleTotal:valid, quartetHit, quartetTotal:valid, tripleRate, quartetRate });
        localStorage.setItem('SHTSN_Shatin_9Races_hitrate', JSON.stringify(history));
        displayStats(history);
    }

    function displayStats(history) {
        let totalTriple=0, totalTripleCnt=0, totalQuartet=0, totalQuartetCnt=0;
        history.forEach(d=>{ totalTriple+=d.tripleHit; totalTripleCnt+=d.tripleTotal; totalQuartet+=d.quartetHit; totalQuartetCnt+=d.quartetTotal; });
        const overallTriple = totalTripleCnt ? (totalTriple/totalTripleCnt*100).toFixed(1) : 0;
        const overallQuartet = totalQuartetCnt ? (totalQuartet/totalQuartetCnt*100).toFixed(1) : 0;
        document.getElementById('stats').innerHTML = `
            <div>📅 本日 (2026-05-06)：三重彩 ${history[history.length-1]?.tripleHit||0}/${history[history.length-1]?.tripleTotal||0} (${history[history.length-1]?.tripleRate||0}%) &nbsp; 四重彩 ${history[history.length-1]?.quartetHit||0}/${history[history.length-1]?.quartetTotal||0} (${history[history.length-1]?.quartetRate||0}%)</div>
            <div>📈 累積 (沙田9場19派別) 三重彩命中率 ${overallTriple}% &nbsp; 四重彩 ${overallQuartet}%</div>
        `;
    }

    function loadHistory() {
        const stored = localStorage.getItem('SHTSN_Shatin_9Races_hitrate');
        if(stored) displayStats(JSON.parse(stored));
        else document.getElementById('stats').innerHTML = '<div>尚未有紀錄，完成投注後請輸入名次並按計算。</div>';
    }
