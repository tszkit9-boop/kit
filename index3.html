<script>
    // ---------- 初始權重 (V8.9 基準) ----------
    let WEIGHTS = {
        qimen: 0.31,
        data: 0.17,
        oddsTrack: 0.10,   // (賠率+晨操)/2 共用權重
        pedigree: 0.05,
        pace: 0.05,
        ground: 0.05,
        distance: 0.06,
        trainerJock: 0.06,
        jockeyPosture: 0.06,
        behavior: 0.05,
        multiModal: 0.05,   // 多模態融合
        knowledgeGraph: 0.05, // 知識圖譜
        logistic: 0.06       // 邏輯迴歸
    };

    // 初始權重備份
    const DEFAULT_WEIGHTS = { ...WEIGHTS };

    // 從 localStorage 載入權重
    function loadWeights() {
        const saved = localStorage.getItem('SHTSN_weights');
        if (saved) {
            try {
                const w = JSON.parse(saved);
                // 合併，避免遺漏新派別
                Object.assign(WEIGHTS, w);
            } catch(e) {}
        }
        // 確保總和為1 (歸一化)
        normalizeWeights();
    }

    function normalizeWeights() {
        let sum = 0;
        for (let k in WEIGHTS) sum += WEIGHTS[k];
        if (Math.abs(sum - 1) > 0.001) {
            for (let k in WEIGHTS) WEIGHTS[k] /= sum;
        }
    }

    function saveWeights() {
        localStorage.setItem('SHTSN_weights', JSON.stringify(WEIGHTS));
    }

    function resetWeights() {
        Object.assign(WEIGHTS, DEFAULT_WEIGHTS);
        normalizeWeights();
        saveWeights();
        updateWeightDisplay();
        renderAllRaces();   // 重新預測
        document.getElementById('optimizeMsg').innerHTML = '✅ 權重已重置為初始值，預測已更新。';
    }

    // 優化演算法：根據本日輸入的真實結果，微調權重
    function optimizeWeights() {
        const races = getRacesData(); // 取得靜態賽事資料
        let totalTripleHit = 0;
        let totalQuartetHit = 0;
        let validRaces = 0;
        // 記錄每場是否命中三重彩及四重彩
        const hitTriple = [];
        const hitQuartet = [];
        for (let i = 0; i < races.length; i++) {
            const first = document.getElementById(`real_r${i}_1`)?.value.trim();
            const second = document.getElementById(`real_r${i}_2`)?.value.trim();
            const third = document.getElementById(`real_r${i}_3`)?.value.trim();
            const fourth = document.getElementById(`real_r${i}_4`)?.value.trim();
            if (!first || !second || !third) continue;
            validRaces++;
            // 獲取當前預測順序 (根據最新權重計算的綜合分排序)
            const horsesWithScore = races[i].horses.map(h => {
                const score = calcTotalScore(h, WEIGHTS);
                return { name: h.name, score };
            });
            horsesWithScore.sort((a,b) => b.score - a.score);
            const predictedTriple = horsesWithScore.slice(0,3).map(h => h.name);
            const predictedQuartet = horsesWithScore.slice(0,4).map(h => h.name);
            const tripleOk = (first === predictedTriple[0] && second === predictedTriple[1] && third === predictedTriple[2]);
            const quartetOk = (fourth && first === predictedQuartet[0] && second === predictedQuartet[1] && third === predictedQuartet[2] && fourth === predictedQuartet[3]);
            hitTriple.push(tripleOk);
            hitQuartet.push(quartetOk);
            if (tripleOk) totalTripleHit++;
            if (quartetOk) totalQuartetHit++;
        }
        if (validRaces === 0) {
            document.getElementById('optimizeMsg').innerHTML = '⚠️ 請先輸入至少一場的真實賽果再優化。';
            return;
        }
        // 調整權重：命中三重彩/四重彩的場次對應的權重增加，反之減少
        // 簡單梯度: 每個派別根據該場排名錯誤程度調整，這裡採用簡化：每場完全命中三重彩則全體權重+0.002，否則-0.001；四重彩命中再加0.001。
        let delta = 0;
        for (let i = 0; i < validRaces; i++) {
            if (hitTriple[i]) delta += 0.002;
            else delta -= 0.001;
            if (hitQuartet[i]) delta += 0.001;
        }
        // 將 delta 平均分配到所有派別 (整體增加或減少)
        const numFactors = Object.keys(WEIGHTS).length;
        const adjustment = delta / numFactors;
        for (let k in WEIGHTS) {
            WEIGHTS[k] += adjustment;
            if (WEIGHTS[k] < 0.01) WEIGHTS[k] = 0.01;
        }
        normalizeWeights();
        saveWeights();
        updateWeightDisplay();
        renderAllRaces();  // 用新權重重算綜合分及排序
        document.getElementById('optimizeMsg').innerHTML = `✅ 權重已優化！基於 ${validRaces} 場有效賽果 (三重彩命中 ${totalTripleHit} 場，四重彩命中 ${totalQuartetHit} 場)。權重已更新並保存，下次預測將使用新權重。`;
    }

    // 計算單匹馬綜合分 (根據當前權重)

            h.jockeyPosture * weights.jockeyPosture +
            h.behavior * weights.behavior +
            h.multiModal * weights.multiModal +
            h.knowledgeGraph * weights.knowledgeGraph +
            h.logistic * weights.logistic;
        return total;
    }

                { name:"時時歡聲", qimen:95, dataScore:90, oddsScore:98, trackScore:95, pedigree:96, pace:94, ground:94, distance:95, trainerJock:96, jockeyPosture:98, behavior:98, multiModal:98, knowledgeGraph:97, logistic:98 },
                { name:"翠金主", qimen:92, dataScore:86, oddsScore:85, trackScore:88, pedigree:84, pace:86, ground:84, distance:85, trainerJock:90, jockeyPosture:88, behavior:88, multiModal:88, knowledgeGraph:87, logistic:88 },
                { name:"晴冷", qimen:90, dataScore:84, oddsScore:82, trackScore:86, pedigree:82, pace:84, ground:82, distance:85, trainerJock:90, jockeyPosture:88, behavior:88, multiModal:87, knowledgeGraph:86, logistic:87 },
                { name:"千帆駒", qimen:78, dataScore:84, oddsScore:80, trackScore:82, pedigree:78, pace:80, ground:78, distance:80, trainerJock:85, jockeyPosture:78, behavior:78, multiModal:77, knowledgeGraph:76, logistic:77 }
              ] }
        ];
    }

    // 渲染所有賽事 (根據當前權重計算綜合分並排序)
    function renderAllRaces() {
        const races = getRacesData();
        const container = document.getElementById('racesContainer');
        container.innerHTML = '';
        races.forEach((race, idx) => {
            // 計算每匹馬綜合成績並排序
            const horsesWithScore = race.horses.map(h => {
                const total = calcTotalScore(h, WEIGHTS);
                return { ...h, total };
            });
            horsesWithScore.sort((a,b) => b.total - a.total);
            const top1 = horsesWithScore[0].name;
            const top2 = horsesWithScore[1].name;
            const quinella = `${top1} + ${top2}`;
            // 構建表格
            let tableHtml = `<div class="table-wrapper"><table class="data-table"><thead><tr>
                <th>名次</th><th>馬匹</th><th>奇門</th><th>數據</th><th>賠率</th><th>晨操</th><th>血統</th><th>步速</th><th>場地</th>
                <th>路程</th><th>騎練</th><th>鞍上人</th><th>行為</th><th>多模態</th><th>知識圖譜</th><th>邏輯迴歸</th><th>綜合分</th>
            </tr></thead><tbody>`;
            horsesWithScore.forEach((h, i) => {
                const star = i===0 ? "★1" : (i===1 ? "★2" : (i===2 ? "★3" : "★4"));
                tableHtml += `<tr style="${i===0?'background:#2c412a;':''}">
                    <td>${star}</td>
                    <td style="font-weight:bold;color:#ffdd99;">${h.name}</td>
                    <td>${h.qimen}</td><td>${h.dataScore}</td><td>${h.oddsScore}<span class="sim-mark">模</span></td>
                    <td>${h.trackScore}<span class="sim-mark">模</span></td><td>${h.pedigree}<span class="sim-mark">模</span></td>
                    <td>${h.pace}<span class="sim-mark">模</span></td><td>${h.ground}<span class="sim-mark">模</span></td>
                    <td>${h.distance}<span class="sim-mark">模</span></td><td>${h.trainerJock}<span class="sim-mark">模</span></td>
                    <td>${h.jockeyPosture}</td><td>${h.behavior}</td>
                    <td>${h.multiModal}</td><td>${h.knowledgeGraph}</td><td>${h.logistic}</td>
                    <td><strong>${h.total.toFixed(1)}</strong></td>
                </tr>`;
            });
            tableHtml += `</tbody></table></div>
            <div class="bet-slip"><strong>💰 投注建議：獨贏 @ ${top1}，連贏 ${quinella}，四連環首四匹精選 | 成本 $130</strong></div>`;
            const card = document.createElement('div');
            card.className = 'race-card';
            card.innerHTML = `<div class="race-title">🏇 ${race.name} <span class="race-time">${race.time}</span></div>${tableHtml}`;
            container.appendChild(card);
        });
        // 同時重建輸入框 (確保ID對應)
        buildResultInputs();
    }

    // 生成真實結果輸入框 (每場)
    function buildResultInputs() {
        const races = getRacesData();
        const div = document.getElementById('resultInputs');
        div.innerHTML = '';
        races.forEach((race, i) => {
            const row = document.createElement('div');
            row.className = 'result-row';
            row.innerHTML = `<span class="rname">${race.name}</span>
                <input type="text" placeholder="頭馬" id="real_r${i}_1">
                <input type="text" placeholder="二馬" id="real_r${i}_2">
                <input type="text" placeholder="三馬" id="real_r${i}_3">
                <input type="text" placeholder="四馬" id="real_r${i}_4">`;
            div.appendChild(row);
        });
    }

    // 顯示權重表
    function updateWeightDisplay() {
        const div = document.getElementById('weightDisplay');
        div.innerHTML = `<table style="width:100%"><tr><th>派別</th><th>權重</th></tr>
            <tr><td>奇門派</td><td>${WEIGHTS.qimen.toFixed(3)}</td></tr>
            <tr><td>數據派</td><td>${WEIGHTS.data.toFixed(3)}</td></tr>
            <tr><td>賠率+晨操</td><td>${WEIGHTS.oddsTrack.toFixed(3)}</td></tr>
            <tr><td>血統派</td><td>${WEIGHTS.pedigree.toFixed(3)}</td></tr>
            <tr><td>步速派</td><td>${WEIGHTS.pace.toFixed(3)}</td></tr>
            <tr><td>場地派</td><td>${WEIGHTS.ground.toFixed(3)}</td></tr>
            <tr><td>路程派</td><td>${WEIGHTS.distance.toFixed(3)}</td></tr>
            <tr><td>騎練派</td><td>${WEIGHTS.trainerJock.toFixed(3)}</td></tr>
            <tr><td>鞍上人派</td><td>${WEIGHTS.jockeyPosture.toFixed(3)}</td></tr>
            <tr><td>行為模式派</td><td>${WEIGHTS.behavior.toFixed(3)}</td></tr>
            <tr><td>多模態融合</td><td>${WEIGHTS.multiModal.toFixed(3)}</td></tr>
            <tr><td>知識圖譜派</td><td>${WEIGHTS.knowledgeGraph.toFixed(3)}</td></tr>
            <tr><td>邏輯迴歸派</td><td>${WEIGHTS.logistic.toFixed(3)}</td></tr>
        </table>`;
    }

    // 初始化
    loadWeights();
    updateWeightDisplay();
    renderAllRaces();
    document.getElementById('resetWeightsBtn').addEventListener('click', resetWeights);
    document.getElementById('optimizeBtn').addEventListener('click', optimizeWeights);
</script>
</body>
</html>
