        }

            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a462a;
            padding: 8px 5px;
            flex-wrap: wrap;
            gap: 8px;

            background: #2a442c;
            width: 32px;
            text-align: center;
            border-radius: 20px;
            color: var(--amber-light);
            font-weight: bold;
        }

            flex: 2;
            font-weight: 600;
            min-width: 100px;
        }
        .horse-detail {
            font-size: 0.7rem;
            color: #c2c2a2;

            gap: 10px;
            flex-wrap: wrap;

            border: 1px dashed #b57c2c;

            flex-wrap: wrap;

            align-items: baseline;
        }

            font-size: 0.7rem;
            color: #b3a66a;
            text-align: right;
            padding: 4px 16px 12px;

            color: #fceeca;

            if (h.weightAdj) {
                let w = parseInt(h.weight);
                if (!isNaN(w)) h.weight = (w + h.weightAdj).toString();
            }
        });
    });

    // 泥地優化參數 (V10.8 泥地特化)
    let coreParams = {
        dirtFrontBonus: 5,        // 泥地前領馬加分
        innerBonusShort: 8,       // 內檔短途加成
        outerBonusDraw12: 20,     // 外檔明星補償 (泥地降低)
        longDistanceBackBonus: 10,// 長途後上加分
        extremeLongshotBonus: 6,  // 極冷門保護
        overheatPenaltyBase: 3,   // 過熱懲罰
        starJockeyBonus: 3,       // 明星騎師加分
        fastPaceDrawAdjust: 3     // 快步速內檔加分
    };
    function loadParams() { const s = localStorage.getItem("SHTSN_corrected_params"); if(s) { try { Object.assign(coreParams, JSON.parse(s)); } catch(e){} } }
    function saveParams() { localStorage.setItem("SHTSN_corrected_params", JSON.stringify(coreParams)); }
    loadParams();

    function computeScore(horse, race) {
        let draw = horse.draw || 10;
        let star = horse.star;
        let weightNum = parseInt(horse.weight) || 125;
        let dist = race.distance;
        let base = horse.baseScore || 75;
        let runStyle = horse.runStyle || "居中";
        // 泥地前領馬加分
        if (runStyle === "領放") base += coreParams.dirtFrontBonus;
        // 內檔短途加成 (泥地短途內檔更利)
        if (dist <= 1200 && draw <= 3) base += coreParams.innerBonusShort;
        // 外檔明星補償 (泥地效果減弱)
        if (draw >= 12 && star) base += coreParams.outerBonusDraw12;
        // 長途後上 (泥地1800米以上後上稍有利)
        if (dist >= 1800 && (runStyle === "後上" || horse.name.includes("浪漫") || horse.name.includes("火焰"))) base += coreParams.longDistanceBackBonus;
        // 極冷門保護 (模擬賠率用15)
        let odds = 15;
        if (horse.winOdds) odds = parseFloat(horse.winOdds) || 15;
        if (odds >= 25 && draw >= 4 && draw <= 9 && star) base += coreParams.extremeLongshotBonus;
        if (odds <= 2.5) base -= coreParams.overheatPenaltyBase;
        // 明星騎師加分
        if (star) base += coreParams.starJockeyBonus;
        // 負磅優勢
        if (weightNum < 120) base += (125 - weightNum) * 0.4;
        // 步速修正: 短途快步速內檔加分 (泥地預設快步速)
        if (dist <= 1200 && draw <= 4) base += coreParams.fastPaceDrawAdjust;
        // 泥地內檔一般優勢
        if (draw <= 2) base += 2;
        return Math.min(99, Math.max(45, Math.floor(base)));
    }

    function renderAll() {
        const container = document.getElementById('racesContainer');
        container.innerHTML = '';
        racesData.forEach((race, idx) => {
            const withScores = race.horses.map(h => ({ ...h, score: computeScore(h, race) })).sort((a,b)=>b.score - a.score);
            const top5 = withScores.slice(0,5);
            const winHorse = top5[0].name;
            const quinella = `${top5[0].name} → ${top5[1].name}`;
            const triBox = `${top5[0].name}, ${top5[1].name}, ${top5[2].name} (序目不拘)`;
            const super4 = `${top5[0].name}, ${top5[1].name}, ${top5[2].name}, ${top5[3]?.name || '—'}`;
            const card = document.createElement('div');
            card.className = 'race-card';
            card.innerHTML = `
                <div class="race-header"><span class="race-name">${race.name} (${race.time})</span><span class="race-info">${race.going} | ${race.distance}m</span></div>
                <div class="qimen-brief">🔮 奇門派：${race.qimen}</div>
                <div class="horses-list">
                    ${top5.map((h, i) => `<div class="horse-row"><span class="horse-rank">${i+1}</span><span class="horse-name">${h.name}</span><div class="horse-detail">檔${h.draw} 騎${h.jockey} 負${h.weight} ${h.runStyle}</div><span class="score">${h.score}分</span></div>`).join('')}
                </div>
                <div class="bet-suggest">
                    <div class="bet-line"><span class="bet-label">🏆 獨贏推介：</span><strong style="color:var(--amber-light);">${winHorse}</strong></div>
                    <div class="bet-line"><span class="bet-label">🔗 連贏推介：</span>${quinella}</div>
                    <div class="bet-line"><span class="bet-label">🎯 三重彩複式：</span>${triBox}</div>
                    <div class="bet-line"><span class="bet-label">🌈 四重彩順序：</span>${super4}</div>
                    <div class="bet-line"><span class="bet-label">📌 位置Q / 單T：</span>${top5[0].name}, ${top5[1].name}, ${top5[2].name}</div>
                    <div class="bet-line"><span class="bet-label">🔄 四連環：</span>${top5[0].name}, ${top5[1].name}, ${top5[2].name}, ${top5[3]?.name || top5[4]?.name || '—'}</div>
                </div>
                <div class="mock-note">⚠️ 缺數據以「模」標記｜泥地特化：前領馬+${coreParams.dirtFrontBonus}分，內檔短途+${coreParams.innerBonusShort}，明星騎師+${coreParams.starJockeyBonus}</div>
            `;
            container.appendChild(card);
        });
        const sel = document.getElementById('raceSelect');
        if(sel) sel.innerHTML = racesData.map((r,i)=>`<option value="${i}">${r.name}</option>`).join('');
    }

    // 賽後記錄
    let hitStat = { total:0, triok:0 };
    function loadHit() { const h = localStorage.getItem("SHTSN_hitrate"); if(h) { try{ hitStat = JSON.parse(h); } catch(e){} } updateHitDisplay(); }
    function saveHit() { localStorage.setItem("SHTSN_hitrate", JSON.stringify(hitStat)); updateHitDisplay(); }
    function updateHitDisplay() { document.getElementById('hitRateDisplay').innerText = `${hitStat.triok||0} / ${hitStat.total||0}`; }

    document.getElementById('recordResultBtn')?.addEventListener('click',()=>{
        const idx = parseInt(document.getElementById('raceSelect').value);
        const w = document.getElementById('winnerInput').value.trim();
        const s = document.getElementById('secondInput').value.trim();
        const t = document.getElementById('thirdInput').value.trim();
        if(!w) { alert("請輸入頭馬"); return; }
        const race = racesData[idx];
        const predTop3 = race.horses.map(h=>({name:h.name, score:computeScore(h,race)})).sort((a,b)=>b.score-a.score).slice(0,3).map(p=>p.name);
        const actualSet = new Set([w,s,t]);
        const isHit = (predTop3.length === 3 && actualSet.size === 3 && predTop3.every(m => actualSet.has(m)));
        hitStat.total++;
        if(isHit) hitStat.triok++;
        saveHit();
        document.getElementById('analysisMsg').innerHTML = `✅ ${race.name} 記錄 | 頭馬:${w} 三重彩複式${isHit?'命中':'錯失'}。參數微調完成。`;
        if(!isHit && race.distance<=1200) { coreParams.innerBonusShort = Math.max(3, coreParams.innerBonusShort-1); saveParams(); renderAll(); }
        else if(!isHit && race.distance>=1650) { coreParams.longDistanceBackBonus = Math.min(15, coreParams.longDistanceBackBonus+1); saveParams(); renderAll(); }
    });
    document.getElementById('refreshNetworkBtn')?.addEventListener('click',()=>{
        alert("🌐 模擬聯網：已獲取最新泥地跑道狀況及賠率走勢，評分重新計算。");
        renderAll();
    });
    document.getElementById('resetParamsBtn')?.addEventListener('click',()=>{
        coreParams = { dirtFrontBonus:5, innerBonusShort:8, outerBonusDraw12:20, longDistanceBackBonus:10, extremeLongshotBonus:6, overheatPenaltyBase:3, starJockeyBonus:3, fastPaceDrawAdjust:3 };
        saveParams();
        renderAll();
        alert("泥地優化參數已重置為預設值 (前領+5, 內檔短途+8)");
    });
    document.getElementById('viewParamsBtn')?.addEventListener('click',()=>{
        alert(`當前泥地參數\n前領加分:${coreParams.dirtFrontBonus}\n內檔短途:${coreParams.innerBonusShort}\n外檔補償:${coreParams.outerBonusDraw12}\n長途後上:${coreParams.longDistanceBackBonus}\n明星騎師加分:${coreParams.starJockeyBonus}`);
    });
    
    loadHit();
    renderAll();
</script>
</body>
</html>
