<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>賽果記錄管理｜刪除指定日期範圍賽果</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f1a0f;
            font-family: system-ui, 'Segoe UI', sans-serif;
            color: #e6f0e6;
            padding: 1.2rem;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.8rem;
            color: #ffb347;
            border-bottom: 2px solid #ffb347;
            display: inline-block;
            margin-bottom: 1rem;
        }
        .sub {
            color: #aaa;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }
        .card {
            background: rgba(26,42,31,0.85);
            border-radius: 28px;
            padding: 1rem;
            margin-bottom: 2rem;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
            margin-bottom: 1rem;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .field label {
            font-size: 0.7rem;
            color: #ffb347;
            font-weight: bold;
        }
        input, select {
            background: #2a3a2f;
            border: 1px solid #ffb347;
            border-radius: 20px;
            padding: 0.4rem 0.8rem;
            color: white;
            font-size: 0.8rem;
        }
        button {
            background: #ffb347;
            color: #1a2a1f;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            padding: 0.4rem 1.2rem;
            cursor: pointer;
            font-size: 0.8rem;
        }
        button.danger {
            background: #9b2c2c;
            color: white;
        }
        button.danger:hover {
            background: #7a1f1f;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            overflow-x: auto;
            display: block;
        }
        th, td {
            padding: 0.4rem 0.2rem;
            text-align: center;
            border-bottom: 1px solid #2f4035;
        }
        th {
            background: #2a3a2f;
            color: #ffb347;
        }
        .stats {
            background: #162218;
            border-radius: 18px;
            padding: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.75rem;
        }
        .disclaimer {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 1.5rem;
            color: #aaa;
        }
        @media (max-width: 700px) {
            .form-row { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🗑️ 賽果記錄管理</h1>
    <div class="sub">刪除指定日期範圍內的賽果（沙田／跑馬地）｜操作不可復原，請謹慎使用</div>

    <!-- 刪除控制卡片 -->
    <div class="card">
        <div style="font-weight: bold; margin-bottom: 1rem;">📅 批次刪除範圍</div>
        <div class="form-row">
            <div class="field"><label>起始日期</label><input type="date" id="startDate" value="2026-04-01"></div>
            <div class="field"><label>結束日期</label><input type="date" id="endDate" value="2026-04-19"></div>
            <div class="field"><label>場地 (選填)</label><select id="venueFilter"><option value="">全部場地</option><option value="沙田">沙田</option><option value="跑馬地">跑馬地</option></select></div>
            <div><button id="deleteRangeBtn" class="danger">🗑️ 刪除此範圍內記錄</button></div>
        </div>
        <div class="btn-group">
            <button id="refreshBtn">🔄 重新整理列表</button>
            <button id="exportBtn">📄 匯出目前所有記錄</button>
            <button id="clearAllBtn" class="danger">⚠️ 刪除全部記錄</button>
        </div>
    </div>

    <!-- 當前記錄列表 -->
    <div class="card">
        <div style="font-weight: bold; margin-bottom: 0.5rem;">📋 現存賽果記錄</div>
        <div class="stats" id="statsArea"></div>
        <div style="overflow-x: auto;">
            <table id="resultTable">
                <thead>
                    <tr><th>日期</th><th>場地</th><th>場次</th><th>班次/路程</th><th>頭馬</th><th>二馬</th><th>三馬</th><th>四馬</th><th>獨贏</th><th>位置</th><th>連贏</th><th>三重彩</th><th>四重彩</th><th>備註</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="disclaimer">
        💡 操作基於瀏覽器 localStorage，刪除後無法復原，建議先匯出備份。<br>
        📅 日期範圍刪除時會比對所有記錄的日期，只要在範圍內即刪除（可再輔以場地篩選）。
    </div>
</div>

<script>
    const STORAGE_KEY = 'SHTSN_payouts';  // 使用與先前系統相同的密鑰，確保能讀取到已儲存的賽果

    // ---------- 資料操作 ----------
    function loadAll() {
        const stored = localStorage.getItem(STORAGE_KEY);
        return stored ? JSON.parse(stored) : [];
    }

    function saveAll(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // 刪除範圍內記錄
    function deleteByDateRange(startDate, endDate, venue) {
        let data = loadAll();
        const start = new Date(startDate);
        const end = new Date(endDate);
        const filtered = data.filter(record => {
            const recordDate = new Date(record.date);
            const inDateRange = recordDate >= start && recordDate <= end;
            if (!inDateRange) return true;  // 不在日期範圍內，保留
            // 在日期範圍內，再檢查場地條件
            if (venue && record.venue !== venue) return true; // 場地不符，保留
            return false; // 符合刪除條件
        });
        if (filtered.length === data.length) {
            alert('沒有符合條件的記錄可刪除。');
            return false;
        }
        const deletedCount = data.length - filtered.length;
        saveAll(filtered);
        alert(`已刪除 ${deletedCount} 筆記錄。`);
        return true;
    }

    // 刪除全部
    function deleteAll() {
        if (confirm('⚠️ 確定要刪除所有賽果記錄？此操作無法復原！')) {
            saveAll([]);
            alert('所有記錄已刪除。');
            renderTable(loadAll());
        }
    }

    // 匯出 JSON
    function exportJSON() {
        const data = loadAll();
        const dataStr = JSON.stringify(data, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `SHTSN_payouts_backup_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    // 渲染表格
    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        if (!data.length) {
            tbody.innerHTML = '<td><td colspan="14" style="text-align:center;">暫無賽果記錄</td></tr>';
            document.getElementById('statsArea').innerHTML = '📊 共 0 筆記錄';
            return;
        }
        let html = '';
        data.forEach(r => {
            const placeStr = `${r.place1 || '-'} / ${r.place2 || '-'} / ${r.place3 || '-'}`;
            html += `<tr>
                <td>${r.date}</td>
                <td>${r.venue}</td>
                <td>${r.raceNum}</td>
                <td>${escapeHtml(r.classDist || '-')}</td>
                <td style="color:#ffb347;">${escapeHtml(r.winner || '-')}</td>
                <td>${escapeHtml(r.second || '-')}</td>
                <td>${escapeHtml(r.third || '-')}</td>
                <td>${escapeHtml(r.fourth || '-')}</td>
                <td>${r.winDiv ? `$${r.winDiv.toFixed(2)}` : '-'}</td>
                <td>${placeStr}</td>
                <td>${r.quinellaDiv ? `$${r.quinellaDiv.toFixed(2)}` : '-'}</td>
                <td>${r.tripleDiv ? `$${r.tripleDiv.toFixed(2)}` : '-'}</td>
                <td>${r.quartetDiv ? `$${r.quartetDiv.toFixed(2)}` : '-'}</td>
                <td>${escapeHtml(r.remark || '-')}</td>
            </tr>`;
        });
        tbody.innerHTML = html;
        const totalRaces = data.length;
        const totalQuartet = data.filter(r => r.quartetDiv && r.quartetDiv > 0).length;
        const sumQuartet = data.reduce((s, r) => s + (r.quartetDiv || 0), 0);
        document.getElementById('statsArea').innerHTML = `📊 共 ${totalRaces} 場 | 已記錄四重彩派彩: ${totalQuartet} 場 | 四重彩總派彩: $${sumQuartet.toLocaleString()}`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function refresh() {
        const data = loadAll();
        renderTable(data);
    }

    // 刪除範圍事件
    function onDeleteRange() {
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        const venue = document.getElementById('venueFilter').value;
        if (!startDate || !endDate) {
            alert('請選擇起始及結束日期');
            return;
        }
        if (new Date(startDate) > new Date(endDate)) {
            alert('起始日期不能晚於結束日期');
            return;
        }
        if (confirm(`確定要刪除 ${startDate} 至 ${endDate} 之間的記錄${venue ? ` (場地: ${venue})` : ' (全部場地)'} 嗎？\n此操作無法復原！`)) {
            deleteByDateRange(startDate, endDate, venue);
            refresh();
        }
    }

    // 初始化事件
    document.getElementById('deleteRangeBtn').addEventListener('click', onDeleteRange);
    document.getElementById('refreshBtn').addEventListener('click', refresh);
    document.getElementById('exportBtn').addEventListener('click', exportJSON);
    document.getElementById('clearAllBtn').addEventListener('click', deleteAll);

    // 初始載入
    refresh();
</script>
</body>
</html>
