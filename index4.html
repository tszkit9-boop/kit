<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>派彩記錄系統｜已載入 2026-04-29 跑馬地9場賽果</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f1a0f;
            font-family: system-ui, 'Segoe UI', sans-serif;
            color: #e6f0e6;
            padding: 1.2rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.8rem;
            color: #ffb347;
            border-bottom: 2px solid #ffb347;
            display: inline-block;
            margin-bottom: 1rem;
        }
        .sub {
            color: #aaa;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }
        .card {
            background: rgba(26,42,31,0.85);
            border-radius: 28px;
            padding: 1rem;
            margin-bottom: 2rem;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.8rem;
            margin-bottom: 1rem;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .field label {
            font-size: 0.7rem;
            color: #ffb347;
            font-weight: bold;
        }
        input, select {
            background: #2a3a2f;
            border: 1px solid #ffb347;
            border-radius: 20px;
            padding: 0.4rem 0.7rem;
            color: white;
            font-size: 0.8rem;
        }
        button {
            background: #ffb347;
            color: #1a2a1f;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            padding: 0.4rem 1.2rem;
            cursor: pointer;
            font-size: 0.8rem;
            margin: 0.2rem 0.2rem 0 0;
        }
        button.danger {
            background: #9b2c2c;
            color: white;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }
        .search-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
            margin-bottom: 1rem;
        }
        .search-item {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            overflow-x: auto;
            display: block;
        }
        th, td {
            padding: 0.4rem 0.2rem;
            text-align: center;
            border-bottom: 1px solid #2f4035;
        }
        th {
            background: #2a3a2f;
            color: #ffb347;
        }
        .delete-btn, .edit-btn {
            background: #6e2c2c;
            padding: 0.2rem 0.6rem;
            font-size: 0.65rem;
            margin: 0 2px;
        }
        .edit-btn { background: #2c6e6e; }
        .stats {
            background: #162218;
            border-radius: 18px;
            padding: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.75rem;
        }
        .disclaimer {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 1.5rem;
            color: #aaa;
        }
        @media (max-width: 700px) {
            .form-grid { grid-template-columns: 1fr; }
            .search-bar { flex-direction: column; }
            th, td { font-size: 0.65rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🏇 派彩記錄器</h1>
    <div class="sub">獨贏 · 位置 · 連贏 · 三重彩 · 四重彩｜已預載 2026-04-29 跑馬地夜賽 9 場完整賽果</div>

    <!-- 輸入表單 -->
    <div class="card">
        <div style="font-weight: bold; margin-bottom: 0.8rem;">📝 新增 / 編輯 派彩記錄</div>
        <div class="form-grid">
            <div class="field"><label>日期</label><input type="date" id="date" value="2026-04-29"></div>
            <div class="field"><label>場地名稱</label><select id="venue"><option value="跑馬地">跑馬地</option><option value="沙田">沙田</option></select></div>
            <div class="field"><label>場次 (R)</label><input type="number" id="raceNum" value="1" min="1" max="12"></div>
            <div class="field"><label>班次/路程</label><input type="text" id="classDist" placeholder="例: 四班1200米"></div>
            <div class="field"><label>頭馬名稱</label><input type="text" id="winner" placeholder="馬名"></div>
            <div class="field"><label>第二名</label><input type="text" id="second" placeholder="馬名"></div>
            <div class="field"><label>第三名</label><input type="text" id="third" placeholder="馬名"></div>
            <div class="field"><label>第四名</label><input type="text" id="fourth" placeholder="馬名"></div>
            <div class="field"><label>獨贏派彩 ($)</label><input type="number" id="winDiv" step="0.5" placeholder="例: 33.5"></div>
            <div class="field"><label>位置派彩 (頭馬)</label><input type="number" id="place1" step="0.5" placeholder="例: 14.5"></div>
            <div class="field"><label>位置派彩 (第二名)</label><input type="number" id="place2" step="0.5" placeholder="例: 17.0"></div>
            <div class="field"><label>位置派彩 (第三名)</label><input type="number" id="place3" step="0.5" placeholder="例: 49.0"></div>
            <div class="field"><label>連贏派彩 ($)</label><input type="number" id="quinellaDiv" step="0.5" placeholder="例: 92.5"></div>
            <div class="field"><label>三重彩派彩 ($)</label><input type="number" id="tripleDiv" step="0.5" placeholder="例: 2486"></div>
            <div class="field"><label>四重彩派彩 ($)</label><input type="number" id="quartetDiv" step="0.5" placeholder="例: 24097"></div>
            <div class="field"><label>備註</label><input type="text" id="remark" placeholder="選填"></div>
        </div>
        <div class="btn-group">
            <button id="saveBtn">💾 儲存記錄</button>
            <button id="clearFormBtn">🗑️ 清空表單</button>
            <button id="exportBtn">📄 匯出 JSON</button>
            <button id="deleteAllBtn" class="danger">⚠️ 刪除全部記錄</button>
        </div>
    </div>

    <!-- 查詢及列表 -->
    <div class="card">
        <div style="font-weight: bold; margin-bottom: 0.8rem;">🔍 查詢記錄</div>
        <div class="search-bar">
            <div class="search-item"><label>篩選日期</label><input type="date" id="filterDate"></div>
            <div class="search-item"><label>篩選場地</label><select id="filterVenue"><option value="">全部</option><option value="跑馬地">跑馬地</option><option value="沙田">沙田</option></select></div>
            <div class="search-item"><label>篩選場次</label><input type="number" id="filterRaceNum" placeholder="場次" style="width:70px;"></div>
            <div class="search-item"><button id="searchBtn">🔍 查詢</button><button id="resetFilterBtn">重置篩選</button></div>
        </div>
        <div id="statsArea" class="stats"></div>
        <div style="overflow-x: auto;">
            <table id="resultTable">
                <thead>
                    <tr><th>日期</th><th>場地</th><th>場次</th><th>班次/路程</th><th>頭馬</th><th>二馬</th><th>三馬</th><th>四馬</th><th>獨贏</th><th>位置(1,2,3)</th><th>連贏</th><th>三重彩</th><th>四重彩</th><th>備註</th><th>操作</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="disclaimer">
        💡 所有資料儲存於瀏覽器 localStorage，可匯出 JSON 備份。支援編輯/刪除，即時更新。<br>
        📅 已預先載入 2026-04-29 跑馬地 C 賽道 9 場賽果（資料來自官方派彩）。
    </div>
</div>

    // 初始化資料庫（僅在無資料時寫入預設，避免覆蓋既有其他日期記錄）
    function initData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (!stored) {
            // 無資料才寫入預設（包括4月29日9場）
            const withIds = defaultRecords.map((r, idx) => ({ ...r, id: Date.now() + idx }));
            localStorage.setItem(STORAGE_KEY, JSON.stringify(withIds));
        } else {
            // 若有資料，但可能缺少4月29日的記錄，可以選擇合併（簡單起見，不做合併，避免刪除既有）
            // 此處保留原有資料，不自動覆蓋。用戶可手動新增或編輯。
        }
    }

    function loadAll() {
        const stored = localStorage.getItem(STORAGE_KEY);
        return stored ? JSON.parse(stored) : [];
    }

    function saveAll(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function addRecord(record) {
        const data = loadAll();
        record.id = Date.now();
        data.unshift(record);
        saveAll(data);
        return data;
    }

    function updateRecord(id, updatedRecord) {
        let data = loadAll();
        const index = data.findIndex(r => r.id == id);
        if (index !== -1) {
            data[index] = { ...updatedRecord, id: parseInt(id) };
            saveAll(data);
        }
        return data;
    }

    function deleteRecord(id) {
        let data = loadAll();
        data = data.filter(r => r.id != id);
        saveAll(data);
        return data;
    }

    function deleteAllRecords() {
        if (confirm('⚠️ 確定要刪除所有賽果記錄？此操作無法復原！')) {
            saveAll([]);
            applyFilter();
            alert('所有記錄已刪除。');
        }
    }

    let editingId = null;

    function renderTable(filtered) {
        const tbody = document.getElementById('tableBody');
        if (!filtered.length) {
            tbody.innerHTML = '<tr><td colspan="15" style="text-align:center;">暫無派彩記錄</td></tr>';
            document.getElementById('statsArea').innerHTML = '📊 共 0 筆記錄';
            return;
        }
        let html = '';
        filtered.forEach(r => {
            const placeStr = `${r.place1 || '-'} / ${r.place2 || '-'} / ${r.place3 || '-'}`;
            html += `<tr>
                <td>${r.date}</td>
                <td>${r.venue}</td>
                <td>${r.raceNum}</td>
                <td>${escapeHtml(r.classDist || '-')}</td>
                <td style="color:#ffb347;">${escapeHtml(r.winner)}</td>
                <td>${escapeHtml(r.second || '-')}</td>
                <td>${escapeHtml(r.third || '-')}</td>
                <td>${escapeHtml(r.fourth || '-')}</td>
                <td>${r.winDiv ? `$${r.winDiv.toFixed(2)}` : '-'}</td>
                <td>${placeStr}</td>
                <td>${r.quinellaDiv ? `$${r.quinellaDiv.toFixed(2)}` : '-'}</td>
                <td>${r.tripleDiv ? `$${r.tripleDiv.toFixed(2)}` : '-'}</td>
                <td>${r.quartetDiv ? `$${r.quartetDiv.toFixed(2)}` : '-'}</td>
                <td>${escapeHtml(r.remark || '-')}</td>
                <td>
                    <button class="edit-btn" data-id="${r.id}">✏️</button>
                    <button class="delete-btn" data-id="${r.id}">🗑️</button>
                  </td>
            </tr>`;
        });
        tbody.innerHTML = html;
        const totalRaces = filtered.length;
        const totalQuartet = filtered.filter(r => r.quartetDiv && r.quartetDiv > 0).length;
        const sumQuartet = filtered.reduce((s, r) => s + (r.quartetDiv || 0), 0);
        document.getElementById('statsArea').innerHTML = `📊 共 ${totalRaces} 場 | 已記錄四重彩派彩: ${totalQuartet} 場 | 四重彩總派彩: $${sumQuartet.toLocaleString()}`;

        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                const record = filtered.find(r => r.id === id);
                if (record) loadToForm(record, id);
            });
        });
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                if (confirm('確定刪除此筆記錄？')) {
                    deleteRecord(id);
                    applyFilter();
                }
            });
        });
    }

    function loadToForm(record, id) {
        document.getElementById('date').value = record.date;
        document.getElementById('venue').value = record.venue;
        document.getElementById('raceNum').value = record.raceNum;
        document.getElementById('classDist').value = record.classDist || '';
        document.getElementById('winner').value = record.winner;
        document.getElementById('second').value = record.second || '';
        document.getElementById('third').value = record.third || '';
        document.getElementById('fourth').value = record.fourth || '';
        document.getElementById('winDiv').value = record.winDiv || '';
        document.getElementById('place1').value = record.place1 || '';
        document.getElementById('place2').value = record.place2 || '';
        document.getElementById('place3').value = record.place3 || '';
        document.getElementById('quinellaDiv').value = record.quinellaDiv || '';
        document.getElementById('tripleDiv').value = record.tripleDiv || '';
        document.getElementById('quartetDiv').value = record.quartetDiv || '';
        document.getElementById('remark').value = record.remark || '';
        editingId = id;
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.textContent = '✏️ 更新記錄';
    }

    function getFormData() {
        return {
            date: document.getElementById('date').value,
            venue: document.getElementById('venue').value,
            raceNum: parseInt(document.getElementById('raceNum').value),
            classDist: document.getElementById('classDist').value,
            winner: document.getElementById('winner').value,
            second: document.getElementById('second').value,
            third: document.getElementById('third').value,
            fourth: document.getElementById('fourth').value,
            winDiv: parseFloat(document.getElementById('winDiv').value) || 0,
            place1: parseFloat(document.getElementById('place1').value) || 0,
            place2: parseFloat(document.getElementById('place2').value) || 0,
            place3: parseFloat(document.getElementById('place3').value) || 0,
            quinellaDiv: parseFloat(document.getElementById('quinellaDiv').value) || 0,
            tripleDiv: parseFloat(document.getElementById('tripleDiv').value) || 0,
            quartetDiv: parseFloat(document.getElementById('quartetDiv').value) || 0,
            remark: document.getElementById('remark').value
        };
    }

    function clearForm() {
        document.getElementById('date').value = '2026-04-29';
        document.getElementById('venue').value = '跑馬地';
        document.getElementById('raceNum').value = '1';
        document.getElementById('classDist').value = '';
        document.getElementById('winner').value = '';
        document.getElementById('second').value = '';
        document.getElementById('third').value = '';
        document.getElementById('fourth').value = '';
        document.getElementById('winDiv').value = '';
        document.getElementById('place1').value = '';
        document.getElementById('place2').value = '';
        document.getElementById('place3').value = '';
        document.getElementById('quinellaDiv').value = '';
        document.getElementById('tripleDiv').value = '';
        document.getElementById('quartetDiv').value = '';
        document.getElementById('remark').value = '';
        editingId = null;
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.textContent = '💾 儲存記錄';
    }

    function saveRecord() {
        const data = getFormData();
        if (!data.date || !data.winner) {
            alert('請填寫日期及頭馬名稱');
            return;
        }
        if (editingId !== null) {
            updateRecord(editingId, data);
            alert('記錄已更新');
        } else {
            addRecord(data);
            alert('記錄已新增');
        }
        clearForm();
        applyFilter();
    }

    function applyFilter() {
        const filterDate = document.getElementById('filterDate').value;
        const filterVenue = document.getElementById('filterVenue').value;
        const filterRaceNum = document.getElementById('filterRaceNum').value;
        let data = loadAll();
        if (filterDate) data = data.filter(r => r.date === filterDate);
        if (filterVenue) data = data.filter(r => r.venue === filterVenue);
        if (filterRaceNum) data = data.filter(r => r.raceNum == filterRaceNum);
        data.sort((a,b) => new Date(b.date) - new Date(a.date));
        renderTable(data);
    }

    function exportJSON() {
        const data = loadAll();
        const dataStr = JSON.stringify(data, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `SHTSN_payouts_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 初始化
    initData();
    document.getElementById('saveBtn').addEventListener('click', saveRecord);
    document.getElementById('clearFormBtn').addEventListener('click', clearForm);
    document.getElementById('searchBtn').addEventListener('click', applyFilter);
    document.getElementById('resetFilterBtn').addEventListener('click', () => {
        document.getElementById('filterDate').value = '';
        document.getElementById('filterVenue').value = '';
        document.getElementById('filterRaceNum').value = '';
        applyFilter();
    });
    document.getElementById('exportBtn').addEventListener('click', exportJSON);
    document.getElementById('deleteAllBtn').addEventListener('click', deleteAllRecords);
    applyFilter();
</script>
