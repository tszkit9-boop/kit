<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SHTSN 跑馬地馬場系統 | 谷草夜賽</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f1a0f; font-family: system-ui, 'Segoe UI', sans-serif; color: #e6f0e6; padding: 1rem; }
        .container { max-width: 1300px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 1.5rem; border-bottom: 2px solid #88ff88; padding-bottom: 0.5rem; }
        .header h1 { font-size: 1.8rem; color: #88ff88; }
        .sub { font-size: 0.75rem; opacity: 0.8; }
        .race-card { background: rgba(26,42,31,0.9); border-radius: 24px; margin-bottom: 1.5rem; padding: 1rem; }
        .race-title { font-size: 1.2rem; font-weight: bold; border-left: 4px solid #88ff88; padding-left: 0.6rem; margin-bottom: 0.8rem; }
        .predict-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .predict-table th, .predict-table td { text-align: center; padding: 0.4rem; border-bottom: 1px solid #2f4035; }
        .predict-table th { background: #2a3a2f; color: #88ff88; }
        .top3 { background: #2a4a2a; font-weight: bold; }
        .bet-slip { background: #111d15; border-radius: 14px; padding: 0.6rem; margin-top: 0.8rem; font-size: 0.75rem; }
        .warning { background: #2a2a1a; border-left: 4px solid #ffaa66; padding: 0.3rem; margin: 0.5rem 0; font-size: 0.7rem; }
        .verify-panel { background: #132015; border-radius: 24px; padding: 1rem; margin-top: 1rem; border: 1px solid #88ff88; }
        .stats-box { background: #0a130e; border-radius: 18px; padding: 0.8rem; margin-top: 0.5rem; font-size: 0.75rem; }
        .calc-btn { background: #88ff88; color: #1a2a1f; border: none; border-radius: 30px; padding: 5px 14px; cursor: pointer; margin-right: 8px; }
        .disclaimer { font-size: 0.65rem; text-align: center; margin-top: 1.5rem; background: #0a130e; border-radius: 16px; padding: 0.5rem; }
        input, select { background: #2a3a2f; border: 1px solid #88ff88; padding: 2px 5px; border-radius: 12px; color: white; }
        @media (max-width: 700px) { .predict-table th, .predict-table td { font-size: 0.65rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌙 SHTSN 跑馬地馬場系統 (谷草專用)</h1>
        <div class="sub">內檔高加成 | 彎位後上補償 | 自動錯誤分析 | 版本 V8.0_HV</div>
        <div class="sub">請於下方輸入賽事資料 (馬匹、檔位、負磅、騎練、賠率) 或載入範例</div>
    </div>

    <div style="margin-bottom:1rem;">
        <button class="calc-btn" id="loadExampleBtn">載入跑馬地範例賽事 (4場)</button>
        <button class="calc-btn" id="addRaceBtn">➕ 新增賽事</button>
    </div>

    <div id="racesContainer"></div>

    <div class="verify-panel">
        <div class="race-title">📈 賽後驗證 & 參數更正</div>
        <div id="resultInputs"></div>
        <button class="calc-btn" id="calcBtn">✅ 計算命中率</button>
        <button class="calc-btn" id="analyzeBtn">🔍 分析失誤並建議</button>
        <button class="calc-btn" id="applyFixBtn">⚙️ 套用更正參數</button>
        <div id="stats" class="stats-box"></div>
    </div>
    <div class="disclaimer">
        🧾 跑馬地系統預設內檔(1-3檔)短途加成12分，外檔明星騎師提供補償。所有預測均附誠實聲明。
    </div>
</div>

<script>
    // 跑馬地專用參數 (內檔加成更高)
    let HV_PARAMS = {
        innerBonusShort: 12,      // 谷草1200m以下1-3檔加分
        outerBonusDraw12: 28,
        longDistanceBackBonus: 10,
        extremeLongshotBonus: 6,
        overheatPenaltyBase: 5
    };

    function getJockeyScoreHV(j) {
        const map = { "潘頓":96,"莫雷拉":95,"布文":92,"田泰安":86,"艾兆禮":82,"巴度":80,"班德禮":78,"蔡明紹":76,"何澤堯":80,"梁家俊":74,"霍宏聲":75,"希威森":78,"周俊樂":72,"潘明輝":72,"袁幸堯":68,"黃寶妮":65,"鍾易禮":65,"巫顯東":65,"楊明倫":65 };
        return map[j] || 70;
    }
    function getTrainerScoreHV(t) {
        const map = { "蔡約翰":92,"方嘉柏":90,"羅富全":88,"沈集成":88,"姚本輝":86,"大衛希斯":84,"告東尼":84,"伍鵬志":82,"廖康銘":80,"賀賢":80,"葉楚航":76,"文家良":76,"徐雨石":74,"鄭俊偉":72,"丁冠豪":72,"游達榮":78,"蘇偉賢":78,"韋達":76,"黎昭昇":76,"呂健威":74 };
        return map[t] || 70;
    }
    function getDrawScoreHV(draw, dist) {
        if (dist <= 1200) {
            if (draw <= 3) return 12;
            if (draw <= 6) return 8;
            if (draw <= 9) return 4;
            return 1;
        } else {
            if (draw <= 3) return 10;
            if (draw <= 6) return 7;
            if (draw <= 9) return 5;
            return 2;
        }
    }
    function getWeightScoreHV(lb) {
        if (lb <= 115) return 10;
        if (lb <= 122) return 8;
        if (lb <= 129) return 5;
        if (lb <= 133) return 3;
        return 2;
    }
    function oddsToScoreHV(odds) {
        return Math.max(0, Math.min(100, 100 - (odds - 2) * 6));
    }
    function getOuterBonusHV(draw, jockey, odds) {
        const stars = ["潘頓","莫雷拉","布文"];
        if (!stars.includes(jockey)) return 0;
        if (odds > 8) return 0;
        if (draw >= 10 && draw <= 11 && odds <= 5) return 20;
        if (draw >= 12 && odds <= 5) return HV_PARAMS.outerBonusDraw12;
        if (draw >= 8 && draw <= 9 && odds <= 5) return 14;
        return 0;
    }
    function getLongDistBackBonusHV(horse, dist) {
        if (dist >= 1650 && (horse.draw >= 7 || horse.odds > 10)) return HV_PARAMS.longDistanceBackBonus;
        return 0;
    }
    function computeTotalScoreHV(horse, dist) {
        let drawScore = getDrawScoreHV(horse.draw, dist);
        let weightScore = getWeightScoreHV(horse.lb);
        let jockeyScore = getJockeyScoreHV(horse.jockey);
        let trainerScore = getTrainerScoreHV(horse.trainer);
        let odds = horse.odds || 12;
        let oddsScore = oddsToScoreHV(odds);
        let qimenBase = (horse.draw<=3?88: horse.draw<=6?75: horse.draw<=9?58:42);
        let starBonus = (["潘頓","莫雷拉","布文"].includes(horse.jockey) ? 10 : (horse.jockey==="田泰安"?5:0));
        let qimenScore = qimenBase + starBonus + (horse.draw<=3?5:0);
        let dataScore = (drawScore * 0.4 + weightScore * 0.3 + (jockeyScore/10) * 0.3) * 10;
        let final = qimenScore * 0.5 + dataScore * 0.3 + oddsScore * 0.2;
        final += getOuterBonusHV(horse.draw, horse.jockey, odds) + getLongDistBackBonusHV(horse, dist);
        return { final, odds };
    }

    // 動態賽事陣列
    let racesHV = [];

    function renderAllRaces() {
        const container = document.getElementById('racesContainer');
        container.innerHTML = '';
        if (racesHV.length === 0) {
            container.innerHTML = '<div class="race-card">暫無賽事，請按「載入範例」或「新增賽事」。</div>';
            return;
        }
        for (let i=0; i<racesHV.length; i++) {
            const r = racesHV[i];
            const withScores = r.horses.map(h => {
                const res = computeTotalScoreHV(h, r.dist);
                return { name: h.n, total: res.final, odds: res.odds, draw: h.draw, lb: h.lb, jockey: h.jockey, trainer: h.trainer };
            });
            withScores.sort((a,b) => b.total - a.total);
            const top4 = withScores.slice(0,4).map(x=>x.name);
            const top3 = top4.slice(0,3);
            const leadMargin = withScores[0].total - withScores[1].total;
            const warn = leadMargin < 5 ? '<div class="warning">⚠️ 頭馬優勢不足5分，谷草易爆冷，建議膽拖。</div>' : '';
            const card = document.createElement('div');
            card.className = 'race-card';
            card.innerHTML = `
                <div class="race-title">🏇 ${r.name} (${r.dist}m) 
                    <button class="calc-btn" style="float:right; background:#444;" data-delidx="${i}">🗑️ 刪除</button>
                </div>
                <table class="predict-table">
                    <thead><tr><th>名次</th><th>馬匹</th><th>綜合分</th><th>檔位</th><th>負磅</th><th>騎師</th></tr></thead>
                    <tbody>
                        ${withScores.map((h,idx) => `<tr ${idx<3?'class=top3':''}><td>${idx+1}</td><td>${h.name}</td><td>${h.total.toFixed(1)}</td><td>${h.draw}</td><td>${h.lb}</td><td>${h.jockey}</td></tr>`).join('')}
                    </tbody>
                </table>
                ${warn}
                <div class="bet-slip">
                    <strong>💰 投注建議 (跑馬地系統)</strong><br>
                    獨贏：${top3[0]}<br>
                    連贏：${top3[0]} + ${top3[1]}<br>
                    位置Q：${top3.join(', ')}<br>
                    三重彩單式：${top3[0]} > ${top3[1]} > ${top3[2]}<br>
                    四連環：${top4.join(', ')}<br>
                </div>
            `;
            container.appendChild(card);
        }
        document.querySelectorAll('[data-delidx]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.getAttribute('data-delidx'));
                racesHV.splice(idx,1);
                renderAllRaces();
                buildResultInputs();
            });
        });
    }

    function buildResultInputs() {
        const div = document.getElementById('resultInputs');
        div.innerHTML = '';
        for (let i=0; i<racesHV.length; i++) {
            const row = document.createElement('div');
            row.style.display='flex'; row.style.flexWrap='wrap'; row.style.gap='5px'; row.style.marginBottom='8px';
            row.innerHTML = `
                <span style="width:120px;">${racesHV[i].name}</span>
                <input id="hv_res_${i}_1" placeholder="頭馬" size="8">
                <input id="hv_res_${i}_2" placeholder="二馬" size="8">
                <input id="hv_res_${i}_3" placeholder="三馬" size="8">
                <input id="hv_res_${i}_4" placeholder="四馬" size="8">
            `;
            div.appendChild(row);
        }
    }

    function computeHitRateHV() {
        let tripleHit=0, quartetHit=0, valid=0;
        for (let i=0; i<racesHV.length; i++) {
            const w = document.getElementById(`hv_res_${i}_1`)?.value.trim();
            const s = document.getElementById(`hv_res_${i}_2`)?.value.trim();
            const t = document.getElementById(`hv_res_${i}_3`)?.value.trim();
            const f = document.getElementById(`hv_res_${i}_4`)?.value.trim();
            if(!w || !s || !t) continue;
            valid++;
            const withScores = racesHV[i].horses.map(h => {
                const sc = computeTotalScoreHV(h, racesHV[i].dist);
                return { name: h.n, total: sc.final };
            });
            withScores.sort((a,b)=>b.total-a.total);
            const predTop3 = withScores.slice(0,3).map(x=>x.name);
            const predTop4 = withScores.slice(0,4).map(x=>x.name);
            if(w===predTop3[0] && s===predTop3[1] && t===predTop3[2]) tripleHit++;
            if(f && w===predTop4[0] && s===predTop4[1] && t===predTop4[2] && f===predTop4[3]) quartetHit++;
        }
        const tripleRate = valid ? (tripleHit/valid*100).toFixed(1) : 0;
        const quartetRate = valid ? (quartetHit/valid*100).toFixed(1) : 0;
        let history = JSON.parse(localStorage.getItem('SHTSN_HV_hitrate') || '[]');
        history.push({ date:new Date().toISOString().slice(0,10), tripleHit, tripleTotal:valid, quartetHit, quartetTotal:valid, tripleRate, quartetRate });
        localStorage.setItem('SHTSN_HV_hitrate', JSON.stringify(history));
        displayStatsHV(history);
    }

    function displayStatsHV(history) {
        let totalTriple=0, totalTripleCnt=0, totalQuartet=0, totalQuartetCnt=0;
        history.forEach(d=>{ totalTriple+=d.tripleHit; totalTripleCnt+=d.tripleTotal; totalQuartet+=d.quartetHit; totalQuartetCnt+=d.quartetTotal; });
        const overallTriple = totalTripleCnt ? (totalTriple/totalTripleCnt*100).toFixed(1) : 0;
        const overallQuartet = totalQuartetCnt ? (totalQuartet/totalQuartetCnt*100).toFixed(1) : 0;
        document.getElementById('stats').innerHTML = `
            <div>📊 跑馬地累積命中率：三重彩 ${overallTriple}% | 四重彩 ${overallQuartet}%</div>
            <div>📅 最新一場：三重彩 ${history[history.length-1]?.tripleRate||0}% 四重彩 ${history[history.length-1]?.quartetRate||0}%</div>
        `;
    }

    function loadExample() {
        racesHV = [
            { name:"示範1 四班1200米", dist:1200, horses:[
                {n:"金鼓齊鳴",draw:2,lb:128,jockey:"潘頓",trainer:"蔡約翰",odds:3.5},
                {n:"大眾開心",draw:5,lb:125,jockey:"莫雷拉",trainer:"方嘉柏",odds:4.2},
                {n:"合夥年代",draw:1,lb:130,jockey:"布文",trainer:"沈集成",odds:5.0},
                {n:"快馬加鞭",draw:9,lb:119,jockey:"田泰安",trainer:"羅富全",odds:12}
            ]},
            { name:"示範2 三班1650米", dist:1650, horses:[
                {n:"威武覺醒",draw:3,lb:121,jockey:"潘頓",trainer:"大衛希斯",odds:4.0},
                {n:"鴻圖巨星",draw:7,lb:125,jockey:"莫雷拉",trainer:"告東尼",odds:5.5},
                {n:"精算八方",draw:11,lb:118,jockey:"巴度",trainer:"蔡約翰",odds:8.0},
                {n:"行雲流水",draw:2,lb:128,jockey:"布文",trainer:"方嘉柏",odds:6.0}
            ]}
        ];
        renderAllRaces();
        buildResultInputs();
    }

    function addRace() {
        const name = prompt("輸入賽事名稱 (例: 第3場 四班1200米)");
        if(!name) return;
        const dist = parseInt(prompt("路程 (米): 1200/1650/1800") || "1200");
        const horseCount = parseInt(prompt("馬匹數量 (2-14)") || "4");
        let horses = [];
        for(let i=1;i<=horseCount;i++){
            let n = prompt(`馬匹${i} 名稱`);
            let draw = parseInt(prompt(`${n} 檔位 (1-14)`));
            let lb = parseInt(prompt(`${n} 負磅`));
            let jockey = prompt(`${n} 騎師`);
            let trainer = prompt(`${n} 練馬師`);
            let odds = parseFloat(prompt(`${n} 獨贏賠率 (約數)`, "10"));
            horses.push({n, draw, lb, jockey, trainer, odds});
        }
        racesHV.push({ name, dist, horses });
        renderAllRaces();
        buildResultInputs();
    }

    document.getElementById('loadExampleBtn').addEventListener('click', loadExample);
    document.getElementById('addRaceBtn').addEventListener('click', addRace);
    document.getElementById('calcBtn').addEventListener('click', computeHitRateHV);
    document.getElementById('analyzeBtn').addEventListener('click', () => alert("請先輸入真實賽果，再按計算命中率。參數可於程式碼中手動調整 HV_PARAMS。"));
    document.getElementById('applyFixBtn').addEventListener('click', () => alert("跑馬地系統參數可手動修改 HV_PARAMS 物件。"));
    // 初始化空狀態
    renderAllRaces();
    buildResultInputs();
    let hist = localStorage.getItem('SHTSN_HV_hitrate');
    if(hist) displayStatsHV(JSON.parse(hist));
</script>
</body>
</html>
