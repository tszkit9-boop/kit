            "艾道拿":72,"何澤堯":80 };
        return map[j] || 70;
    }
    // 練馬師評分
    function getTrainerScore(t) {
        const map = { "蔡約翰":92,"羅富全":90,"方嘉柏":88,"沈集成":88,"姚本輝":86,"大衛希斯":84,"告東尼":84,"伍鵬志":82,

            "蘇偉賢":78,"韋達":76,"黎昭昇":78,"呂健威":76,"巫偉傑":74,"桂福特":72 };
        return map[t] || 70;
    }
    // 檔位分 (依場地及距離調整)
    function getDrawScore(draw, dist, ground, backBonus) {
        // 黏地/軟地時外檔加分 (backMareBonus)，此處只回基礎分
        if (ground === 'yielding' || ground === 'heavy') {
            if (draw >= 7) return 85;
            if (draw >= 4) return 70;
            return 60;
        } else {
            // 好地/泥地：內檔優勢
            if (dist <= 1200) {
                if (draw <= 3) return 88;
                if (draw <= 6) return 75;
                if (draw <= 9) return 60;
                return 45;
            } else {
                if (draw <= 3) return 85;
                if (draw <= 6) return 72;
                if (draw <= 9) return 58;
                return 42;
            }
        }
    }
    // 場地派 + 天氣派合併評分
    function getGroundWeatherScore(ground, weather) {
        let score = 70;
        if (ground === 'good') score = 85;
        else if (ground === 'goodToYielding') score = 75;
        else if (ground === 'yielding') score = 65;
        else if (ground === 'heavy') score = 55;
        else if (ground === 'dirt') score = 80;
        if (weather === 'fine') score += 5;
        else if (weather === 'rain' && (ground === 'yielding' || ground === 'heavy')) score += 8;
        return Math.min(100, score);
    }
    // 步速後上加成 (基於場地及檔位)
    function getBackMareBonus(draw, dist, ground) {
        if ((ground === 'yielding' || ground === 'heavy') && draw >= 7 && dist >= 1200) return 12;
        if (ground === 'good' && draw <= 3 && dist <= 1200) return -5;
        return 0;
    }

    // 綜合評分 (19派別濃縮)
    function computeTotalScore(horse, dist, ground, weather) {
        let drawScore = getDrawScore(horse.draw, dist, ground, 0);
        let weightScore = horse.lb <= 115 ? 10 : horse.lb <= 122 ? 8 : horse.lb <= 129 ? 5 : horse.lb <= 133 ? 3 : 2;
        let jockeyScore = getJockeyScore(horse.jockey);
        let trainerScore = getTrainerScore(horse.trainer);
        let oddsScore = Math.max(0, 100 - (horse.odds - 2) * 6);
        let groundWeatherScore = getGroundWeatherScore(ground, weather);
        let backBonus = getBackMareBonus(horse.draw, dist, ground);
        // 奇門派簡化 (檔位基礎+明星騎師)
        let qimenBase = (horse.draw<=3?85: horse.draw<=6?72: horse.draw<=9?58:42);
        let starBonus = (["潘頓","莫雷拉","布文"].includes(horse.jockey) ? 8 : 0);
        let qimenScore = Math.min(100, qimenBase + starBonus);
        // 數據派 (檔位+負磅+騎師)
        let dataScore = (drawScore * 0.35 + weightScore * 0.35 + (jockeyScore/10) * 0.3) * 10;
        // 權重分配 (19派別濃縮)
        let total = qimenScore * 0.12 + dataScore * 0.12 + oddsScore * 0.10 + groundWeatherScore * 0.15 + backBonus * 0.05;
        total += jockeyScore * 0.10 + trainerScore * 0.08;
        return total;
    }

    function renderAllPredictions() {
        const ground = document.getElementById('groundSelect').value;
        const weather = document.getElementById('weatherSelect').value;
        const container = document.getElementById('racesContainer');
        container.innerHTML = '';
        for (let race of racesData) {
            const withScores = race.horses.map(h => ({
                name: h.name,
                score: computeTotalScore(h, race.distance, ground, weather),
                odds: h.odds,
                draw: h.draw,
                jockey: h.jockey
            }));
            withScores.sort((a,b) => b.score - a.score);
            const top1 = withScores[0], top2 = withScores[1], top3 = withScores[2], top4 = withScores[3], top5 = withScores[4];
            const overheat = top1.odds <= 3.5 ? '<span class="overheat-warning">⚠️ 過熱</span>' : '';
            const card = document.createElement('div');
            card.className = 'race-card';
            card.innerHTML = `
                <div class="race-title">🏇 ${race.name} (${race.distance}m) | 場地:${ground} 天氣:${weather}</div>
                <table class="bet-table">
                    <tr><th>獨贏</th><td><span class="horse-number">${top1.name}</span> (${top1.odds}倍) ${overheat}<br>次選 ${top2.name} (${top2.odds}倍)<br>冷選 ${top3.name} (${top3.odds}倍) </div> </div> </th> </tr>
                    <tr><th>位置</th><td>${top1.name}, ${top2.name}, ${top3.name} </div> </th> </tr>
                    <tr><th>連贏 (膽拖)</th><td>膽：${top1.name}，拖：${top2.name}, ${top3.name}, ${top4.name} </div> </th> </tr>
                    <tr><th>位置Q (複式)</th><td>${top1.name}, ${top2.name}, ${top3.name}, ${top4.name} </div> </th> </tr>
                    <tr><th>三重彩 (膽拖)</th><td>膽 ${top1.name} → 拖 ${top2.name},${top3.name},${top4.name} → 拖 ${top2.name},${top3.name},${top4.name},${top5.name} </div> </th> </tr>
                    <tr><th>四連環 (複式)</th><td>複式5匹：${top1.name}, ${top2.name}, ${top3.name}, ${top4.name}, ${top5.name} <span class="cold-badge">提升覆蓋率</span> </div> </th> </tr>
                    <tr><th>四重彩 (膽拖)</th><td>膽 ${top1.name} → 拖 ${top2.name},${top3.name},${top4.name} → 拖 ${top2.name},${top3.name},${top4.name},${top5.name} → 拖 ${top2.name},${top3.name},${top4.name},${top5.name},${withScores[5]?.name} </div> </th> </tr>
                </table>
                <div class="sub">📊 綜合評分包含奇門、數據、賠率、場地天氣、步速後上加成</div>
            `;
            container.appendChild(card);
        }
    }

    document.getElementById('refreshBtn').addEventListener('click', renderAllPredictions);
