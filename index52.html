    function getJockeyScore(j) {
        const map = { "潘頓":96,"莫雷拉":95,"布文":92,"田泰安":86,"艾兆禮":82,"巴度":80,"班德禮":78,"蔡明紹":76,

            "艾道拿":72,"何澤堯":80 };
        return map[j] || 70;
    }
    function getTrainerScore(t) {
        const map = { "蔡約翰":92,"羅富全":90,"方嘉柏":88,"沈集成":88,"姚本輝":86,"大衛希斯":84,"告東尼":84,"伍鵬志":82,

            "蘇偉賢":78,"韋達":76,"黎昭昇":78,"呂健威":76,"巫偉傑":74,"桂福特":72 };
        return map[t] || 70;
    }
    function getDrawScore(draw, dist) {
        if (dist <= 1200) {
            if (draw <= 3) return 90;
            if (draw <= 6) return 75;
            if (draw <= 9) return 55;
            return 35;
        } else {
            if (draw <= 3) return 85;
            if (draw <= 6) return 70;
            if (draw <= 9) return 50;
            return 30;
        }
    }
    function getWeightScore(lb) {
        if (lb <= 115) return 10;
        if (lb <= 122) return 8;
        if (lb <= 129) return 5;
        if (lb <= 133) return 3;
        return 2;
    }
    function estimateOdds(horse) {
        let base = 12;
        let js = getJockeyScore(horse.jockey);
        let ts = getTrainerScore(horse.trainer);
        if (js >= 90) base -= 5;
        else if (js >= 80) base -= 2;
        if (ts >= 85) base -= 3;
        if (horse.draw <= 3) base -= 2;
        if (horse.draw >= 10) base += 3;
        return Math.max(2.5, Math.min(40, base));
    }
    function oddsToScore(odds) {
        return Math.max(0, Math.min(100, 100 - (odds - 2) * 6));
    }
    function getUpsetBonus(horse, odds) {
        if (odds < 10) return 0;
        let bonus = 0;
        if (horse.draw >= 4 && horse.draw <= 9) bonus += 8;
        if (["潘頓","莫雷拉","布文","田泰安","何澤堯"].includes(horse.jockey)) bonus += 8;
        bonus += 4;
        return Math.min(20, bonus);
    }

    function computeTotalScore(horse, dist) {
        let drawScore = getDrawScore(horse.draw, dist);
        let weightScore = getWeightScore(horse.lb);
        let jockeyScore = getJockeyScore(horse.jockey);
        let trainerScore = getTrainerScore(horse.trainer);
        let odds = estimateOdds(horse);
        let oddsScore = oddsToScore(odds);
        let qimenBase = (horse.draw<=3?85: horse.draw<=6?72: horse.draw<=9?58:42);
        let starBonus = (["潘頓","莫雷拉","布文"].includes(horse.jockey) ? 8 : 0);
        let qimenScore = Math.min(100, qimenBase + starBonus);
        let dataScore = (drawScore * 0.35 + weightScore * 0.35 + (jockeyScore/10) * 0.3) * 10;
        let groundScore = 80;
        let grassBiasScore = (horse.draw <= 3) ? 90 : (horse.draw >= 10 ? 55 : 70);
        let weightChangeScore = 70;
        let upsetBonus = getUpsetBonus(horse, odds);
        let total = 0;
        total += qimenScore * 0.08;
        total += dataScore * 0.08;
        total += oddsScore * 0.04;
        total += ((jockeyScore + trainerScore)/2) * 0.06;
        total += drawScore * 0.08;
        total += groundScore * 0.07;
        total += grassBiasScore * 0.08;
        total += weightChangeScore * 0.10;
        total += upsetBonus * 0.12;
        total += jockeyScore * 0.05;
        if (horse.draw >= 7 && dist >= 1650) total += 8 * 0.04;
        return Math.min(100, total);
    }

                    <td><button class="small-calc" data-race="${rIdx}">更新</button></td>
                 </tr>`;
            });
            table.innerHTML = thead + tbody + `</tbody>`;
            card.appendChild(table);
            const resultDiv = document.createElement('div');
            resultDiv.id = `prediction_${rIdx}`;
            resultDiv.className = 'predict-area';
            card.appendChild(resultDiv);
            container.appendChild(card);
        }
        document.querySelectorAll('.small-calc').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const raceIdx = parseInt(btn.getAttribute('data-race'));
                updatePrediction(raceIdx);
            });
        });
        for (let i = 0; i < racesData.length; i++) updatePrediction(i);
    }

    function updatePrediction(raceIdx) {
        const race = racesData[raceIdx];
        const jockeyInputs = document.querySelectorAll(`.jockey-input[data-race="${raceIdx}"]`);
        const trainerInputs = document.querySelectorAll(`.trainer-input[data-race="${raceIdx}"]`);
        for (let i = 0; i < race.horses.length; i++) {
            if (jockeyInputs[i]) race.horses[i].jockey = jockeyInputs[i].value.trim() || "未知";
            if (trainerInputs[i]) race.horses[i].trainer = trainerInputs[i].value.trim() || "未知";
        }
        const withScores = race.horses.map(h => {
            const score = computeTotalScore(h, race.dist);
            const odds = estimateOdds(h);
            return { name: h.name, score, odds, draw: h.draw, jockey: h.jockey, trainer: h.trainer };
        });
        withScores.sort((a,b) => b.score - a.score);
        const top5 = withScores.slice(0,5);
        const top1 = top5[0], top2 = top5[1], top3 = top5[2], top4 = top5[3], top5th = top5[4];
        const coldFlag = (top1.odds >= 10) ? '<span class="cold-badge">❄️ 冷門爆發派激活</span>' : '';
        const html = `
            <table class="predict-table">
                <thead><tr><th>名次</th><th>馬匹</th><th>綜合分</th><th>估賠率</th><th>檔位</th><th>騎師</th><th>練馬師</th></thead>
                <tbody>
                    ${withScores.map((h,idx) => `<tr ${idx<3?'class=top3':''}><td>${idx+1}</td><td>${h.name}</td><td>${h.score.toFixed(1)}</td><td>${h.odds.toFixed(1)}</td><td>${h.draw}</td><td>${h.jockey}</td><td>${h.trainer}</td></tr>`).join('')}
                </tbody>
            </table>
            <div class="bet-slip">
                <strong>💰 投注建議 (21派別+冷門派) ${coldFlag}</strong><br>
                獨贏：${top1.name} (${top1.odds.toFixed(1)}倍)<br>
                連贏膽拖：膽 ${top1.name}，拖 ${top2.name}, ${top3.name}, ${top4.name}<br>
                位置Q複式：${top1.name}, ${top2.name}, ${top3.name}, ${top4.name}<br>
                三重彩膽拖：膽 ${top1.name} → 拖 ${top2.name},${top3.name},${top4.name} → 拖 ${top2.name},${top3.name},${top4.name},${top5th.name}<br>
                四連環複式：${top1.name}, ${top2.name}, ${top3.name}, ${top4.name}, ${top5th.name}<br>
                四重彩膽拖：膽 ${top1.name} → 拖 ${top2.name},${top3.name},${top4.name} → 拖 ${top2.name},${top3.name},${top4.name},${top5th.name} → 拖 ${top2.name},${top3.name},${top4.name},${top5th.name},${withScores[5]?.name}
            </div>
        `;
        const resultDiv = document.getElementById(`prediction_${raceIdx}`);
        if (resultDiv) resultDiv.innerHTML = html;
    }

    // 提供常用騎師練馬師的 datalist
    const commonJockeys = ["潘頓","莫雷拉","布文","田泰安","艾兆禮","巴度","班德禮","蔡明紹","何澤堯","梁家俊","潘明輝","希威森","霍宏聲","周俊樂","袁幸堯","黃寶妮","鍾易禮","巫顯東","楊明倫","金誠剛","奧爾民","布浩榮","艾道拿"];
    const commonTrainers = ["蔡約翰","羅富全","方嘉柏","沈集成","姚本輝","大衛希斯","告東尼","伍鵬志","廖康銘","賀賢","葉楚航","文家良","徐雨石","鄭俊偉","丁冠豪","游達榮","蘇偉賢","韋達","黎昭昇","呂健威","巫偉傑","桂福特"];
    const jockeyDatalist = document.createElement('datalist'); jockeyDatalist.id = 'jockeyList';
    commonJockeys.forEach(j => { const opt = document.createElement('option'); opt.value = j; jockeyDatalist.appendChild(opt); });
    const trainerDatalist = document.createElement('datalist'); trainerDatalist.id = 'trainerList';
    commonTrainers.forEach(t => { const opt = document.createElement('option'); opt.value = t; trainerDatalist.appendChild(opt); });
    document.body.appendChild(jockeyDatalist);
    document.body.appendChild(trainerDatalist);

    renderEditableGrid();
</script>
</body>
</html>
