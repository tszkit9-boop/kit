                { number:8, name:"銀亮奔騰", draw:8, lb:120, jockey:"艾兆禮", trainer:"游達榮", odds:0, predictedRank:0, actualRank:"" },
                { number:9, name:"包裝福星", draw:2, lb:119, jockey:"班德禮", trainer:"呂健威", odds:0, predictedRank:0, actualRank:"" },
                { number:10, name:"一起美麗", draw:11, lb:118, jockey:"田泰安", trainer:"蔡約翰", odds:0, predictedRank:0, actualRank:"" },
                { number:11, name:"平凡騎士", draw:5, lb:118, jockey:"莫雷拉", trainer:"方嘉柏", odds:0, predictedRank:0, actualRank:"" }
            ] }
    ];

    let racesParams = [];

    function renderRaces() {
        const container = document.getElementById('racesList');
        if (!racesParams.length) {
            container.innerHTML = '<div class="race-entry" style="text-align:center; padding:1rem;">暫無賽事記錄，請按「新增賽事」。</div>';
            return;
        }
        container.innerHTML = '';
        racesParams.forEach((race, idx) => {
            const raceDiv = document.createElement('div');
            raceDiv.className = 'race-entry';
            raceDiv.innerHTML = `
                <div class="race-header">
                    <input type="text" placeholder="日期" value="${race.date}" data-field="date" data-idx="${idx}" style="width:100px;">
                    <input type="text" placeholder="場地名稱" value="${race.raceName}" data-field="raceName" data-idx="${idx}" style="width:220px;">
                    <input type="number" placeholder="路程(米)" value="${race.distance}" data-field="distance" data-idx="${idx}" style="width:80px;">
                    <select data-field="ground" data-idx="${idx}">
                        <option value="好地" ${race.ground === '好地' ? 'selected' : ''}>好地</option>
                        <option value="好至黏地" ${race.ground === '好至黏地' ? 'selected' : ''}>好至黏地</option>
                        <option value="黏地" ${race.ground === '黏地' ? 'selected' : ''}>黏地</option>
                        <option value="軟地" ${race.ground === '軟地' ? 'selected' : ''}>軟地</option>
                    </select>
                    <select data-field="course" data-idx="${idx}">
                        <option value="C跑道" ${race.course === 'C跑道' ? 'selected' : ''}>C跑道</option>
                        <option value="A跑道" ${race.course === 'A跑道' ? 'selected' : ''}>A跑道</option>
                        <option value="B跑道" ${race.course === 'B跑道' ? 'selected' : ''}>B跑道</option>
                    </select>
                    <button class="danger" data-delidx="${idx}">🗑️ 刪除此場</button>
                </div>
                <div style="overflow-x: auto;">
                    <table class="horses-table">
                        <thead>
                            <tr><th>馬號</th><th>馬名</th><th>檔位</th><th>負磅</th><th>騎師</th><th>練馬師</th><th>賠率</th><th>預測名次</th><th>實際名次</th><th>備註</th> </thead>
                        <tbody>
                            ${race.horses.map((h, hidx) => `
                                <tr>
                                    <td><input type="number" value="${h.number}" data-hidx="${hidx}" data-field="number" data-idx="${idx}" style="width:50px;"></td>
                                    <td><input type="text" value="${h.name}" data-hidx="${hidx}" data-field="name" data-idx="${idx}" style="width:100px;"></td>
                                    <td><input type="number" value="${h.draw}" data-hidx="${hidx}" data-field="draw" data-idx="${idx}" style="width:50px;"></td>
                                    <td><input type="number" value="${h.lb}" data-hidx="${hidx}" data-field="lb" data-idx="${idx}" style="width:50px;"></td>
                                    <td><input type="text" value="${h.jockey}" data-hidx="${hidx}" data-field="jockey" data-idx="${idx}" style="width:90px;"></td>
                                    <td><input type="text" value="${h.trainer}" data-hidx="${hidx}" data-field="trainer" data-idx="${idx}" style="width:90px;"></td>
                                    <td><input type="number" step="0.1" value="${h.odds || 0}" data-hidx="${hidx}" data-field="odds" data-idx="${idx}" style="width:60px;"></td>
                                    <td><input type="number" value="${h.predictedRank}" data-hidx="${hidx}" data-field="predictedRank" data-idx="${idx}" style="width:60px;"></td>
                                    <td><input type="number" value="${h.actualRank !== undefined ? h.actualRank : ''}" data-hidx="${hidx}" data-field="actualRank" data-idx="${idx}" style="width:60px;"></td>
                                    <td><input type="text" placeholder="體重變化/備註" data-hidx="${hidx}" data-field="remark" data-idx="${idx}" value="${h.remark || ''}" style="width:80px;"></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            container.appendChild(raceDiv);
        });

        document.querySelectorAll('[data-delidx]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const delIdx = parseInt(btn.getAttribute('data-delidx'));
                racesParams.splice(delIdx, 1);
                renderRaces();
                updateJsonPreview();
                saveToLocalStorage();
            });
        });

        const inputs = document.querySelectorAll('.race-entry input, .race-entry select');
        inputs.forEach(input => {
            input.addEventListener('change', (e) => {
                const idx = parseInt(input.getAttribute('data-idx'));
                const field = input.getAttribute('data-field');
                const hidx = input.getAttribute('data-hidx');
                if (hidx !== null) {
                    const horseIdx = parseInt(hidx);
                    if (field === 'number') racesParams[idx].horses[horseIdx].number = parseInt(input.value);
                    else if (field === 'name') racesParams[idx].horses[horseIdx].name = input.value;
                    else if (field === 'draw') racesParams[idx].horses[horseIdx].draw = parseInt(input.value);
                    else if (field === 'lb') racesParams[idx].horses[horseIdx].lb = parseInt(input.value);
                    else if (field === 'jockey') racesParams[idx].horses[horseIdx].jockey = input.value;
                    else if (field === 'trainer') racesParams[idx].horses[horseIdx].trainer = input.value;
                    else if (field === 'odds') racesParams[idx].horses[horseIdx].odds = parseFloat(input.value);
                    else if (field === 'predictedRank') racesParams[idx].horses[horseIdx].predictedRank = parseInt(input.value);
                    else if (field === 'actualRank') racesParams[idx].horses[horseIdx].actualRank = input.value ? parseInt(input.value) : '';
                    else if (field === 'remark') racesParams[idx].horses[horseIdx].remark = input.value;
                } else {
                    if (field === 'date') racesParams[idx].date = input.value;
                    else if (field === 'raceName') racesParams[idx].raceName = input.value;
                    else if (field === 'distance') racesParams[idx].distance = parseInt(input.value);
                    else if (field === 'ground') racesParams[idx].ground = input.value;
                    else if (field === 'course') racesParams[idx].course = input.value;
                }
                updateJsonPreview();
                saveToLocalStorage();
            });
        });
    }

    function addNewRace() {
        const template = fullRacesData[0];
        const newRace = JSON.parse(JSON.stringify(template));
        newRace.id = Date.now();
        newRace.raceNo = racesParams.length + 1;
        newRace.raceName = `第${newRace.raceNo}場 新賽事`;
        racesParams.push(newRace);
        renderRaces();
        updateJsonPreview();
        saveToLocalStorage();
    }

    function saveToLocalStorage() {
        localStorage.setItem('SHTSN_HV_RaceParams', JSON.stringify(racesParams));
        document.getElementById('saveStatus').innerHTML = '✅ 已儲存至瀏覽器 (' + new Date().toLocaleTimeString() + ')';
        setTimeout(() => {
            if (document.getElementById('saveStatus')) document.getElementById('saveStatus').innerHTML = '';
        }, 2000);
    }

    function loadFromLocalStorage() {
        const stored = localStorage.getItem('SHTSN_HV_RaceParams');
        if (stored) {
            try {
                racesParams = JSON.parse(stored);
                renderRaces();
                updateJsonPreview();
            } catch(e) {}
        } else {
            racesParams = fullRacesData;
            renderRaces();
            updateJsonPreview();
        }
    }

    function updateJsonPreview() {
        const preview = document.getElementById('jsonPreview');
        if (preview) preview.textContent = JSON.stringify(racesParams, null, 2);
    }

    function exportToJson() {
        const dataStr = JSON.stringify(racesParams, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `SHTSN_HV_params_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function importJson(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    racesParams = imported;
                    renderRaces();
                    updateJsonPreview();
                    saveToLocalStorage();
                    document.getElementById('saveStatus').innerHTML = '✅ 匯入成功，已儲存';
                } else {
                    alert('檔案格式錯誤，需要陣列格式');
                }
            } catch(err) {
                alert('JSON 解析失敗');
            }
        };
        reader.readAsText(file);
    }

    function clearAll() {
        if (confirm('確認清空所有跑馬地賽事記錄？此操作不可復原。')) {
            racesParams = [];
            renderRaces();
            updateJsonPreview();
            saveToLocalStorage();
        }
    }

    document.getElementById('addRaceBtn').addEventListener('click', addNewRace);
    document.getElementById('saveAllBtn').addEventListener('click', saveToLocalStorage);
    document.getElementById('exportJsonBtn').addEventListener('click', exportToJson);
    document.getElementById('importJsonBtn').addEventListener('click', () => {
        document.getElementById('importFile').click();
    });
    document.getElementById('importFile').addEventListener('change', (e) => {
        if (e.target.files.length) importJson(e.target.files[0]);
        e.target.value = '';
    });
    document.getElementById('clearAllBtn').addEventListener('click', clearAll);

    loadFromLocalStorage();
</script>
</body>
</html>
