        return map[j] || 70;
    }
    function getTrainerScore(t) {
        const map = { "蔡約翰":92,"羅富全":90,"方嘉柏":88,"沈集成":88,"姚本輝":86,"大衛希斯":84,"告東尼":84,"伍鵬志":82,

            "蘇偉賢":78,"韋達":76,"黎昭昇":78,"呂健威":76,"巫偉傑":74,"桂福特":72 };
        return map[t] || 70;
    }
    function getDrawScore(draw, dist) {
        // 跑馬地 C 跑道，內欄有利
        if (dist <= 1200) {
            if (draw <= 3) return 90;
            if (draw <= 6) return 75;
            if (draw <= 9) return 55;
            return 35;
        } else {
            if (draw <= 3) return 85;
            if (draw <= 6) return 70;
            if (draw <= 9) return 50;
            return 30;
        }
    }
    function getWeightScore(lb) {
        if (lb <= 115) return 10;
        if (lb <= 122) return 8;
        if (lb <= 129) return 5;
        if (lb <= 133) return 3;
        return 2;
    }
    function estimateOdds(horse) {
        let base = 12;
        let js = getJockeyScore(horse.jockey);
        let ts = getTrainerScore(horse.trainer);
        if (js >= 90) base -= 5;
        else if (js >= 80) base -= 2;
        if (ts >= 85) base -= 3;
        if (horse.draw <= 3) base -= 2;
        if (horse.draw >= 10) base += 3;
        return Math.max(2.5, Math.min(40, base));
    }
    function oddsToScore(odds) {
        return Math.max(0, Math.min(100, 100 - (odds - 2) * 6));
    }
    // 冷門爆發派
    function getUpsetBonus(horse, odds) {
        if (odds < 10) return 0;
        let bonus = 0;
        if (horse.draw >= 4 && horse.draw <= 9) bonus += 8;
        if (["潘頓","莫雷拉","布文","田泰安","何澤堯"].includes(horse.jockey)) bonus += 8;
        bonus += 4; // 體重穩定加分（無數據預設）
        return Math.min(20, bonus);
    }

    function computeTotalScore(horse, dist) {
        let drawScore = getDrawScore(horse.draw, dist);
        let weightScore = getWeightScore(horse.lb);
        let jockeyScore = getJockeyScore(horse.jockey);
        let trainerScore = getTrainerScore(horse.trainer);
        let odds = estimateOdds(horse);
        let oddsScore = oddsToScore(odds);
        let qimenBase = (horse.draw<=3?85: horse.draw<=6?72: horse.draw<=9?58:42);
        let starBonus = (["潘頓","莫雷拉","布文"].includes(horse.jockey) ? 8 : 0);
        let qimenScore = Math.min(100, qimenBase + starBonus);
        let dataScore = (drawScore * 0.35 + weightScore * 0.35 + (jockeyScore/10) * 0.3) * 10;
        let groundScore = 80; // 好地
        let grassBiasScore = (horse.draw <= 3) ? 90 : (horse.draw >= 10 ? 55 : 70);
        let weightChangeScore = 70; // 無數據
        let upsetBonus = getUpsetBonus(horse, odds);
        // 21派別權重 (總和1)
        let total = 0;
        total += qimenScore * 0.08;
        total += dataScore * 0.08;
        total += oddsScore * 0.04;
        total += ((jockeyScore + trainerScore)/2) * 0.06;
        total += drawScore * 0.08;
        total += groundScore * 0.07;
        total += grassBiasScore * 0.08;
        total += weightChangeScore * 0.10;
        total += upsetBonus * 0.12;
        total += jockeyScore * 0.05;
        if (horse.draw >= 7 && dist >= 1650) total += 8 * 0.04;
        return Math.min(100, total);
    }

                    位置Q複式：${top1.name}, ${top2.name}, ${top3.name}, ${top4.name}<br>
                    三重彩膽拖：膽 ${top1.name} → 拖 ${top2.name},${top3.name},${top4.name} → 拖 ${top2.name},${top3.name},${top4.name},${top5th.name}<br>
                    四連環複式：${top1.name}, ${top2.name}, ${top3.name}, ${top4.name}, ${top5th.name}<br>
                    四重彩膽拖：膽 ${top1.name} → 拖 ${top2.name},${top3.name},${top4.name} → 拖 ${top2.name},${top3.name},${top4.name},${top5th.name} → 拖 ${top2.name},${top3.name},${top4.name},${top5th.name},${withScores[5]?.name}
                </div>
            `;
            container.appendChild(card);
        }
    }

    renderAll();
</script>
