        .version { background: #1e3324; display: inline-block; padding: 4px 12px; border-radius: 40px; font-size: 0.85rem; color: var(--amber); }
        .toolbar { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; justify-content: space-between; background: #0c1f10; padding: 12px 16px; border-radius: 32px; }
        .btn { background: #2c4230; border: none; color: #f7e9c3; padding: 8px 18px; border-radius: 40px; font-weight: bold; cursor: pointer; }
        .btn-primary { background: var(--amber); color: #1e2a1a; }
        .badge { background: #1f3a23; border-radius: 20px; padding: 5px 12px; font-size: 0.75rem; }
        .races-grid { display: flex; flex-direction: column; gap: 28px; }
        .race-card { background: var(--card-bg); border-radius: 28px; border-left: 6px solid var(--amber); overflow: hidden; }
        .race-header { background: #0e2614; padding: 14px 18px; display: flex; justify-content: space-between; flex-wrap: wrap; }
        .race-name { font-weight: bold; font-size: 1.25rem; }
        .qimen-brief { background: #1a2a1b; padding: 8px 18px; font-size: 0.8rem; color: #e2dbaa; border-left: 3px solid var(--amber); margin: 8px 12px 0 12px; border-radius: 16px; }
        .horses-list { padding: 12px 16px 8px; }
        .horse-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a462a; padding: 8px 5px; flex-wrap: wrap; gap: 8px; }
        .horse-rank { background: #2a442c; width: 32px; text-align: center; border-radius: 20px; color: var(--amber-light); font-weight: bold; }
        .horse-name { flex: 2; font-weight: 600; min-width: 100px; }
        .horse-detail { font-size: 0.7rem; color: #c2c2a2; display: flex; gap: 10px; flex-wrap: wrap; }
        .score { color: var(--amber); font-weight: bold; }
        .bet-suggest { background: #09200e; margin: 8px 16px 16px; padding: 12px; border-radius: 20px; border: 1px dashed #b57c2c; font-size: 0.8rem; }
        .bet-line { margin: 6px 0; display: flex; flex-wrap: wrap; gap: 8px; align-items: baseline; }
        .bet-label { color: var(--amber-light); font-weight: bold; min-width: 95px; }
        .mock-note { font-size: 0.7rem; color: #b3a66a; text-align: right; padding: 4px 16px 12px; }
        .section-panel { background: #0d2412; border-radius: 28px; margin-top: 36px; padding: 18px; border: 1px solid #365e3a; }
        .flex-between { display: flex; flex-wrap: wrap; gap: 12px; justify-content: space-between; }
        input, select { background: #1f3522; border: 1px solid #5f794b; color: #fceeca; padding: 8px 12px; border-radius: 24px; }
        footer { text-align: center; margin-top: 30px; font-size: 0.7rem; opacity: 0.7; }
        @media (max-width: 700px) { .bet-label { min-width: 85px; } }

            {name:"量子力奇", draw:2, jockey:"潘頓", weight:124, winOdds:7.7, star:true},
            {name:"紅運光輝", draw:9, jockey:"布文", weight:124, winOdds:5.9, star:true},
            {name:"川河帥駒", draw:11, jockey:"奧爾民", weight:123, winOdds:26, star:false},
            {name:"怡昌光輝", draw:12, jockey:"巴度", weight:122, winOdds:41, star:true},
            {name:"星願無限", draw:3, jockey:"潘明輝", weight:121, winOdds:22, star:false},
            {name:"佛亮老翹", draw:1, jockey:"田泰安", weight:120, winOdds:15, star:true},
            {name:"樱花酒杯", draw:7, jockey:"艾兆禮", weight:118, winOdds:3.3, star:true}
          ]},
        { id:10, name:"R11 第三班 1200m", time:"18:20", distance:1200, class:"3", qimen:"短途內檔+低賠率主導，外檔需補償。",
          horses: [
            {name:"跨境寶馬", draw:10, jockey:"奧爾民", weight:135, winOdds:6.5, star:false},
            {name:"醒目高球", draw:14, jockey:"班德禮", weight:132, winOdds:8.4, star:false},
            {name:"競駿皇者", draw:7, jockey:"霍宏聲", weight:131, winOdds:13, star:false},
            {name:"興馳千里", draw:3, jockey:"楊明倫", weight:130, winOdds:6.0, star:false},
            {name:"嘉應勇將", draw:4, jockey:"鍾易禮", weight:128, winOdds:13, star:false},
            {name:"煌上", draw:1, jockey:"艾道拿", weight:127, winOdds:7.3, star:true},
            {name:"勇者為皇", draw:12, jockey:"潘明輝", weight:124, winOdds:17, star:false},
            {name:"千杯不醉", draw:6, jockey:"希威森", weight:121, winOdds:12, star:true},
            {name:"小磁怪", draw:8, jockey:"蔡明紹", weight:120, winOdds:24, star:false},
            {name:"川河煌駒", draw:5, jockey:"何澤堯", weight:120, winOdds:13, star:false},
            {name:"智勝策略", draw:11, jockey:"田泰安", weight:120, winOdds:53, star:true},
            {name:"攀友勝", draw:13, jockey:"梁家俊", weight:120, winOdds:35, star:false},
            {name:"愛馬心", draw:9, jockey:"金誠剛", weight:118, winOdds:30, star:false},
            {name:"閃電小子", draw:2, jockey:"艾兆禮", weight:117, winOdds:6.2, star:true}
          ]}
    ];

    // 補明星騎師
    const starJockeys = ["潘頓","布文","田泰安","巴度","希威森","艾道拿","潘明輝","梁家俊","周俊樂","楊明綸","艾兆禮","班德禮","何澤堯","霍宏聲","蔡明紹"];
    racesData.forEach(race => {
        race.horses.forEach(h => {
            if (!h.jockey) h.jockey = "模";
            if (!h.weight) h.weight = "模";
            if (h.jockey !== "模" && starJockeys.some(s => h.jockey.includes(s))) h.star = true;
            else h.star = false;
            if (h.winOdds === undefined) h.winOdds = "模";
            if (!h.baseScore) h.baseScore = 70 + (16 - (h.draw||10)) * 0.7;
        });
    });

    // 動態參數
    let coreParams = { innerBonusShort:10, outerBonusDraw12:30, longDistanceBackBonus:8, extremeLongshotBonus:5, overheatPenaltyBase:5 };
    function loadParams() { const s=localStorage.getItem("SHTSN_corrected_params"); if(s) { try { Object.assign(coreParams, JSON.parse(s)); } catch(e){} } }
    function saveParams() { localStorage.setItem("SHTSN_corrected_params", JSON.stringify(coreParams)); }
    loadParams();

    function computeScore(horse, race) {
        let draw = horse.draw || 10;
        let star = horse.star === true;
        let weightNum = parseInt(horse.weight) || 125;
        let dist = race.distance || 1400;
        let base = horse.baseScore || 75;
        let odds = (horse.winOdds !== "模") ? parseFloat(horse.winOdds) : 15;
        if (dist <= 1200 && draw <= 3) base += coreParams.innerBonusShort;
        if (draw >= 12 && star) base += coreParams.outerBonusDraw12;
        if (dist >= 1800 && (horse.name.includes("浪漫")||horse.name.includes("火焰")||horse.name.includes("大軍")||horse.name.includes("傳承")||horse.name.includes("戰神")||horse.name.includes("凝妙"))) base += coreParams.longDistanceBackBonus;
        if (odds >= 25 && draw >=4 && draw<=9 && star) base += coreParams.extremeLongshotBonus;
        if (odds <= 2.5) base -= coreParams.overheatPenaltyBase;
        if (star) base += 7;
        if (weightNum < 120) base += (125 - weightNum) * 0.4;
        if (draw <= 2) base += 3;
        if (odds <= 5) base += 5;
        else if (odds <= 10) base += 2;
        return Math.min(99, Math.max(50, Math.floor(base)));
    }

    function renderAll() {
        const container = document.getElementById('racesContainer');
        container.innerHTML = '';
        racesData.forEach((race, idx) => {
            const withScores = race.horses.map(h => ({ ...h, score: computeScore(h, race) })).sort((a,b)=>b.score - a.score);
            const top5 = withScores.slice(0,5);
            const winHorse = top5[0].name;
            const quinella = `${top5[0].name} → ${top5[1].name}`;
            // 三重彩複式: 列出三匹馬 (序目不拘)
            const triBox = `${top5[0].name}, ${top5[1].name}, ${top5[2].name} (序目不拘)`;
            const super4 = `${top5[0].name}, ${top5[1].name}, ${top5[2].name}, ${top5[3]?.name || '—'}`;
            const card = document.createElement('div');
            card.className = 'race-card';
            card.innerHTML = `
                <div class="race-header"><span class="race-name">${race.name} (${race.time})</span><span class="race-info">路程${race.distance}m · 班次${race.class}</span></div>
                <div class="qimen-brief">🔮 奇門派：${race.qimen}</div>
                <div class="horses-list">
                    ${top5.map((h, i) => `<div class="horse-row"><span class="horse-rank">${i+1}</span><span class="horse-name">${h.name}</span><div class="horse-detail">檔${h.draw} 騎${h.jockey} 負${h.weight} 賠${h.winOdds}</div><span class="score">${h.score}分</span></div>`).join('')}
                </div>
                <div class="bet-suggest">
                    <div class="bet-line"><span class="bet-label">🏆 獨贏推介：</span><strong style="color:var(--amber-light);">${winHorse}</strong></div>
                    <div class="bet-line"><span class="bet-label">🔗 連贏推介：</span>${quinella}</div>
                    <div class="bet-line"><span class="bet-label">🎯 三重彩複式：</span>${triBox}</div>
                    <div class="bet-line"><span class="bet-label">🌈 四重彩順序：</span>${super4}</div>
                    <div class="bet-line"><span class="bet-label">📌 位置Q / 單T：</span>${top5[0].name}, ${top5[1].name}, ${top5[2].name}</div>
                    <div class="bet-line"><span class="bet-label">🔄 四連環：</span>${top5[0].name}, ${top5[1].name}, ${top5[2].name}, ${top5[3]?.name || top5[4]?.name || '—'}</div>
                </div>
                <div class="mock-note">⚠️ 賠率「模」表缺資料｜綜合分含內檔/外檔/長途後上/明星騎師/賠率因子｜三重彩為複式(序目不拘)</div>
            `;
            container.appendChild(card);
        });
        const sel = document.getElementById('raceSelect');
        if(sel) sel.innerHTML = racesData.map((r,i)=>`<option value="${i}">${r.name}</option>`).join('');
    }

    // 賽後記錄 (複式命中：預測三匹馬集合 = 實際三甲集合)
    let hitStat = { total:0, triok:0 };
    function loadHit() { const h=localStorage.getItem("SHTSN_hitrate"); if(h) { try{ hitStat=JSON.parse(h); }catch(e){} } updateHitDisplay(); }
    function saveHit() { localStorage.setItem("SHTSN_hitrate", JSON.stringify(hitStat)); updateHitDisplay(); }
    function updateHitDisplay() { document.getElementById('hitRateDisplay').innerText = `${hitStat.triok||0} / ${hitStat.total||0}`; }
    document.getElementById('recordResultBtn')?.addEventListener('click',()=>{
        const idx = parseInt(document.getElementById('raceSelect').value);
        const w = document.getElementById('winnerInput').value.trim();
        const s = document.getElementById('secondInput').value.trim();
        const t = document.getElementById('thirdInput').value.trim();
        if(!w) { alert("請輸入頭馬"); return; }
        const race = racesData[idx];
        const predTop3 = race.horses.map(h=>({name:h.name,score:computeScore(h,race)})).sort((a,b)=>b.score-a.score).slice(0,3).map(p=>p.name);
        const actualSet = new Set([w,s,t]);
        const isTriBoxHit = (predTop3.length === 3 && actualSet.size === 3 && predTop3.every(m => actualSet.has(m)));
        hitStat.total = (hitStat.total||0)+1;
        if(isTriBoxHit) hitStat.triok = (hitStat.triok||0)+1;
        saveHit();
        document.getElementById('analysisMsg').innerHTML = `✅ ${race.name} 記錄 | 頭馬:${w} 三重彩複式${isTriBoxHit?'命中':'錯失'}。參數微調模擬完成。`;
        if(!isTriBoxHit && race.distance<=1200) { coreParams.innerBonusShort = Math.min(20, coreParams.innerBonusShort+1); saveParams(); renderAll(); }
        else if(!isTriBoxHit && race.distance>=1800) { coreParams.longDistanceBackBonus = Math.min(15, coreParams.longDistanceBackBonus+1); saveParams(); renderAll(); }
    });
    document.getElementById('refreshBtn')?.addEventListener('click',()=>{ alert("🌐 模擬聯網：已同步最新賠率走勢及晨操，評分重新運算"); renderAll(); });
    document.getElementById('resetParamsBtn')?.addEventListener('click',()=>{ coreParams = { innerBonusShort:10, outerBonusDraw12:30, longDistanceBackBonus:8, extremeLongshotBonus:5, overheatPenaltyBase:5 }; saveParams(); renderAll(); alert("所有優化參數已重置"); });
    document.getElementById('viewParamsBtn')?.addEventListener('click',()=>{ alert(`當前動態參數\n內檔短途加成:${coreParams.innerBonusShort}\n外檔補償:${coreParams.outerBonusDraw12}\n長途後上:${coreParams.longDistanceBackBonus}\n極冷門保護:${coreParams.extremeLongshotBonus}\n過熱懲罰:${coreParams.overheatPenaltyBase}`); });
    
    loadHit();
    renderAll();
</script>
</body>
</html>
