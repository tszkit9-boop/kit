<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SHTSN 參數記錄與版本管理 | 追蹤系統演變</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0f1a0f;
            background-image: radial-gradient(circle at 10% 20%, #1a2a1f 0%, #0a120a 100%);
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans TC', system-ui, sans-serif;
            color: #e6f0e6;
            padding: 1.2rem;
            line-height: 1.5;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        .header {
            text-align: center;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #ffb347;
            padding-bottom: 1rem;
        }
        .header h1 { font-size: 1.8rem; color: #ffb347; }
        .sub { font-size: 0.8rem; opacity: 0.8; }
        .card {
            background: rgba(26,42,31,0.9);
            border-radius: 24px;
            margin-bottom: 1.8rem;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: bold;
            border-left: 4px solid #ffb347;
            padding-left: 0.7rem;
            margin-bottom: 1rem;
        }
        .param-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 0.8rem;
            margin: 0.5rem 0;
        }
        .param-item {
            background: #1e2e23;
            border-radius: 16px;
            padding: 0.5rem 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .param-label {
            font-weight: 500;
            font-size: 0.85rem;
        }
        .param-value {
            font-family: monospace;
            font-weight: bold;
            color: #ffb347;
            background: #0a130e;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.85rem;
            border: none;
            width: 70px;
            text-align: center;
        }
        input.param-value {
            background: #2a3a2f;
            color: #ffb347;
            cursor: pointer;
        }
        button {
            background: #ffb347;
            color: #1a2a1f;
            font-weight: bold;
            border: none;
            padding: 6px 14px;
            border-radius: 28px;
            cursor: pointer;
            font-size: 0.8rem;
            margin: 0.2rem 0;
        }
        .snapshot-list {
            max-height: 300px;
            overflow-y: auto;
            background: #111d15;
            border-radius: 20px;
            padding: 0.5rem;
        }
        .snapshot-item {
            background: #1e2e23;
            border-radius: 14px;
            padding: 0.5rem 0.8rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .snapshot-date {
            font-family: monospace;
            font-size: 0.7rem;
            color: #aaa;
        }
        .badge {
            background: #2a3a2f;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .btn-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }
        hr {
            border-color: #ffb34730;
            margin: 0.5rem 0;
        }
        footer {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 2rem;
            color: #7e8e7a;
        }
        @media (max-width: 700px) {
            body { padding: 0.8rem; }
            .param-item { flex-direction: column; align-items: flex-start; gap: 0.3rem; }
            .param-value { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🕸️ SHTSN 參數記錄與版本管理</h1>
        <div class="sub">追蹤每次權重調整、奇門規則、門檻閥值 — 所有參數快照儲存於本機</div>
    </div>

    <!-- 當前參數編輯區 -->
    <div class="card">
        <div class="card-title">📌 當前活躍參數 (V8.9 基準)</div>
        <div class="param-grid" id="weightGrid"></div>
        <div class="param-grid" id="ruleGrid"></div>
        <div class="btn-group">
            <button id="saveSnapshotBtn">💾 儲存為當前快照</button>
            <button id="resetToDefaultBtn">🔄 重設為預設參數</button>
            <button id="exportParamsBtn">📄 匯出參數 (JSON)</button>
        </div>
        <div class="info-box" style="margin-top: 0.6rem; font-size: 0.7rem;">✔ 編輯任意數值後，按「儲存為當前快照」保存版本。快照會記錄時間及所有參數。</div>
    </div>

    <!-- 歷史快照記錄區 -->
    <div class="card">
        <div class="card-title">📚 參數快照歷史 (依時間排序)</div>
        <div id="snapshotList" class="snapshot-list">
            <div style="color: #aaa; text-align: center; padding: 1rem;">尚無快照，請先儲存一個版本。</div>
        </div>
        <div class="btn-group">
            <button id="clearSnapshotsBtn">🗑️ 清除所有快照</button>
            <button id="importParamsBtn">📂 匯入參數 (JSON)</button>
        </div>
    </div>

    <footer>
        💡 參數說明：權重用於綜合分計算；奇門規則包含明星騎師加分及外檔補償；精選池門檻控制入圍馬匹。<br>
        每次調整參數後建議儲存快照，便於後續回測比較哪組參數命中率最高。
    </footer>
</div>

<script>
    // ---------- 預設參數 (V8.9 基準，並加入外檔補償等規則) ----------
    const DEFAULT_WEIGHTS = {
        qimen: 0.31,
        data: 0.17,
        oddsTrack: 0.10,
        pedigree: 0.05,
        pace: 0.05,
        ground: 0.05,
        distance: 0.06,
        trainerJock: 0.06,
        jockeyPosture: 0.06,
        behavior: 0.05,
        multiModal: 0.05,
        knowledgeGraph: 0.05,
        logistic: 0.06
    };
    const DEFAULT_RULES = {
        // 奇門基礎分規則 (檔位分)
        qimenDrawBase: "1-3檔88,4-6檔75,7-9檔58,10-12檔42,13-14檔35",
        // 內檔加權
        innerDrawBonus: "1-3檔 +2",
        // 明星騎師加分 (潘頓/莫雷拉 +5，布文/田泰安/麥道朗 +3，何澤堯/巴度 +2)
        starJockeyBonus: "潘頓,莫雷拉:5;布文,田泰安,麥道朗:3;何澤堯,巴度:2",
        // 外檔補償 (新增規則：檔位≥10且騎師為明星時，奇門加分)
        outerDrawCompensation: "檔位≥10 & 明星騎師: +8",
        // 精選池門檻
        selectionThreshold: 70,
        // 鞍上人姿態基礎分映射
        jockeyPostureMap: "領放85,留前鬥後90,居中80,後上75,搶放70"
    };

    // 當前參數 (可編輯)
    let currentWeights = { ...DEFAULT_WEIGHTS };
    let currentRules = { ...DEFAULT_RULES };

    // 儲存的快照陣列
    let snapshots = [];

    // ----- 輔助函數 -----
    function loadFromLocal() {
        const savedWeights = localStorage.getItem('SHTSN_current_weights');
        if (savedWeights) currentWeights = JSON.parse(savedWeights);
        const savedRules = localStorage.getItem('SHTSN_current_rules');
        if (savedRules) currentRules = JSON.parse(savedRules);
        const savedSnapshots = localStorage.getItem('SHTSN_snapshots');
        if (savedSnapshots) snapshots = JSON.parse(savedSnapshots);
        else snapshots = [];
    }
    function saveCurrentToLocal() {
        localStorage.setItem('SHTSN_current_weights', JSON.stringify(currentWeights));
        localStorage.setItem('SHTSN_current_rules', JSON.stringify(currentRules));
    }
    function saveSnapshotsToLocal() {
        localStorage.setItem('SHTSN_snapshots', JSON.stringify(snapshots));
    }

    // 渲染權重編輯區
    function renderWeightGrid() {
        const grid = document.getElementById('weightGrid');
        grid.innerHTML = '';
        for (const [key, val] of Object.entries(currentWeights)) {
            const div = document.createElement('div');
            div.className = 'param-item';
            div.innerHTML = `
                <span class="param-label">${formatKey(key)}</span>
                <input type="number" step="0.01" class="param-value" data-key="${key}" value="${val.toFixed(3)}">
            `;
            grid.appendChild(div);
        }
        // 綁定輸入事件
        document.querySelectorAll('#weightGrid input.param-value').forEach(inp => {
            inp.addEventListener('change', (e) => {
                const key = e.target.dataset.key;
                let newVal = parseFloat(e.target.value);
                if (isNaN(newVal)) newVal = 0;
                currentWeights[key] = newVal;
                saveCurrentToLocal();
            });
        });
    }

    function renderRuleGrid() {
        const grid = document.getElementById('ruleGrid');
        grid.innerHTML = '';
        const ruleEntries = [
            { label: '奇門檔位基礎分', key: 'qimenDrawBase', placeholder: '1-3檔88,4-6檔75,...' },
            { label: '內檔加權', key: 'innerDrawBonus', placeholder: '1-3檔 +2' },
            { label: '明星騎師加分', key: 'starJockeyBonus', placeholder: '潘頓,莫雷拉:5;...' },
            { label: '外檔補償規則', key: 'outerDrawCompensation', placeholder: '檔位≥10 & 明星騎師: +8' },
            { label: '精選池門檻', key: 'selectionThreshold', placeholder: '70' },
            { label: '鞍上人姿態映射', key: 'jockeyPostureMap', placeholder: '領放85,留前鬥後90,...' }
        ];
        for (const rule of ruleEntries) {
            const div = document.createElement('div');
            div.className = 'param-item';
            div.style.gridColumn = 'span 2';
            div.innerHTML = `
                <span class="param-label">${rule.label}</span>
                <input type="text" class="param-value" style="width:auto; min-width:180px;" data-rule="${rule.key}" value="${currentRules[rule.key] || ''}">
            `;
            grid.appendChild(div);
        }
        document.querySelectorAll('#ruleGrid input.param-value').forEach(inp => {
            inp.addEventListener('change', (e) => {
                const key = e.target.dataset.rule;
                currentRules[key] = e.target.value;
                saveCurrentToLocal();
            });
        });
    }

    function formatKey(key) {
        const map = {
            qimen: '奇門派', data: '數據派', oddsTrack: '賠率+晨操', pedigree: '血統派',
            pace: '步速派', ground: '場地派', distance: '路程派', trainerJock: '騎練派',
            jockeyPosture: '鞍上人派', behavior: '行為模式', multiModal: '多模態融合',
            knowledgeGraph: '知識圖譜', logistic: '邏輯迴歸'
        };
        return map[key] || key;
    }

    // 儲存當前參數為快照
    function saveSnapshot() {
        const snapshot = {
            id: Date.now(),
            date: new Date().toLocaleString(),
            weights: { ...currentWeights },
            rules: { ...currentRules }
        };
        snapshots.unshift(snapshot); // 最新在上
        if (snapshots.length > 20) snapshots.pop();
        saveSnapshotsToLocal();
        renderSnapshotList();
    }

    function renderSnapshotList() {
        const container = document.getElementById('snapshotList');
        if (!snapshots.length) {
            container.innerHTML = '<div style="color: #aaa; text-align: center; padding: 1rem;">尚無快照，請先儲存一個版本。</div>';
            return;
        }
        container.innerHTML = '';
        snapshots.forEach(snap => {
            const div = document.createElement('div');
            div.className = 'snapshot-item';
            const weightSummary = Object.entries(snap.weights).slice(0,4).map(([k,v]) => `${formatKey(k).slice(0,2)}:${v.toFixed(2)}`).join(' ');
            div.innerHTML = `
                <div>
                    <strong>📸 ${snap.date}</strong>
                    <div class="snapshot-date">奇門=${snap.weights.qimen.toFixed(3)} 數據=${snap.weights.data.toFixed(3)} 精選門檻=${snap.rules.selectionThreshold}</div>
                    <div class="snapshot-date" style="font-size:0.65rem;">${weightSummary}...</div>
                </div>
                <div class="btn-group" style="margin:0;">
                    <button class="loadSnapshotBtn" data-id="${snap.id}">載入</button>
                    <button class="deleteSnapshotBtn" data-id="${snap.id}">刪除</button>
                </div>
            `;
            container.appendChild(div);
        });
        // 綁定載入與刪除事件
        document.querySelectorAll('.loadSnapshotBtn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                const snap = snapshots.find(s => s.id === id);
                if (snap) {
                    currentWeights = JSON.parse(JSON.stringify(snap.weights));
                    currentRules = JSON.parse(JSON.stringify(snap.rules));
                    saveCurrentToLocal();
                    renderWeightGrid();
                    renderRuleGrid();
                }
            });
        });
        document.querySelectorAll('.deleteSnapshotBtn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                snapshots = snapshots.filter(s => s.id !== id);
                saveSnapshotsToLocal();
                renderSnapshotList();
            });
        });
    }

    function resetToDefault() {
        currentWeights = { ...DEFAULT_WEIGHTS };
        currentRules = { ...DEFAULT_RULES };
        saveCurrentToLocal();
        renderWeightGrid();
        renderRuleGrid();
    }

    function exportParams() {
        const exportObj = {
            version: "SHTSN_V8.9_custom",
            exportTime: new Date().toISOString(),
            weights: currentWeights,
            rules: currentRules,
            snapshots: snapshots
        };
        const dataStr = JSON.stringify(exportObj, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `SHTSN_params_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
    }

    function importParams(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (data.weights) currentWeights = data.weights;
                if (data.rules) currentRules = data.rules;
                if (data.snapshots && Array.isArray(data.snapshots)) snapshots = data.snapshots;
                saveCurrentToLocal();
                saveSnapshotsToLocal();
                renderWeightGrid();
                renderRuleGrid();
                renderSnapshotList();
                alert('參數匯入成功！');
            } catch(err) {
                alert('匯入失敗：無效的 JSON 檔案');
            }
        };
        reader.readAsText(file);
    }

    function clearSnapshots() {
        if (confirm('確定清除所有參數快照？此操作不可復原。')) {
            snapshots = [];
            saveSnapshotsToLocal();
            renderSnapshotList();
        }
    }

    // 設定導入按鈕
    document.getElementById('importParamsBtn').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'application/json';
        input.onchange = (e) => {
            if (e.target.files.length) importParams(e.target.files[0]);
        };
        input.click();
    });

    // 初始化
    loadFromLocal();
    renderWeightGrid();
    renderRuleGrid();
    renderSnapshotList();

    // 按鈕事件
    document.getElementById('saveSnapshotBtn').addEventListener('click', saveSnapshot);
    document.getElementById('resetToDefaultBtn').addEventListener('click', resetToDefault);
    document.getElementById('exportParamsBtn').addEventListener('click', exportParams);
    document.getElementById('clearSnapshotsBtn').addEventListener('click', clearSnapshots);
</script>
</body>
</html>
