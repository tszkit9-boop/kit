            border-radius: 32px; border: 1px solid #2f4d2d;
        }

            background: #2c4230; border: none; color: #f7e9c3; padding: 8px 18px;
            border-radius: 40px; font-weight: bold; cursor: pointer;
        }

        .badge { background: #1f3a23; border-radius: 20px; padding: 5px 12px; font-size: 0.75rem; }
        .races-grid { display: flex; flex-direction: column; gap: 28px; }
        .race-card {
            background: var(--card-bg);
            border-radius: 28px;
            border-left: 6px solid var(--amber);
            overflow: hidden;
        }
        .race-header { background: #0e2614; padding: 14px 18px; display: flex; justify-content: space-between; flex-wrap: wrap; }
        .race-name { font-weight: bold; font-size: 1.25rem; }
        .qimen-brief { background: #1a2a1b; padding: 8px 18px; font-size: 0.8rem; color: #e2dbaa; border-left: 3px solid var(--amber); margin: 8px 12px 0 12px; border-radius: 16px; }
        .horses-list { padding: 12px 16px 8px; }
        .horse-row {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #2a462a; padding: 8px 5px; flex-wrap: wrap; gap: 8px;
        }
        .horse-rank { background: #2a442c; width: 32px; text-align: center; border-radius: 20px; color: var(--amber-light); font-weight: bold; }
        .horse-name { flex: 2; font-weight: 600; min-width: 100px; }
        .horse-detail { font-size: 0.7rem; color: #c2c2a2; display: flex; gap: 10px; }
        .score { color: var(--amber); font-weight: bold; }
        .bet-suggest {
            background: #09200e; margin: 8px 16px 16px; padding: 12px;
            border-radius: 20px; border: 1px dashed #b57c2c; font-size: 0.8rem;
        }
        .bet-line { margin: 6px 0; display: flex; flex-wrap: wrap; gap: 8px; align-items: baseline; }
        .bet-label { color: var(--amber-light); font-weight: bold; min-width: 95px; }
        .mock-note { font-size: 0.7rem; color: #b3a66a; text-align: right; padding: 4px 16px 12px; }
        .section-panel {
            background: #0d2412; border-radius: 28px; margin-top: 36px; padding: 18px;

        }

        input, select { background: #1f3522; border: 1px solid #5f794b; color: #fceeca; padding: 8px 12px; border-radius: 24px; }
        footer { text-align: center; margin-top: 30px; font-size: 0.7rem; opacity: 0.7; }

        { id:10, name:"R11 第三班 1200m", time:"18:20", distance:1200, class:"3", qimen:"戌時天蓬星＋休門，短途內檔絕對主導，外檔需補償。",
          horses: [
            {name:"跨境寶馬", draw:10, weight:135, star:false},{name:"醒目高球", draw:14, weight:132, star:false},{name:"競駿皇者", draw:7, weight:131, star:false},
            {name:"興馳千里", draw:3, weight:130, star:false},{name:"嘉應勇將", draw:4, weight:128, star:false},{name:"煌上", draw:1, weight:127, star:false},
            {name:"勇者為皇", draw:12, weight:124, star:false},{name:"千杯不醉", draw:6, weight:121, star:false},{name:"小磁怪", draw:8, weight:120, star:false},
            {name:"川河煌駒", draw:5, weight:120, star:false},{name:"智勝策略", draw:11, weight:120, star:false},{name:"攀友勝", draw:13, weight:120, star:false},
            {name:"愛馬心", draw:9, weight:118, star:false},{name:"閃電小子", draw:2, weight:117, star:false}
          ]}
    ];

    // 明星騎師列表 (用於補星)
    const starJockeys = ["潘頓","布文","田泰安","巴度","希威森","艾道拿","潘明輝","梁家俊","周俊樂","楊明綸","艾兆禮","班德禮","何澤堯","霍宏聲"];
    racesData.forEach(race => {
        race.horses.forEach(h => {
            if (!h.jockey) h.jockey = "模";
            if (!h.weight) h.weight = "模";
            if (h.jockey !== "模" && starJockeys.some(s => h.jockey.includes(s))) h.star = true;
            else h.star = false;
            if (h.weightAdj) { let w = parseInt(h.weight); if(!isNaN(w)) h.weight = (w + h.weightAdj).toString(); }
            if (!h.baseScore) h.baseScore = 75 + (16 - (h.draw||10)) * 0.6;
        });
    });

    // 動態參數
    let coreParams = { innerBonusShort:10, outerBonusDraw12:30, longDistanceBackBonus:8, extremeLongshotBonus:5, overheatPenaltyBase:5 };
    function loadParams() { const s=localStorage.getItem("SHTSN_corrected_params"); if(s) { try { Object.assign(coreParams, JSON.parse(s)); } catch(e){} } }
    function saveParams() { localStorage.setItem("SHTSN_corrected_params", JSON.stringify(coreParams)); }
    loadParams();

    function computeScore(horse, race) {
        let draw = horse.draw || 10;
        let star = horse.star === true;
        let weightNum = parseInt(horse.weight) || 125;
        let dist = race.distance || 1400;
        let base = horse.baseScore || 75;
        if (dist <= 1200 && draw <= 3) base += coreParams.innerBonusShort;
        if (draw >= 12 && star) base += coreParams.outerBonusDraw12;
        if (dist >= 1800 && (horse.name.includes("浪漫")||horse.name.includes("火焰")||horse.name.includes("大軍")||horse.name.includes("傳承")||horse.name.includes("戰神"))) base += coreParams.longDistanceBackBonus;
        if (weightNum < 120) base += (125 - weightNum) * 0.35;
        if (star) base += 7;
        if (draw <= 2) base += 3;
        return Math.min(99, Math.max(55, Math.floor(base)));
    }

    function renderAll() {
        const container = document.getElementById('racesContainer');
        container.innerHTML = '';
        racesData.forEach((race, idx) => {
            const withScores = race.horses.map(h => ({ ...h, score: computeScore(h, race) })).sort((a,b)=>b.score - a.score);
            const top5 = withScores.slice(0,5);
            const win = top5[0].name;
            const qin = `${top5[0].name} → ${top5[1].name}`;
            const tri = `${top5[0].name} > ${top5[1].name} > ${top5[2].name}`;
            const super4 = `${top5[0].name}, ${top5[1].name}, ${top5[2].name}, ${top5[3]?.name || '—'}`;
            const card = document.createElement('div');
            card.className = 'race-card';
            card.innerHTML = `
                <div class="race-header"><span class="race-name">${race.name} (${race.time})</span><span class="race-info">路程${race.distance}m | 班次${race.class}</span></div>
                <div class="qimen-brief">🔮 奇門派：${race.qimen}</div>
                <div class="horses-list">
                    ${top5.map((h, i) => `<div class="horse-row"><span class="horse-rank">${i+1}</span><span class="horse-name">${h.name}</span><div class="horse-detail">檔${h.draw} 騎${h.jockey} 負${h.weight}</div><span class="score">${h.score}分</span></div>`).join('')}
                </div>
                <div class="bet-suggest">
                    <div class="bet-line"><span class="bet-label">🏆 獨贏推介：</span><strong style="color:var(--amber-light);">${win}</strong></div>
                    <div class="bet-line"><span class="bet-label">🔗 連贏推介：</span>${qin}</div>
                    <div class="bet-line"><span class="bet-label">🎯 三重彩 (單式)：</span>${tri}</div>
                    <div class="bet-line"><span class="bet-label">🌈 四重彩順序：</span>${super4}</div>
                    <div class="bet-line"><span class="bet-label">📌 位置Q / 單T：</span>${top5[0].name}, ${top5[1].name}, ${top5[2].name}</div>
                    <div class="bet-line"><span class="bet-label">🔄 四連環：</span>${top5[0].name}, ${top5[1].name}, ${top5[2].name}, ${top5[3]?.name || top5[4]?.name || '—'}</div>
                </div>
                <div class="mock-note">⚠️ 缺數據以「模」標記｜綜合分含內檔/外檔補償/長途後上等動態參數</div>
            `;
            container.appendChild(card);
        });
        const sel = document.getElementById('raceSelect');
        if(sel) sel.innerHTML = racesData.map((r,i)=>`<option value="${i}">${r.name}</option>`).join('');
    }

    // 賽後記錄（簡化命中追蹤）
    let hitStat = { total:0, triok:0 };
    function loadHit() { const h=localStorage.getItem("SHTSN_hitrate"); if(h) { try{ hitStat=JSON.parse(h); }catch(e){} } updateHitDisplay(); }
    function saveHit() { localStorage.setItem("SHTSN_hitrate", JSON.stringify(hitStat)); updateHitDisplay(); }
    function updateHitDisplay() { document.getElementById('hitRateDisplay').innerText = `${hitStat.triok||0} / ${hitStat.total||0}`; }
    document.getElementById('recordResultBtn')?.addEventListener('click',()=>{
        const idx = parseInt(document.getElementById('raceSelect').value);
        const w = document.getElementById('winnerInput').value.trim();
        const s = document.getElementById('secondInput').value.trim();
        const t = document.getElementById('thirdInput').value.trim();
        if(!w) { alert("請輸入頭馬"); return; }
        const race = racesData[idx];
        const predTop3 = race.horses.map(h=>({name:h.name,score:computeScore(h,race)})).sort((a,b)=>b.score-a.score).slice(0,3).map(p=>p.name);
        const actual = [w,s,t];
        const correctTri = predTop3[0]===actual[0] && predTop3[1]===actual[1] && predTop3[2]===actual[2];
        hitStat.total = (hitStat.total||0)+1;
        if(correctTri) hitStat.triok = (hitStat.triok||0)+1;
        saveHit();
        document.getElementById('analysisMsg').innerHTML = `✅ ${race.name} 記錄完成 頭馬:${w} 三重彩${correctTri?'命中':'錯失'}。參數微調已模擬。`;
        if(!correctTri && race.distance<=1200) { coreParams.innerBonusShort = Math.min(20, coreParams.innerBonusShort+1); saveParams(); renderAll(); }
        else if(!correctTri && race.distance>=1800) { coreParams.longDistanceBackBonus = Math.min(15, coreParams.longDistanceBackBonus+1); saveParams(); renderAll(); }
    });
    document.getElementById('refreshNetworkBtn')?.addEventListener('click',()=>{ alert("🌐 模擬聯網：已更新部分明星騎師資訊及晨操，評分重新計算"); renderAll(); });
    document.getElementById('resetParamsBtn')?.addEventListener('click',()=>{ coreParams = { innerBonusShort:10, outerBonusDraw12:30, longDistanceBackBonus:8, extremeLongshotBonus:5, overheatPenaltyBase:5 }; saveParams(); renderAll(); alert("參數已重置"); });
    document.getElementById('viewParamsBtn')?.addEventListener('click',()=>{ alert(`當前動態參數\n內檔短途加成:${coreParams.innerBonusShort}\n外檔補償:${coreParams.outerBonusDraw12}\n長途後上:${coreParams.longDistanceBackBonus}`); });
    loadHit();
    renderAll();
</script>
</body>
</html>
