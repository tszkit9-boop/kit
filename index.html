<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - GitHub Pages Test</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            background: white;
            padding: 3rem 5rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            text-align: center;
            animation: fadeIn 0.6s ease;
        }
        h1 {
            margin: 0 0 0.5rem;
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        p {
            margin: 0;
            color: #555;
            font-size: 1.2rem;
        }
        .emoji {
            font-size: 2rem;
            margin-top: 1rem;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        small {
            display: block;
            margin-top: 1.5rem;
            color: #888;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hello World!</h1>
        <p>GitHub Pages is working 🚀</p>
        <div class="emoji">✨</div>
        <small>Push to see changes live</small>
    </div>
</body>
</html>
