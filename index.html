        };
        return map[j] || 70;
    }
    function getTrainerScore(t) {

            "蔡約翰":92,"羅富全":90,"方嘉柏":88,"沈集成":88,"姚本輝":86,"大衛希斯":84,"告東尼":84,"伍鵬志":82,

            "蘇偉賢":78,"韋達":76,"黎昭昇":78,"呂健威":76,"巫偉傑":74,"桂福特":72
        };
        return map[t] || 70;
    }

    // 檔位分 (沙田全天候, 1200m以下內檔加分減少)
    function getDrawScore(draw, dist) {
        if (dist <= 1200) {
            if (draw <= 3) return 10;
            if (draw <= 6) return 7;
            if (draw <= 9) return 4;
            return 2;
        } else {
            if (draw <= 3) return 9;
            if (draw <= 6) return 7;
            if (draw <= 9) return 5;
            return 3;
        }
    }
    // 負磅分 (沙田通用)
    function getWeightScore(lb) {
        if (lb <= 115) return 10;
        if (lb <= 122) return 8;
        if (lb <= 129) return 5;
        if (lb <= 133) return 3;
        return 2;
    }
    // 賠率轉換 (缺賠率時使用預測值: 憑騎練檔位估算)
    function estimateOddsFromScore(jockeyScore, trainerScore, draw) {
        let base = 12;
        if (jockeyScore >= 90) base -= 5;
        else if (jockeyScore >= 80) base -= 2;
        if (trainerScore >= 85) base -= 3;
        if (draw <= 3) base -= 2;
        if (draw >= 10) base += 3;
        return Math.max(2.5, Math.min(40, base));
    }
    function oddsToScore(odds) {
        return Math.max(0, Math.min(100, 100 - (odds - 2) * 6));
    }

    // 額外加分
    function getOuterBonus(draw, jockey, odds) {
        const stars = ["潘頓","莫雷拉","布文"];
        if (!stars.includes(jockey)) return 0;
        if (odds > 8) return 0;
        if (draw >= 10 && draw <= 11 && odds <= 5) return 18;
        if (draw >= 12 && odds <= 5) return PARAMS.outerBonusDraw12;
        if (draw >= 8 && draw <= 9 && odds <= 5) return 12;
        return 0;
    }
    function getLongDistBackBonus(horse, dist) {
        if (dist >= 1800 && (horse.draw >= 7 || horse.odds > 10)) return PARAMS.longDistanceBackBonus;
        return 0;
    }
    function isExtremeLongshot(horse) {
        return (horse.odds >= 25 && horse.draw >= 4 && horse.draw <= 9 && getJockeyScore(horse.jockey) >= 70);
    }
    function getExtremeBonus(horse) {
        return isExtremeLongshot(horse) ? PARAMS.extremeLongshotBonus : 0;
    }

    // 綜合評分 (數據派 + 奇門簡化 + 賠率派)

        let drawScore = getDrawScore(horse.draw, dist);
        let weightScore = getWeightScore(horse.lb);
        let jockeyScore = getJockeyScore(horse.jockey);
        let trainerScore = getTrainerScore(horse.trainer);
        // 若無真實賠率，根據騎練檔位估算
        let odds = horse.odds || estimateOddsFromScore(jockeyScore, trainerScore, horse.draw);
        let oddsScore = oddsToScore(odds);
        // 奇門派簡化 (檔位基礎分 + 明星加成分)
        let qimenBase = (horse.draw<=3?85: horse.draw<=6?72: horse.draw<=9?58:42);
        let starBonus = (["潘頓","莫雷拉","布文"].includes(horse.jockey) ? 8 : (horse.jockey==="田泰安"?4:0));
        let qimenScore = Math.min(100, qimenBase + starBonus + (horse.draw<=3?5:0));
        // 外檔補償
        let outer = getOuterBonus(horse.draw, horse.jockey, odds);
        let longBack = getLongDistBackBonus(horse, dist);
        let extreme = getExtremeBonus(horse);
        // 數據派 (沙田權重: 檔位0.35, 負磅0.35, 騎師0.3)
        let dataScore = (drawScore * 0.35 + weightScore * 0.35 + (jockeyScore/10) * 0.3) * 10;
        // 賠率派權重 0.2, 奇門0.5, 數據0.3 (決策老大)
        let final = qimenScore * 0.5 + dataScore * 0.3 + oddsScore * 0.2;
        final += outer + longBack + extreme;
        return { final, odds, oddsScore, qimenScore, dataScore };
    }

            {n:"熾烈神駒",draw:2,lb:122,jockey:"潘頓",trainer:"沈集成"},
            {n:"德心知遇",draw:4,lb:120,jockey:"艾兆禮",trainer:"蔡約翰"},
            {n:"時尚風趣",draw:8,lb:116,jockey:"巴度",trainer:"鄭俊偉"},
            {n:"高度評價",draw:11,lb:115,jockey:"蔡明紹",trainer:"巫偉傑"},
            {n:"觀眾之力",draw:1,lb:115,jockey:"楊明倫",trainer:"方嘉柏"},
            {n:"巨靈神",draw:12,lb:115,jockey:"巫顯東",trainer:"徐雨石"}
        ]}
    ];

    // 計算所有場次預測 (前三名 + 四連環)
    function computeAllPredictions() {
        let predictions = [];
        for (let r of races) {
            let withScores = r.horses.map(h => {
                let res = computeTotalScore(h, r.dist);
                return { name: h.n, total: res.final, odds: res.odds, oddsScore: res.oddsScore, qimen: res.qimenScore, data: res.dataScore };
            });
            withScores.sort((a,b) => b.total - a.total);
            let top4 = withScores.slice(0,4).map(x=>x.name);
            predictions.push({ raceName: r.name, dist: r.dist, top4, top3: top4.slice(0,3), sorted: withScores });
        }
        return predictions;
    }

    function renderRaces() {
        const container = document.getElementById('racesContainer');
        container.innerHTML = '';
        const preds = computeAllPredictions();
        for (let i=0; i<races.length; i++) {
            const r = races[i];
            const pred = preds[i];
            const sorted = pred.sorted;
            const top1 = sorted[0].name, top2 = sorted[1].name, top3 = sorted[2].name, top4 = sorted[3].name;
            const leadMargin = sorted[0].total - sorted[1].total;
            const warn = leadMargin < 4 ? '<div class="warning">⚠️ 頭馬優勢不足4分，建議膽拖投注。</div>' : '';
            const card = document.createElement('div');
            card.className = 'race-card';
            card.innerHTML = `
                <div class="race-title">🏇 ${r.name} (${r.dist}m)</div>
                <table class="predict-table">
                    <thead><tr><th>名次</th><th>馬匹</th><th>綜合分</th><th>賠率(估)</th><th>奇門</th><th>數據</th> </thead>
                    <tbody>
                        ${sorted.map((h,idx) => `<tr ${idx<3?'class=top3':''}><td>${idx+1}</td><td>${h.name}</td><td>${h.total.toFixed(1)}</td><td>${h.odds.toFixed(1)}</td><td>${h.qimen.toFixed(0)}</td><td>${h.data.toFixed(0)}</td></tr>`).join('')}
                    </tbody>
                </table>
                ${warn}
                <div class="bet-slip">
                    <strong>💰 投注建議 (沙田系統)</strong><br>
                    獨贏：${top1}<br>
                    連贏：${top1} + ${top2}<br>
                    位置Q：${top1}, ${top2}, ${top3}<br>
                    三重彩單式：${top1} > ${top2} > ${top3}<br>
                    四連環：${top1}, ${top2}, ${top3}, ${top4}<br>
                    成本約 $140
                </div>
            `;
            container.appendChild(card);
        }
    }

    // ----- 賽後驗證 (暫存) -----
    let actualResults = races.map(() => ({ winner: "", second: "", third: "", fourth: "" }));
    function buildResultInputs() {
        const div = document.getElementById('resultInputs');
        div.innerHTML = '';
        for (let i=0; i<races.length; i++) {
            const row = document.createElement('div');
            row.style.display = 'flex'; row.style.flexWrap = 'wrap'; row.style.gap = '5px'; row.style.marginBottom = '8px';
            row.innerHTML = `
                <span style="width:100px;">${races[i].name}</span>
                <input id="res_${i}_1" placeholder="頭馬" size="8">
                <input id="res_${i}_2" placeholder="二馬" size="8">
                <input id="res_${i}_3" placeholder="三馬" size="8">
                <input id="res_${i}_4" placeholder="四馬" size="8">
            `;
            div.appendChild(row);
        }
    }
    function computeHitRate() {
        const preds = computeAllPredictions();
        let tripleHit=0, quartetHit=0, valid=0;
        for (let i=0; i<races.length; i++) {
            const w = document.getElementById(`res_${i}_1`)?.value.trim();
            const s = document.getElementById(`res_${i}_2`)?.value.trim();
            const t = document.getElementById(`res_${i}_3`)?.value.trim();
            const f = document.getElementById(`res_${i}_4`)?.value.trim();
            if(!w || !s || !t) continue;
            valid++;
            const predTop3 = preds[i].top3;
            if(w===predTop3[0] && s===predTop3[1] && t===predTop3[2]) tripleHit++;
            const predTop4 = preds[i].top4;
            if(f && w===predTop4[0] && s===predTop4[1] && t===predTop4[2] && f===predTop4[3]) quartetHit++;
        }
        const tripleRate = valid ? (tripleHit/valid*100).toFixed(1) : 0;
        const quartetRate = valid ? (quartetHit/valid*100).toFixed(1) : 0;
        let history = JSON.parse(localStorage.getItem('SHTSN_Shatin_hitrate') || '[]');
        history.push({ date:"2026-05-06", tripleHit, tripleTotal:valid, quartetHit, quartetTotal:valid, tripleRate, quartetRate });
        localStorage.setItem('SHTSN_Shatin_hitrate', JSON.stringify(history));
        displayStats(history);
    }
    function displayStats(history) {
        let totalTriple=0, totalTripleCnt=0, totalQuartet=0, totalQuartetCnt=0;
        history.forEach(d=>{ totalTriple+=d.tripleHit; totalTripleCnt+=d.tripleTotal; totalQuartet+=d.quartetHit; totalQuartetCnt+=d.quartetTotal; });
        const overallTriple = totalTripleCnt ? (totalTriple/totalTripleCnt*100).toFixed(1) : 0;
        const overallQuartet = totalQuartetCnt ? (totalQuartet/totalQuartetCnt*100).toFixed(1) : 0;
        document.getElementById('stats').innerHTML = `
            <div>📅 本日 (2026-05-06)：三重彩 ${history[history.length-1]?.tripleHit||0}/${history[history.length-1]?.tripleTotal||0} (${history[history.length-1]?.tripleRate||0}%) &nbsp; 四重彩 ${history[history.length-1]?.quartetHit||0}/${history[history.length-1]?.quartetTotal||0} (${history[history.length-1]?.quartetRate||0}%)</div>
            <div>📈 累積 (沙田) 三重彩命中率 ${overallTriple}% &nbsp; 四重彩 ${overallQuartet}%</div>
        `;
    }
    function analyzeMistakes() {
        document.getElementById('stats').innerHTML += '<div class="stats-box">🔧 自動分析模組已就緒，請輸入真實賽果後再分析。</div>';
    }
    function applyFix() {
        alert("沙田系統參數可根據賽果手動調整，或重新執行分析。當前 PARAMS 已儲存於 localStorage。");
    }
    // 載入歷史
    function loadHistory() {
        const stored = localStorage.getItem('SHTSN_Shatin_hitrate');
        if(stored) displayStats(JSON.parse(stored));
        else document.getElementById('stats').innerHTML = '<div>尚未有紀錄，完成投注後請輸入名次並按計算。</div>';
    }

    renderRaces();
    buildResultInputs();
    loadHistory();
    document.getElementById('calcBtn').addEventListener('click', computeHitRate);
    document.getElementById('analyzeBtn').addEventListener('click', analyzeMistakes);
    document.getElementById('applyFixBtn').addEventListener('click', applyFix);
</script>
</body>
</html>
