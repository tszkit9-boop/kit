    <style>

            line-height: 1.5;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* 卡片風格 */
        .card {
            background: rgba(20, 35, 18, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 1.5rem;
            border-left: 4px solid #d4af37;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            padding: 1.2rem;
            margin-bottom: 1.5rem;
            transition: all 0.2s;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid #d4af3740;
            margin-bottom: 0.8rem;
            padding-bottom: 0.4rem;
            flex-wrap: wrap;
        }

        .race-title {
            font-size: 1.4rem;
            font-weight: bold;
            color: #f3c26b;
            letter-spacing: 1px;
        }

        .race-info {
            font-size: 0.75rem;
            background: #2c3a26;
            padding: 0.2rem 0.6rem;
            border-radius: 2rem;
        }

        /* 表格/馬匹行 */
        .horse-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e2a1b;
            margin: 0.4rem 0;
            padding: 0.5rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .horse-rank {
            background: #d4af37;
            color: #0a1f0e;
            font-weight: bold;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        .horse-name {
            flex: 2;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .horse-details {
            display: flex;
            gap: 0.8rem;
            color: #c0cfb0;
            font-size: 0.7rem;
        }

        .score {
            font-family: monospace;
            background: #00000055;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-weight: bold;
            color: #f5d742;
        }

        .badge {
            background: #d4af3740;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            font-size: 0.7rem;
        }

        .btn {
            background: #2c3a26;
            border: 1px solid #d4af37;
            color: #f3c26b;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
        }

        .btn-primary {
            background: #d4af37;
            color: #0a1f0e;
            border: none;
        }

        .btn-primary:active {
            background: #b8942a;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .section-title {
            font-size: 1.2rem;
            margin: 0.8rem 0 0.5rem;
            padding-left: 0.5rem;
            border-left: 5px solid #d4af37;
        }

        .weight-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px,1fr));
            gap: 0.5rem;
            max-height: 250px;
            overflow-y: auto;
            background: #1e2a1b;
            border-radius: 1rem;
            padding: 0.8rem;
        }

        .weight-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
        }

        input {
            background: #2c3a26;
            border: 1px solid #d4af37;
            color: #e6e2c3;
            border-radius: 20px;
            padding: 0.2rem 0.5rem;
            width: 55px;
            text-align: center;
        }

        hr {
            border-color: #d4af3740;
            margin: 1rem 0;
        }

        .sim-note {
            font-size: 0.65rem;
            color: #bbaa77;
            text-align: right;
            font-style: italic;
        }

        footer {
            text-align: center;
            font-size: 0.65rem;
            margin-top: 2rem;
            opacity: 0.7;
        }

            .horse-details {
                flex-direction: column;
                gap: 0.2rem;
                align-items: flex-start;
            }
            .horse-row {
                align-items: flex-start;

        }
    </style>
</head>

    // 初始化默認權重 (19派)
    const DEFAULT_WEIGHTS = {
        "奇門派":0.23,"數據派":0.12,"賠率+晨操派":0.05,"血統派":0.03,"步速派":0.07,"場地派":0.04,"路程派":0.04,

        "騎練合拍度":0.04,"多模型集成派":0.05,"磅數派":0.04,"沙圈觀察派":0.04,"檔位偏差派":0.04,"速勢系統派":0.03
    };
    let currentWeights = { ...DEFAULT_WEIGHTS };
    // 優化參數預設
    let optParams = { innerBonusShort:10, outerBonusDraw12:30, longDistanceBackBonus:8, extremeLongshotBonus:5, overheatPenaltyBase:5 };

    // 儲存命中率記錄
    let pastResults = []; // {raceId, winner, second, third, fourth, qtDividend}

    // helper: 歸一化權重
    function normalizeWeights(weights) {
        let total = Object.values(weights).reduce((a,b)=>a+b,0);
        if(total===0) return weights;
        let norm = {};
        for(let k in weights) norm[k] = weights[k]/total;
        return norm;
    }

    // 綜合評分函數 (核心演算 + 五項優化規則)
    function computeHorseScore(horse, race) {
        let base = 70;
        // 檔位效應
        let drawBonus = 0;
        if(race.distance <= 1200 && horse.draw <=3) drawBonus += optParams.innerBonusShort;
        if(horse.draw >=12 && horse.isStarJockey) drawBonus += optParams.outerBonusDraw12;
        // 明星騎師加分
        let jockeyBonus = (horse.isStarJockey || starJockeySet.has(horse.rider)) ? 8 : 0;
        let weightFactor = (540 - horse.weight) / 25;  // 輕磅有利
        // 路程適性模擬
        let distanceFit = (race.distance >= 1800 && horse.runStyle==="後上") ? optParams.longDistanceBackBonus : 0;
        let randomNoise = (Math.random() * 2); // 輕微擾動
        let score = base + drawBonus + jockeyBonus + weightFactor + distanceFit + randomNoise;
        // 極冷門保護模擬 (賠率無實際會根據檔位騎師模擬)
        if(horse.draw >=4 && horse.draw<=9 && horse.isStarJockey) score += optParams.extremeLongshotBonus;
        return Math.max(40, Math.min(110, score));
    }

    function computeRaceRankings(race) {
        let horsesWithScore = race.horses.map(h => ({ ...h, score: computeHorseScore(h, race) }));
        horsesWithScore.sort((a,b)=>b.score - a.score);
        return horsesWithScore.slice(0,4);
    }

                </div>
                <div>🏆 預測排序 (綜合分前四)</div>
                ${top4.map((h, pos) => `<div class="horse-row"><span class="horse-rank">${pos+1}</span><span class="horse-name">${h.name}</span><div class="horse-details"><span>檔${h.draw}</span><span>${h.rider}</span><span>${h.weight}lb</span><span class="score">${h.score.toFixed(1)}</span></div></div>`).join('')}
                <div style="margin-top:12px;">🎯 三重彩(單式): ${top4.map(h=>h.name).join(' > ')}</div>
                <div>💡 連贏/Q建議: ${top4[0].name} - ${top4[1].name} / ${top4[2].name}</div>
                <div class="sim-note">⭐ 奇門派簡析: ${getQimenMsg(race)}</div>
            `;
            container.appendChild(card);
        });
    }

    function getQimenMsg(race) {
        const msgs = ["天輔星遇生門，熱門穩陣", "驚門入中宮，防冷腳", "馬星發動，前段馬佔優","天芮星帶死門，形勢混亂","傷門在四宮，外檔馬需防"];
        return msgs[Math.floor(Math.random()*msgs.length)] + " (模擬奇門)";
    }

    // 權重面板渲染
    function renderWeightsPanel() {
        const panel = document.getElementById('weightsPanel');
        panel.innerHTML = '';
        for(let [key,val] of Object.entries(currentWeights)) {
            let div = document.createElement('div');
            div.className = 'weight-item';
            div.innerHTML = `<span>${key}</span><input type="number" step="0.01" value="${val.toFixed(3)}" data-key="${key}" class="weight-input">`;
            panel.appendChild(div);
        }
        document.querySelectorAll('.weight-input').forEach(inp => {
            inp.addEventListener('change', (e) => {
                let newVal = parseFloat(e.target.value);
                if(!isNaN(newVal)) currentWeights[e.target.dataset.key] = newVal;
                currentWeights = normalizeWeights(currentWeights);
                renderWeightsPanel();
                renderAllRaces();
                localStorage.setItem('SHTSN_weights', JSON.stringify(currentWeights));
            });
        });
    }
    function renderParamsPanel() {
        const panel = document.getElementById('paramsPanel');
        panel.innerHTML = `
            <label>內檔加成(短途): <input id="innerBonus" type="number" value="${optParams.innerBonusShort}" step="1"></label>
            <label>外檔補償(檔12+): <input id="outerBonus" value="${optParams.outerBonusDraw12}" step="1"></label>
            <label>長途後上+ : <input id="longBouns" value="${optParams.longDistanceBackBonus}" step="1"></label>
            <label>極冷門保護: <input id="extremeBonus" value="${optParams.extremeLongshotBonus}" step="1"></label>
            <label>賠率過熱扣: <input id="overheatPenalty" value="${optParams.overheatPenaltyBase}" step="1"></label>
        `;
        ['innerBonus','outerBonus','longBouns','extremeBonus','overheatPenalty'].forEach(id=>{
            document.getElementById(id).addEventListener('change',()=>{
                optParams.innerBonusShort = parseInt(document.getElementById('innerBonus').value)||10;
                optParams.outerBonusDraw12 = parseInt(document.getElementById('outerBonus').value)||30;
                optParams.longDistanceBackBonus = parseInt(document.getElementById('longBouns').value)||8;
                optParams.extremeLongshotBonus = parseInt(document.getElementById('extremeBonus').value)||5;
                optParams.overheatPenaltyBase = parseInt(document.getElementById('overheatPenalty').value)||5;
                localStorage.setItem('SHTSN_corrected_params', JSON.stringify(optParams));
                renderAllRaces();
            });
        });
    }

    // 自動錯誤分析+參數微調
    function autoCorrectParameters() {
        if(pastResults.length===0) { alert("尚未記錄任何賽果，無法分析失誤。請先輸入至少一場頭馬。"); return; }
        // 簡單邏輯: 比對最近三場命中頭馬準確性，調整內檔加成
        let hitCount = 0;
        for(let res of pastResults) {
            let race = RACES_DATA.find(r=>r.racesId===res.raceId);
            if(race) {
                let top1 = computeRaceRankings(race)[0];
                if(top1 && top1.name === res.winner) hitCount++;
            }
        }
        let accuracy = pastResults.length? (hitCount/pastResults.length) : 0;
        if(accuracy < 0.3) {
            optParams.innerBonusShort = Math.min(20, optParams.innerBonusShort+2);
            optParams.outerBonusDraw12 = Math.min(40, optParams.outerBonusDraw12+3);
        } else if(accuracy > 0.6) {
            optParams.innerBonusShort = Math.max(5, optParams.innerBonusShort-1);
        }
        localStorage.setItem('SHTSN_corrected_params', JSON.stringify(optParams));
        renderParamsPanel();
        renderAllRaces();
        updateHitrateDisplay();
        alert(`參數已自動更正: 內檔加成=${optParams.innerBonusShort}, 外檔補償=${optParams.outerBonusDraw12}\n近期頭馬命中率${(accuracy*100).toFixed(0)}%`);
    }

    function updateHitrateDisplay() {
        let div = document.getElementById('hitrateDisplay');
        div.innerText = `已記錄賽果: ${pastResults.length}場 | 可進行錯誤分析優化參數`;
    }
    function saveResult() {
        let raceId = document.getElementById('resultRaceSelect').value;
        let winner = document.getElementById('winnerInput').value.trim();
        let second = document.getElementById('secondInput').value.trim();
        let third = document.getElementById('thirdInput').value.trim();
        let fourth = document.getElementById('fourthInput').value.trim();
        if(!winner) { alert("請輸入頭馬名稱"); return; }
        pastResults.push({ raceId, winner, second, third, fourth, qtDividend: document.getElementById('qtPlaceInput').value });
        localStorage.setItem('SHTSN_payouts', JSON.stringify(pastResults));
        updateHitrateDisplay();
        alert("賽果儲存完成，可點擊『分析近期失誤』更新參數");
    }
    function initRaceSelect() {
        let sel = document.getElementById('resultRaceSelect');
        sel.innerHTML = RACES_DATA.map(r=>`<option value="${r.racesId}">${r.name}</option>`).join('');
    }
    function loadStorage() {
        let savedWeights = localStorage.getItem('SHTSN_weights');
        if(savedWeights) currentWeights = JSON.parse(savedWeights);
        else currentWeights = normalizeWeights(DEFAULT_WEIGHTS);
        let savedParams = localStorage.getItem('SHTSN_corrected_params');
        if(savedParams) optParams = JSON.parse(savedParams);
        let savedResults = localStorage.getItem('SHTSN_payouts');
        if(savedResults) pastResults = JSON.parse(savedResults);
        renderWeightsPanel();
        renderParamsPanel();
        updateHitrateDisplay();
    }

    document.getElementById('refreshScoresBtn').addEventListener('click', ()=>{ renderAllRaces(); });
    document.getElementById('autoCorrectBtn').addEventListener('click', autoCorrectParameters);
    document.getElementById('saveWeightsBtn').addEventListener('click', ()=>{ localStorage.setItem('SHTSN_weights', JSON.stringify(currentWeights)); alert("權重已儲存"); });
    document.getElementById('saveResultBtn').addEventListener('click', saveResult);

    loadStorage();
    initRaceSelect();
    renderAllRaces();
</script>
</body>
</html>
