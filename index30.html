</head>

// 通用評分函數
function getDrawScore(gate) {
    if (gate <= 3) return 10;
    if (gate <= 6) return 7;
    if (gate <= 9) return 4;
    return 2;
}
function getWeightScore(weight) {
    if (weight <= 115) return 10;
    if (weight <= 122) return 8;
    if (weight <= 129) return 5;
    if (weight <= 133) return 3;
    return 2;
}
function getJockeyScore(jockeyCode) {
    if (jockeyCode === "panton" || jockeyCode === "bowen" || jockeyCode === "moreira") return 9;
    if (jockeyCode === "badu" || jockeyCode === "tian" || jockeyCode === "cai" || jockeyCode === "heze") return 7;
    if (jockeyCode === "bender" || jockeyCode === "xiwei" || jockeyCode === "aizhao") return 6;
    return 5;
}
function getQimen(gate, jockeyCode) {
    let base = gate <= 3 ? 88 : (gate <= 6 ? 75 : (gate <= 9 ? 58 : 42));
    let insideBonus = (gate <= 3) ? 2 : 0;
    let starBonus = 0;
    if (jockeyCode === "panton" || jockeyCode === "bowen" || jockeyCode === "moreira") starBonus = 5;
    else if (jockeyCode === "badu") starBonus = 3;
    return Math.min(base + insideBonus + starBonus, 100);
}
function getDataScore(gate, weight, jockeyCode) {
    let drawScore = getDrawScore(gate);
    let weightScore = getWeightScore(weight);
    let jockeyScore = getJockeyScore(jockeyCode);
    let raw = (drawScore * 0.4) + (weightScore * 0.4) + (jockeyScore * 0.2);
    return Math.round(raw * 10);
}
function getTrackwork(gate, weight, jockeyCode) {
    let base = gate <= 3 ? 82 : (gate <= 6 ? 74 : 56);
    let starBonus = 0;
    if (jockeyCode === "panton" || jockeyCode === "bowen" || jockeyCode === "moreira") starBonus = 6;
    else if (jockeyCode === "badu") starBonus = 3;
    let lightBonus = (weight <= 122) ? 4 : 0;
    return Math.min(base + starBonus + lightBonus, 92);
}
function getOddsScore(odds) { return 60; } // 模擬賠率
function getFinal(qimen, data, odds, track, distance, blood) {
    let combined = (odds + track) / 2;
    return (qimen * 0.45) + (data * 0.30) + (combined * 0.20) + (distance * 0.03) + (blood * 0.02);
}

// 步速分析函數
function generatePaceAnalysis(horses, distance) {
    // 簡單規則：內檔多、有領放騎師則步速偏快；外檔多則可能慢步速
    let innerGates = horses.filter(h => h.gate <= 3).length;
    let frontJockeys = horses.filter(h => ["潘頓","莫雷拉","布文","巴度"].includes(h.jockey.split(' ')[0])).length;
    let paceDesc = "";
    if (distance === 1200) {
        if (innerGates >= 3 && frontJockeys >= 2) paceDesc = "預期步速偏快，前置型馬有利，後上馬需運氣。";
        else if (innerGates <= 2) paceDesc = "預期步速偏慢，可能出現慢步速，利後上馬衝刺。";
        else paceDesc = "步速正常，各跑法均有機會，留意沿途走位。";
    } else {
        if (innerGates >= 3) paceDesc = "預期步速平穩，中置型馬有利。";
        else paceDesc = "步速可能偏慢，長途賽事留前鬥後。";
    }
    return paceDesc;
}

// 處理單場數據
function processRace(raceHorses, distanceVal=60) {
    return raceHorses.map(h => {
        let q = getQimen(h.gate, h.jockeyCode);
        let d = getDataScore(h.gate, h.weight, h.jockeyCode);
        let o = getOddsScore(60);
        let t = getTrackwork(h.gate, h.weight, h.jockeyCode);
        let final = getFinal(q, d, o, t, distanceVal, h.blood);
        return { ...h, qimen: q, dataScore: d, oddsScore: o, trackwork: t, final: final };
    });
}

    // 步速分析卡片
    let paceHtml = `<div class="pace-card">🏁 <strong>步速分析</strong><br>${paceDesc}</div>`;

    // 馬匹深度分析

    `).join('')}</div>`;

    const fullHtml = `
        <div class="card"><div class="card-header"><h2>📊 ${raceTitle}</h2><div class="badge">奇門0.45 數據0.30 (賠+晨)/2 0.20 路程0.03 血統0.02</div></div>${tableHtml}</div>
        ${paceHtml}
        <div class="card"><div class="card-header"><h2>🕸️ 蛛網精選</h2></div>${picksHtml}</div>
        <div class="card"><div class="card-header"><h2>🎲 投注組合建議</h2></div>${betHtml}</div>
        <div class="card"><div class="card-header"><h2>☯ 奇門九宮·時空格局</h2></div>${jiugongHtml}<div class="sub">${qimenSub}</div></div>
        <div class="card"><div class="card-header"><h2>🐎 馬匹深度分析</h2></div>${detailsHtml}</div>
    `;
    document.getElementById('dynamicContent').innerHTML = fullHtml;
}

// 分頁切換
const tabs = document.querySelectorAll('.tab-btn');
tabs.forEach(btn => {
    btn.addEventListener('click', () => {
        tabs.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderRace(btn.getAttribute('data-race'));
    });
});

document.getElementById('fetchOddsBtn').addEventListener('click', () => {

});

renderRace('race1');
