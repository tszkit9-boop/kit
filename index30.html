// 共用評分函數
function getDrawScore(gate) { if (gate <= 3) return 10; if (gate <= 6) return 7; if (gate <= 9) return 4; return 2; }
function getWeightScore(weight) { if (weight <= 115) return 10; if (weight <= 122) return 8; if (weight <= 129) return 5; if (weight <= 133) return 3; return 2; }
function getJockeyScore(code) { if (code === "panton" || code === "bowen" || code === "moreira" || code === "star") return 9; if (code === "badu" || code === "tian" || code === "cai" || code === "heze") return 7; if (code === "bender" || code === "xiwei" || code === "aizhao") return 6; return 5; }
function getQimen(gate, code) { let base = gate <= 3 ? 88 : (gate <= 6 ? 75 : (gate <= 9 ? 58 : 42)); let insideBonus = (gate <= 3) ? 2 : 0; let starBonus = (code === "panton" || code === "bowen" || code === "moreira" || code === "star") ? 5 : ((code === "badu") ? 3 : 0); return Math.min(base + insideBonus + starBonus, 100); }
function getDataScore(gate, weight, code) { let raw = (getDrawScore(gate) * 0.4) + (getWeightScore(weight) * 0.4) + (getJockeyScore(code) * 0.2); return Math.round(raw * 10); }
function getTrackwork(gate, weight, code) { let base = gate <= 3 ? 82 : (gate <= 6 ? 74 : 56); let starBonus = (code === "panton" || code === "bowen" || code === "moreira" || code === "star") ? 6 : ((code === "badu") ? 3 : 0); let lightBonus = (weight <= 122) ? 4 : 0; return Math.min(base + starBonus + lightBonus, 92); }
function getOddsScore() { return 60; }
function getFinal(qimen, data, odds, track, distance, blood) { let combined = (odds + track) / 2; return (qimen * 0.45) + (data * 0.30) + (combined * 0.20) + (distance * 0.03) + (blood * 0.02); }

        {no:13,name:"至尊高超",gate:9,weight:115,jockey:"韋紀力",code:"star",blood:90},
        {no:14,name:"英雄豪傑",gate:10,weight:115,jockey:"黃寶妮",code:"other",blood:70}
    ]
};

const allRaces = [race1data, race2data, race3data, race4data, race5data, race6data, race7data, race8data, race9data, race10data, race11data];

// 渲染一個場次
function renderRace(raceData, index) {
    let horsesWithScores = raceData.horses.map(h => {
        let q = getQimen(h.gate, h.code);
        let d = getDataScore(h.gate, h.weight, h.code);
        let o = getOddsScore();
        let t = getTrackwork(h.gate, h.weight, h.code);
        let final = getFinal(q, d, o, t, 60, h.blood);
        return { ...h, qimen: q, dataScore: d, oddsScore: o, trackwork: t, final: final };
    });
    let sorted = [...horsesWithScores].sort((a,b) => b.final - a.final);
    let top5 = sorted.slice(0,5);
    let top3 = top5.slice(0,3).map(h => h.no);
    let top4 = top5.slice(0,4).map(h => h.no);
    let winPick = top3[0];

    // 表格
    let tableHtml = `<div class="table-wrapper"><table class="ranking-table"><thead><tr><th>排名</th><th>馬號</th><th>馬名</th><th>檔位</th><th>綜合分</th><th>奇門</th><th>數據</th><th>賠率</th><th>晨操</th><th>血統</th><th>進度</th></tr></thead><tbody>`;
    sorted.forEach((h, idx) => {
        tableHtml += `<tr${idx%2===0?'':' style="background:#faf8f5;"'}><td>${idx+1}</td>.yes${h.no}</td>.yes${h.name}</td>.yes${h.gate}</td>.yes<strong>${h.final.toFixed(1)}</strong></td>.yes${h.qimen}</td>.yes${h.dataScore}</td>.yes${h.oddsScore.toFixed(1)}</td>.yes${h.trackwork}</td>.yes${h.blood}</td>.yes<div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100, h.final)}%"></div></div></td></tr>`;
    });
    tableHtml += `</tbody></table></div>`;

    let picksHtml = `<div class="flex-grid">${top5.map(h => `<div class="pick-card"><div class="pick-number">${h.no}</div><div>${h.name}</div><div>${h.final.toFixed(1)}分</div></div>`).join('')}</div>`;
    let betHtml = `<table class="bet-table"><tbody>
        <tr><td>獨贏</div>.${winPick}號 ${sorted.find(h=>h.no==winPick).name}</div>.主力</div>--
        <tr>.html(位置Q).${top3.join(',')} 互串</div>.主力</div>--
        <tr>.html(連贏).${top3.join(',')} 互串</div>.均注</div>--
        <tr>.html(單T).${top3.join(',')}</div>.小注</div>--
        <tr>.html(三重彩).${top3[0]} > ${top3[1]},${top3[2]} > 全</div>.複式</div>--
        <tr>.html(四連環).${top4.join(',')}</div>.防守</div>--
        <tr>.html(四重彩).${top4.join(',')} 複式四重彩（24注）</div>.小注</div>--
    </tbody></tr>`;

    const jiugong = [
        ["巽宮·東南","天輔星",false],["離宮·南","值符·天英",false],["坤宮·西南","天芮星",false],
        ["震宮·東","天沖星",false],["中宮","太極",false],["兌宮·西","天柱星",true],
        ["艮宮·東北","天任星",false],["坎宮·北","天蓬星",false],["乾宮·西北","天心星",false]
    ];
    let jiugongHtml = `<div class="jiugong-grid">${jiugong.map(c => `<div class="grid-cell ${c[2]?'highlight':''}"><strong>${c[0]}</strong><span>${c[1]}</span></div>`).join('')}</div>`;
    let paceHtml = `<div class="pace-card">🏁 <strong>步速分析</strong><br>${raceData.pace}</div>`;
    let detailsHtml = `<div>${horsesWithScores.map(h => `
        <div class="horse-detail-card">
            <div><strong>${h.no}. ${h.name}</strong> (${h.gate}檔 · ${h.weight}磅) 騎師: ${h.jockey}</div>
            <div class="scores-row">
                <span>✨奇門: ${h.qimen}</span>
                <span>📊數據: ${h.dataScore}</span>
                <span>💰賠率: ${h.oddsScore.toFixed(1)}</span>
                <span>🌅晨操: ${h.trackwork}</span>
                <span>🧬血統: ${h.blood}</span>
                <span>🏆綜合: ${h.final.toFixed(1)}</span>
            </div>
        </div>
    `).join('')}</div>`;

    return `
        <div class="card">
            <div class="card-header"><h2>📊 ${raceData.title}</h2><div class="badge">奇門0.45 數據0.30 (賠+晨)/2 0.20 路程0.03 血統0.02</div></div>
            ${tableHtml}
        </div>
        ${paceHtml}
        <div class="card"><div class="card-header"><h2>🕸️ 蛛網精選</h2></div>${picksHtml}</div>
        <div class="card"><div class="card-header"><h2>🎲 投注組合建議</h2></div>${betHtml}</div>
        <div class="card"><div class="card-header"><h2>☯ 奇門九宮·時空格局</h2></div>${jiugongHtml}<div class="sub">${raceData.distance===1200?"午時陰遁四局，短途內檔優勢顯著":(raceData.distance===2000?"申時陰遁四局，長途內檔優勢略減，馬星影響增大":"酉時陰遁四局，中距離內檔優勢明顯")}</div></div>
        <div class="card"><div class="card-header"><h2>🐎 馬匹深度分析</h2></div>${detailsHtml}</div>
    `;
}

// 渲染全部
const container = document.getElementById('allRaces');
allRaces.forEach((race, idx) => {
    container.innerHTML += renderRace(race, idx);
});
</script>
</body>
</html>
