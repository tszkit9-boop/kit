        // ============================================================
        // 渲染函數
        // ============================================================
        function renderRaces() {
            const container = document.getElementById('races-container');
            let html = '';

            raceData.forEach((race, idx) => {
                const raceId = `race${race.id}`;
                // 過濾出有標籤的馬匹以顯示重點提示
                const tagged = race.horses.filter(h => h.tag !== 'neutral');
                const winHorse = tagged.find(h => h.tag === 'win');
                const placeHorse = tagged.find(h => h.tag === 'place');
                const coldHorse = tagged.find(h => h.tag === 'cold');
                const trapHorse = tagged.find(h => h.tag === 'trap');

                html += `
                <div id="${raceId}" class="mt-8 bg-white rounded-2xl card-shadow overflow-hidden border border-gray-100">
                    <!-- 場次標題 -->
                    <div class="bg-gradient-to-r from-indigo-50 to-blue-50 px-5 py-4 border-b border-gray-200 flex flex-wrap items-center justify-between">
                        <div>
                            <h2 class="text-lg font-bold text-gray-800">${race.title}</h2>
                            <p class="text-xs text-gray-500 mt-0.5">${race.note}</p>
                        </div>
                        <div class="flex flex-wrap gap-2 mt-1 sm:mt-0">
                            ${winHorse ? `<span class="bg-red-100 text-red-800 text-xs px-3 py-1 rounded-full font-medium">🏆 首選 ${winHorse.no} ${winHorse.name}</span>` : ''}
                            ${placeHorse ? `<span class="bg-blue-100 text-blue-800 text-xs px-3 py-1 rounded-full font-medium">🥈 次選 ${placeHorse.no} ${placeHorse.name}</span>` : ''}
                            ${coldHorse ? `<span class="bg-amber-100 text-amber-800 text-xs px-3 py-1 rounded-full font-medium">💎 冷門 ${coldHorse.no} ${coldHorse.name}</span>` : ''}
                            ${trapHorse ? `<span class="bg-gray-200 text-gray-700 text-xs px-3 py-1 rounded-full font-medium">⛔ 陷阱 ${trapHorse.no} ${trapHorse.name}</span>` : ''}
                        </div>
                    </div>

                    <!-- 表格 -->
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left">
                            <thead class="bg-gray-50 text-gray-600 text-xs uppercase tracking-wider border-b">
                                <tr>
                                    <th class="px-3 py-2">馬號</th>
                                    <th class="px-3 py-2">馬名</th>
                                    <th class="px-3 py-2">檔</th>
                                    <th class="px-3 py-2">磅</th>
                                    <th class="px-3 py-2">騎師</th>
                                    <th class="px-3 py-2">獨贏</th>
                                    <th class="px-3 py-2">位置</th>
                                    <th class="px-3 py-2">系統定位</th>
                                    <th class="px-3 py-2 hidden md:table-cell">簡評</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${race.horses.map(h => {
                                    let tagClass = '';
                                    let tagText = '';
                                    let rowClass = '';
                                    switch(h.tag) {
                                        case 'win': tagClass = 'badge-win'; tagText = '首選'; rowClass = 'row-highlight-win'; break;
                                        case 'place': tagClass = 'badge-place'; tagText = '次選'; rowClass = 'row-highlight-place'; break;
                                        case 'cold': tagClass = 'badge-cold'; tagText = '冷門'; rowClass = 'row-highlight-cold'; break;
                                        case 'trap': tagClass = 'badge-trap'; tagText = '陷阱'; rowClass = 'row-highlight-trap'; break;
                                        default: tagClass = 'badge-neutral'; tagText = '—'; rowClass = '';
                                    }
                                    return `
                                    <tr class="border-b border-gray-100 hover:bg-gray-50 transition ${rowClass}">
                                        <td class="px-3 py-2.5 font-mono font-medium">${h.no}</td>
                                        <td class="px-3 py-2.5 font-medium text-gray-800">${h.name}</td>
                                        <td class="px-3 py-2.5 text-center">${h.draw}</td>
                                        <td class="px-3 py-2.5 text-center">${h.weight}</td>
                                        <td class="px-3 py-2.5">${h.jockey}</td>
                                        <td class="px-3 py-2.5 font-mono ${parseFloat(h.winOdds) < 5 ? 'text-red-600 font-bold' : ''}">${h.winOdds}</td>
                                        <td class="px-3 py-2.5 font-mono ${parseFloat(h.placeOdds) < 2 ? 'text-blue-600 font-bold' : ''}">${h.placeOdds}</td>
                                        <td class="px-3 py-2.5"><span class="inline-block px-2 py-0.5 rounded-full text-xs font-medium ${tagClass}">${tagText}</span></td>
                                        <td class="px-3 py-2.5 text-xs text-gray-600 hidden md:table-cell max-w-xs">${h.tip || ''}</td>
                                    </tr>
                                    `;
                                }).join('')}

                        </table>
                    </div>

                        <span>💡 點按馬名可查看詳情（桌面版懸停顯示簡評）</span>
                        <span class="hidden sm:inline">黏地修正 · 賠率截至開跑前</span>
                    </div>
                </div>
                `;
            });

            container.innerHTML = html;
        }

        // 頁面載入後執行
        document.addEventListener('DOMContentLoaded', renderRaces);
